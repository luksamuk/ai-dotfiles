---
# Navi — Homepage Services

- IA & Inferência:
    - LLM Swap:
        href: http://localhost:12434/
        icon: /icons/llama-swap.png
        description: Modelos locais (llama.cpp + MoE)
        widget:
            type: customapi
            url: http://127.0.0.1:8083/llama-swap
            mappings:
                - label: Disponíveis
                  field: available
                - label: Rodando
                  field: running
                - label: Status
                  field: status
    - Ollama:
        href: http://localhost:11434/
        icon: /icons/ollama.png
        description: Runtime LLM (cloud proxies)
        widget:
            type: customapi
            url: http://127.0.0.1:8083/ollama
            mappings:
                - label: Disponíveis
                  field: available
                - label: Rodando
                  field: running
                - label: Status
                  field: status
    - Open Design:
        href: http://localhost:7456/
        icon: /icons/open-design.png
        description: Design tool com agentes IA
        widget:
            type: customapi
            url: http://127.0.0.1:8083/open-design
            mappings:
                - label: Agentes
                  field: agents
                - label: Status
                  field: status
    - Open WebUI:
        href: http://localhost:3111/
        icon: /icons/open-webui.png
        description: Interface web para LLMs
        widget:
            type: customapi
            url: http://127.0.0.1:8083/open-webui
            mappings:
                - label: Versão
                  field: version
                - label: Status
                  field: status

