[model]
default = "ministral"
ollama_host = "127.0.0.1"
ollama_port = 11434

[model.query]
model = "hermes4"
thinking = true
tools = true

[model.summarize]
model = "lfm2"
thinking = false
tools = false

[model.code]
model = "nouscoder"
thinking = true
tools = true

[model.vision]
model = "moondream"
thinking = false
tools = false

[tools]
# Available tools include:
#   - web_search, web_search_news, web_instant_answer (Web search - BROKEN)
#   - get_weather, get_current_weather, get_weather_forecast (Weather)
#   - read_file, list_directory, search_files (File operations)
#   - fetch_pokemon, fetch_pokemon_stats, etc. (Pokémon data)
blacklist = []
file_sandbox = true


[output]
plain_default = false
debug_default = false

[display]
# Options: "dark", "light", or "mono" (for terminals without color)
skin = "dark"
