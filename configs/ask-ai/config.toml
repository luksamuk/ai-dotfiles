[model]
default = "qwen3.5:9b"
ollama_host = "127.0.0.1"
ollama_port = 11434

[model.query]
model = "qwen3.5:4b"
tools = true

[model.summarize]
model = "qwen3.5:4b"
tools = false

[model.code]
model = "devstral-small-2-cloud"
tools = false

[model.vision]
model = "qwen3.5:0.8b"
tools = false

[model.chat]
model = "qwen3.5:9b"
tools = true

[model.translate]
model = "translategemma"
tools = false
thinking = false

[tools]
# Available tools include:
#   - web_search, web_search_news, web_instant_answer (Web search - BROKEN)
#   - get_weather, get_current_weather, get_weather_forecast (Weather)
#   - read_file, list_directory, search_files (File operations)
#   - fetch_pokemon, fetch_pokemon_stats, etc. (Pokémon data)
blacklist = []
file_sandbox = true


[output]
plain_default = false
debug_default = false

[display]
# Options: "dark", "light", or "mono" (for terminals without color)
skin = "mono"

[led]
ip = "192.168.3.21"
port = 80
