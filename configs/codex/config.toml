# Codex CLI Configuration
# Source of truth: ~/git/ai-dotfiles/configs/codex/config.toml
# Runtime: ~/.codex/config.toml
# Sync: cp ~/git/ai-dotfiles/configs/codex/config.toml ~/.codex/config.toml
#
# IMPORTANT: Codex 0.128+ requires OpenAI Responses API for custom providers.
# llama.cpp/llama-swap only implements Chat Completions, NOT Responses API.
# This means llama-swap and Sisyphus profiles DO NOT WORK as custom providers.
# Use --oss --local-provider=ollama for Ollama models (cloud + local).
# See: https://github.com/openai/codex/discussions/7782
#
# NOTE: TOML profile names with dots/hyphens need quoted keys.
# Use: codex -p 'glm-5.1'  (quotes required in shell for dots)

# ============================================================
# Default profile (Ollama cloud — free, fast, no local GPU)
# ============================================================
model = "glm-5.1:cloud"
model_provider = "ollama-cloud"

# ============================================================
# Provider definitions
# ============================================================

# --- Ollama Cloud (primary — API-routed, no local GPU) ---
# Works with Responses API. No wire_api needed (auto-detected).
[model_providers.ollama-cloud]
name = "Ollama Cloud"
base_url = "http://127.0.0.1:11434/v1"

# --- llama-swap local (RTX 3050, GGUF models on Navi) ---
# LIMITED: Codex requires Responses API but llama-swap only serves Chat Completions.
# Tool calls fail with: 'type' of tool must be 'function'
# WORKAROUND: Use --oss --local-provider=ollama and set OLLAMA_BASE_URL
# (Does NOT work as a custom provider in Codex 0.128+)
[model_providers.llama-swap]
name = "llama.cpp (local)"
base_url = "http://127.0.0.1:12434/v1"

# --- Sisyphus Pi (Raspberry Pi, lightweight models) ---
# SAME LIMITATION as llama-swap: does NOT work as custom provider.
# Pi models on Codex are unavailable until Responses API support lands in llama.cpp.
[model_providers.sisyphus]
name = "Pi LLM"
base_url = "http://192.168.3.8:8081/v1"

# ============================================================
# Profiles — Ollama Cloud (all working)
# Profile names with dots/hyphens use quoted TOML keys.
# Shell usage: codex -p 'glm-5.1' or codex -p kimi-k2.6
# ============================================================

# GLM 5.1 — default, great all-rounder
[profiles."glm-5.1"]
model = "glm-5.1:cloud"
model_provider = "ollama-cloud"

