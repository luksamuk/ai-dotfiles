# Codex CLI Configuration
# Source of truth: ~/git/ai-dotfiles/configs/codex/config.toml
# Runtime: ~/.codex/config.toml
# Sync: cp ~/git/ai-dotfiles/configs/codex/config.toml ~/.codex/config.toml
#
# IMPORTANT: Codex 0.128+ requires OpenAI Responses API for custom providers.
# llama.cpp/llama-swap only implements Chat Completions, NOT Responses API.
# This means llama-swap and Sisyphus profiles DO NOT WORK as custom providers.
# Use --oss --local-provider=ollama for Ollama models (cloud + local).
# See: https://github.com/openai/codex/discussions/7782

# ============================================================
# Default profile (Ollama cloud — free, fast, no local GPU)
# ============================================================
model = "glm-5.1:cloud"
model_provider = "ollama-cloud"

# ============================================================
# Provider definitions
# ============================================================

# --- Ollama Cloud (primary — API-routed, no local GPU) ---
# Works with Responses API. No wire_api needed (auto-detected).
[model_providers.ollama-cloud]
name = "Ollama Cloud"
base_url = "http://127.0.0.1:11434/v1"

# --- llama-swap local (RTX 3050, GGUF models on Navi) ---
# LIMITED: Codex requires Responses API but llama-swap only serves Chat Completions.
# Tool calls fail with: 'type' of tool must be 'function'
# WORKAROUND: Use --oss --local-provider=ollama and set OLLAMA_BASE_URL
# (Does NOT work as a custom provider in Codex 0.128+)
[model_providers.llama-swap]
name = "llama.cpp (local)"
base_url = "http://127.0.0.1:12434/v1"

# --- Sisyphus Pi (Raspberry Pi, lightweight models) ---
# SAME LIMITATION as llama-swap: does NOT work as custom provider.
# Pi models on Codex are unavailable until Responses API support lands in llama.cpp.
[model_providers.sisyphus]
name = "Pi LLM"
base_url = "http://192.168.3.8:8081/v1"

# ============================================================
# Profiles — Ollama Cloud (all working)
# ============================================================

# Default cloud (Ollama) — GLM 5.1
[profiles.cloud]
model = "glm-5.1:cloud"
model_provider = "ollama-cloud"

# GLM 5 (previous generation)
[profiles.glm5]
model = "glm-5:cloud"
model_provider = "ollama-cloud"

# Kimi K2.6 — strong coder
[profiles.kimi]
model = "kimi-k2.6:cloud"
model_provider = "ollama-cloud"

# Kimi K2.5 — vision-capable coding
[profiles.kimi25]
model = "kimi-k2.5:cloud"
model_provider = "ollama-cloud"

# MiniMax M2.7 — deep context, tool search
[profiles.m2.7]
model = "minimax-m2.7:cloud"
model_provider = "ollama-cloud"

# MiniMax M2.5 — coding specialist (SWE-Bench 79.7%)
[profiles.m2.5]
model = "minimax-m2.5:cloud"
model_provider = "ollama-cloud"

# DeepSeek V4 Pro — heavy reasoning
[profiles.deepseek]
model = "deepseek-v4-pro:cloud"
model_provider = "ollama-cloud"

# DeepSeek V4 Flash — fast reasoning
[profiles.deepseek-flash]
model = "deepseek-v4-flash:cloud"
model_provider = "ollama-cloud"

# Gemini 3 Flash — Google fast
[profiles.gemini]
model = "gemini-3-flash-preview:cloud"
model_provider = "ollama-cloud"

# Nemotron 3 Super — NVIDIA reasoning
[profiles.nemotron]
model = "nemotron-3-super:cloud"
model_provider = "ollama-cloud"

# Nemotron 3 Nano 30B — 1M context
[profiles.nematron-nano]
model = "nemotron-3-nano:30b-cloud"
model_provider = "ollama-cloud"

# Gemma 4 31B — Google MoE
[profiles.gemma4]
model = "gemma4:31b-cloud"
model_provider = "ollama-cloud"

# Qwen 3.5 — Alibaba reasoning+vision
[profiles.qwen]
model = "qwen3.5:cloud"
model_provider = "ollama-cloud"

# ============================================================
# Profiles — Local llama-swap (LIMITED — see note above)
# These profiles register the provider but tool-calling FAILS.
# Use OLLAMA_HOST=http://127.0.0.1:12434 codex --oss instead for local models.
# ============================================================

[profiles.local-qwen]
model = "qwen3.6-35b-moe"
model_provider = "llama-swap"

[profiles.local-gemma]
model = "gemma4-26b-moe"
model_provider = "llama-swap"

[profiles.local-gptoss]
model = "gpt-oss-20b"
model_provider = "llama-swap"

# ============================================================
# Profiles — Sisyphus Pi (LIMITED — same issue as llama-swap)
# ============================================================

[profiles.pi-qwen]
model = "qwen3-1.7b"
model_provider = "sisyphus"

# ============================================================
# Project trust
# ============================================================
[projects."/home/alchemist/tetris"]
trust_level = "trusted"

# ============================================================
# TUI
# ============================================================
[tui.model_availability_nux]
"gpt-5.5" = 1