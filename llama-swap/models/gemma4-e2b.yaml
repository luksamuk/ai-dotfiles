# -------------------------------------------
# GEMMA-4-E2B-QAT - Q4_0 Quantization-Aware Training
# Google official QAT checkpoint: trained with quantization simulation,
# preserves more quality than PTQ Q4_K_M at similar size.
# Text-only — no mmproj (vision handled by dedicated VLMs in fleet).
# -------------------------------------------
"gemma4-e2b":
  name: "Gemma 4 E2B"
  description: "Gemma 4 E2B with Quantization-Aware Training (Q4_0). Official Google checkpoint — higher quality than PTQ at same quant level."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/gemma-4-E2B_q4_0-it.gguf
    --no-mmproj
    --fit on
    --fit-target 1024
    --fit-ctx ${small_model_min_ctx}
    --ctx-size ${small_model_max_ctx}
    --temp 0.7
    --top-p 0.9
    --top-k 40
    --min-p 0.01
    --repeat-penalty 1.0
    --reasoning on
    --cache-type-k ${gemma_cache_k}
    --cache-type-v ${gemma_cache_v}
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~3.2 GB (Q4_0 QAT)"
    context: "32K-128K (dynamic)"
    vram_usage: "~3.2GB"
    source: "google/gemma-4-E2B-it-qat-q4_0-gguf"
    kv_cache: "q4_0 + attn_rot"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: gemma4
    parameters: 4650000000
    context_length: 131072
    embedding_length: 1536
    quantization: Q4_0_QAT
    note: "Google QAT checkpoint. Trained with quantization-aware training for Q4_0 format. Text-only — no mmproj."