# -------------------------------------------
# GEMMA-4-E2B - ik BACKEND (Hadamard KV cache)
# Switched from upstream to ik — upstream crashes with --fit on this model,
# and lacks --parallel-tool-calls which Gemma 4 needs for multi-tool calls.
# Upgraded from UD-Q3_K_XL (3.5 bpw) → Q4_K_M (4.5 bpw): +0.17GB for ~3% PPL improvement
# -------------------------------------------
"gemma4-e2b":
  name: "Gemma 4 E2B"
  description: "Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/gemma-4-E2B-it-Q4_K_M.gguf
    --jinja
    --parallel-tool-calls
    --fit
    --fit-margin 512
    --ctx-size ${small_model_max_ctx}
    --temp 0.7
    --top-p 0.9
    --top-k 40
    --min-p 0.01
    --repeat-penalty 1.0
    --reasoning on
    --cache-type-k q8_0
    --cache-type-v q4_0
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~2.89 GB (Q4_K_M)"
    context: "32K-128K (dynamic)"
    vram_usage: "~3.5GB VRAM (model + hadamard cache)"
    source: "unsloth/gemma-4-E2B-it-GGUF (Q4_K_M)"
    kv_cache: "q8_0 (K) + q4_0 (V) + hadamard (ik -khad/-vhad)"
    features:
      completion: true
      tools: true
      thinking: true
      vision: true
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: gemma4
    parameters: 4650000000
    context_length: 131072
    embedding_length: 1536
    quantization: Q4_K_M
    note: "Switched from upstream to ik — upstream crashes with --fit, lacks --parallel-tool-calls."