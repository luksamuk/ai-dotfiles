# -------------------------------------------
# GEMMA-4-E2B - upstream BACKEND (q4_0 KV cache)
# Upgraded from UD-Q3_K_XL (3.5 bpw) → Q4_K_M (4.5 bpw): +0.17GB for ~3% PPL improvement
# --no-mmproj: text-only mode (mmproj unused, saves VRAM)
# --fit on: dynamic GPU offloading, fits in 6GB VRAM with Q4_K_M
# --flash-attn on: faster attention on GPU
# Note: upstream does NOT support --parallel-tool-calls, but Gemma 4 template
# handles multiple tool calls natively via Jinja chat template.
# -------------------------------------------
"gemma4-e2b":
  name: "Gemma 4 E2B"
  description: "Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/gemma-4-E2B-it-Q4_K_M.gguf
    --no-mmproj
    --fit on
    --fit-target 1024
    --fit-ctx ${small_model_min_ctx}
    --ctx-size ${small_model_max_ctx}
    --temp 0.7
    --top-p 0.9
    --top-k 40
    --min-p 0.01
    --repeat-penalty 1.0
    --reasoning on
    --cache-type-k ${gemma_cache_k}
    --cache-type-v ${gemma_cache_v}
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~2.89 GB (Q4_K_M)"
    context: "32K-128K (dynamic)"
    vram_usage: "~3.2GB"
    source: "unsloth/gemma-4-E2B-it-GGUF (Q4_K_M)"
    kv_cache: "q4_0 + attn_rot"
    features:
      completion: true
      tools: true
      thinking: true
      vision: true
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: gemma4
    parameters: 4650000000
    context_length: 131072
    embedding_length: 1536
    quantization: Q4_K_M
    note: "Upgraded from UD-Q3_K_XL → Q4_K_M. ~3% PPL improvement at +0.17GB cost."