  # -------------------------------------------
  # QWEN3.5-9B - ik BACKEND (Hadamard KV cache)
  # Dense 9B params, UD-Q3_K_XL ~5.05GB.
  # Bee/TurboQuant segfaults with this model — use ik with hadamard instead.
  # --flash-attn auto: disables FA on short contexts for MoE/offload savings
  # KV cache: q8_0 (K) + q4_0 (V) + hadamard = quality near-fp16
  # --fit on --fit-target 512: dynamic GPU offload
  # Dual mode: base (chat, no think) and :think (reasoning)
  # Bee backup: _disabled/qwen3.5-9b-bee.yaml (seg fault with turbo3_tcq)
  # -------------------------------------------
  "qwen3.5-9b":
    name: "Qwen3.5 9B"
    description: "Multimodal reasoning, coding, and agentic chat (ik + hadamard)"
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-UD-Q3_K_XL.gguf
      # No --no-mmproj: ik doesn't support this flag (upstream-only)
      --fit
      --fit-margin 512
      --jinja
      --parallel-tool-calls
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k q8_0
      --cache-type-v q4_0
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~5.05 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5GB VRAM (text-only, ik with hadamard cache)"
      source: "unsloth/Qwen3.5-9B-GGUF"
      kv_cache: "q8_0 (K) + q4_0 (V) + hadamard (ik -khad/-vhad)"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 8950000000
      context_length: 262144
      embedding_length: 4096
      quantization: Q3_K_XL
        # vision: disabled temporarily — mmproj + fit doesn't handle offload yet
      warning: "Vision disabled temporarily. Bee/TurboQuant segfaults with this model — use ik backend."