  # -------------------------------------------
  # MINISTRAL-3-3B — Mistral Small 3.2 family
  # -------------------------------------------
  # Dense 3.4B params, text-only (vision/mmproj crashes on CUDA — mistral3 arch)
  # Mistral's latest edge model — tool calling, 256K context
  # Architecture: mistral3 — ONLY supported in llama.cpp upstream (NOT ik_llama.cpp)
  # Uses ${llama_server} (upstream), NOT ${ik_llama_server}
  # UD-Q5_K_XL: 2.31 GB — fits entirely in VRAM with --fit
  # --fit on: auto offload layers to GPU, keeps KV cache in VRAM
  # --parallel 4 --cont-batching: concurrent requests
  # --ctx-size 131072: 128K context (model supports 256K, 128K practical for 3B)
  # Tool calling: mistral template (chat_template=ministral_3)
  # NOTE: mmproj crashes llama-server with CUDA alloc error (~13.9 GB buffer).
  #   Vision disabled until bug is fixed or mmproj is optimized for mistral3.
  #   --n-gpu-layers 99 causes OOM with 131K ctx — use --fit on instead.
  # Apache 2.0 license
  "ministral-3-3b":
    name: "Ministral 3 3B"
    description: "Edge tool-calling + 128K context (UD-Q5_K_XL, text-only)"
    tags: ["think+tools"]
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Ministral-3-3B-Instruct-2512-UD-Q5_K_XL.gguf
      --fit on
      --fit-ctx 8192
      --ctx-size 131072
      --parallel 4
      --cont-batching
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --jinja
    size: "2.31"