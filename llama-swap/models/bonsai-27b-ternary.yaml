# -------------------------------------------
# BONSAI 27B TERNARY — PrismML ternary {−1,0,+1} LLM (Q2_0_g128, bonsai-llama backend)
# prism-ml/Ternary-Bonsai-27B-gguf — Qwen3.6-27B base, 27.3B ternary weights at 1.71 bpw.
# Architecture: hybrid attention (~75% linear / ~25% full attention), SwiGLU MLP, RoPE, RMSNorm.
#   64 blocks, full-attention cache on only 16 of 64 layers — enables 262K context on-device.
# Weight format: GGUF Q2_0_g128 — {−1,0,+1} in 2-bit slots with FP16 group-wise scaling (128-group).
#   Custom kernels required: PrismML-Eng/llama.cpp fork (CUDA, Metal, CPU).
#   Upstream llama.cpp does NOT support Q2_0_g128.
# Vision: HQQ 4-bit mmproj (Q8_0 container), loaded only on image input.
# DSpark speculative decoding: draft-dspark type, Q4_1 drafter layer (1.95 GB).
#   1.34x speedup on CUDA (H100: 98 → 132 tok/s). Optional.
# Apache 2.0 license.
#
# Quantization: Q2_0_g128 (ternary) — 6.7 GB on disk, ~7.2 GB deployed.
#   1.71 bits/weight. 94.6% of FP16 intelligence retained (80.49 avg on 15 benchmarks).
#   Math: 93.40 (vs 95.33 FP16). Coding: 85.96 (vs 88.74). Agentic: 74.01 (vs 80.00).
#
# VRAM strategy for RTX 3050 6GB (~5.1GB usable):
#   Model weights (7.2 GB) exceed VRAM — partial GPU offload with --fit on.
#   --fit adjusts -ngl and ctx to fit. KV cache q4_0 (4-bit) to minimize context overhead.
#   Hybrid attention backbone means KV cache only grows on 16 of 64 layers — very efficient.
#   DSpark drafter is OFF by default (adds 1.95 GB) — enable only if VRAM allows.
#
# Backend: bonsai-llama.cpp (PrismML fork) — NOT upstream, NOT ik_llama.
#   Build: ~/git/bonsai-llama.cpp/build/bin/llama-server
#   Shared libs in build/bin/ (libllama.so, libggml-cuda.so, etc.) — RPATH set in binary.
#
# Sampling: temp 0.7, top_p 0.95, top_k 20 per model card (thinking mode).
#
# SMOKE TEST: (pending)
# -------------------------------------------
"bonsai-27b-ternary":
  name: "Bonsai 27B Ternary"
  description: "PrismML's ternary 27B reasoning model — Qwen3.6-27B with 1.71-bit weights, full thinking/reasoning/agentic capabilities at 7.2 GB. 95% of FP16 intelligence retained. Hybrid attention enables 262K context."
  cmd: |
    ${bonsai_llama_server} --port ${PORT}
    --model ${models_dir}/bonsai-27b-ternary/Ternary-Bonsai-27B-Q2_0.gguf
    --jinja
    --reasoning on
    --fit on
    --fit-target ${vram_margin}
    --fit-ctx 8192
    --ctx-size 32768
    --temp 0.7
    --top-p 0.95
    --top-k 20
    --repeat-penalty 1.0
    --parallel 1
    --cache-type-k ${large_cache_k}
    --cache-type-v ${large_cache_v}
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p, top_k"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.95
        top_k: 20
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.7
        top_p: 0.95
        top_k: 20
  ttl: 300
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 32768
  metadata:
    size: "~7.2 GB (Q2_0_g128 ternary) + 0.63 GB mmproj"
    context: "8K-262K (dynamic with --fit, 4-bit KV cache)"
    vram_usage: "~7.2 GB weights (partial GPU offload) + ~0.5-1 GB KV cache"
    source: "prism-ml/Ternary-Bonsai-27B-gguf (Q2_0 + mmproj Q8_0)"
    kv_cache: "q4_0"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen3
    parameters: 27300000000
    context_length: 262144
    embedding_length: 3584
    quantization: Q2_0_g128 (ternary 1.71 bpw)