  # Edge vision-language model — 0.22 GB + 0.18 GB mmproj, fits entirely in VRAM
  "lfm2.5-vl-450m":
    name: "LFM2.5-VL 450M"
    description: "Edge vision-language model for object detection and captioning"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-VL-450M-Q4_0.gguf
      --jinja
      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.1
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --reasoning off
      --cache-type-k f16
      --cache-type-v f16
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      size: "0.22 GB + mmproj"
      context: "32K-128K (dynamic)"
      vram_usage: "~0.5GB"
      source: "LiquidAI/LFM2.5-VL-450M-GGUF"
      kv_cache: "f16 (vision, precision priority)"
      features:
        vision: true
