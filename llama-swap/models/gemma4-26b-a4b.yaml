# -------------------------------------------
# GEMMA-4-26B-A4B - MoE REASONING + CODING (QAT Q4_0, upstream backend)
# Google Q4_0 Quantization-Aware Training — MoE 26B params, 4B active per token.
# QAT won vs APEX on 26B: quality=TIE, speed=28 vs 27 tok/s, size=14.4 vs 15.5 GB.
# APEX I-Compact deleted — crashes on ik (mul_mat_q_id CUDA illegal memory access).
# Upstream backend: --fit on handles compute buffer, --flash-attn on stable.
# --no-mmproj: text-only (mmproj crashes on CUDA, #21402)
# --ctx-size 131072: native 262144 too large for 6GB, 131072 fits with --fit on
# --fit-target 96: leave 96 MiB headroom for system/other processes
# --fit-ctx 16384: minimum pre-allocated context at startup
# Dual mode: base (chat, temp 0.7) and :think (reasoning, temp 1.0)
# head_dim=256 → attn_rot ✅, iSWA fix (b8815+) → q4_0 cache works now
# Note: upstream doesn't support --parallel-tool-calls. Jinja template handles tool calling.
# -------------------------------------------
"gemma4-26b-a4b":
  name: "Gemma 4 26B"
  description: "Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/gemma-4-26B_q4_0-it.gguf
    --no-mmproj
    --fit on
    --fit-target 96
    --fit-ctx 16384
    --ctx-size 131072
    --timeout 0
    --temp 1.0
    --top-p 0.95
    --reasoning on
    --cache-type-k q4_0
    --cache-type-v q4_0
    --flash-attn on
    --jinja
    --parallel 2
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.95
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 1.0
        top_p: 0.95
  ttl: 300
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 262144
  metadata:
    size: "~14.4 GB (Q4_0 QAT)"
    context: "16K-131K (dynamic)"
    vram_usage: "~5GB VRAM + ~9GB RAM (upstream --fit on auto-offload)"
    source: "google/gemma-4-26B-A4B-it-qat-q4_0-gguf"
    kv_cache: "q4_0 + attn_rot"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: gemma4
    parameters: 25230000000
    context_length: 262144
    embedding_length: 2816
    quantization: Q4_0_QAT
    warning: "Vision disabled — Gemma 4 mmproj crash on CUDA. Text-only."