  # -------------------------------------------
  # WEBWORLD-8B — Web World Model (Qwen3-8B fine-tune)
  # Qwen/WebWorld-8B — predicts next web page state given current state + action
  # Trained on 1M+ real web interaction trajectories
  # Architecture: qwen3 — causes SEGFAULT in ik_llama.cpp, use upstream
  # Supports: A11y Tree, HTML, XML, Markdown, NL state representations
  # Action space: click(bid), fill(bid,text), goto(url), scroll(dx,dy), keyboard_press(key)
  # NOT a chatbot — requires specialized prompt format (world model system prompt + state/action)
  # Multi-turn trajectory simulation (30+ steps) must be implemented client-side
  # Paper: arXiv 2602.14721
  # i1-Q5_K_M ~5.9GB — fits in VRAM with --fit
  # Uses ${llama_server} (upstream) — ik_llama.cpp segfaults with qwen3 GGUFs
  # No tool calling, no vision, no thinking — pure world model for web simulation
  # Apache 2.0 license
  # -------------------------------------------
  "webworld-8b":
    name: "WebWorld 8B"
    description: "Web world model, predicts next page state (i1-Q5_K_M, upstream)"
    tags: ["world-model"]
    cmd: |
        ${llama_server} --port ${PORT}
        --model ${models_dir}/WebWorld-8B.i1-Q5_K_M.gguf
        --fit on
        --fit-ctx 8192
        --fit-target ${vram_margin}
        --ctx-size 32768
        --parallel 2
        --cont-batching
        --temp 0.6
        --top-p 0.9
        --top-k 20
        --min-p 0.01
        --repeat-penalty 1.05
        --cache-type-k ${small_cache_k}
        --cache-type-v ${small_cache_v}
        --flash-attn on
        --metrics
    ttl: 60
    metadata:
        size: "~5.9 GB (i1-Q5_K_M)"
        context: "8K-32K (dynamic)"
        vram_usage: "~5.5GB (model + cache)"
        source: "mradermacher/WebWorld-8B-i1-GGUF (i1-Q5_K_M)"
        kv_cache: "q8_0 + attn_rot"
        features:
            thinking: false
            vision: false
            tools: false
        warning: "ik_llama.cpp segfaults with this model — use llama.cpp upstream. Not a chatbot — requires specialized world model prompts."