  # -------------------------------------------
  # PHI-4-MINI-INSTRUCT — Microsoft dense 3.8B tool-calling model
  # Dense 3.8B params (200K vocab), 32 layers, GQA 32Q/8KV
  # Architecture: phi3 (GGUF) — supported in ALL backends
  # Tool calling: Phi-style <|tool|>...</|/tool|> tags with JSON schemas
  #   llama.cpp --jinja + phi4_mini_json parser handles conversion
  #   Different format from Qwen3/XML = likely immune to #22684 multi-turn bug
  # MIT license
  # Q4_K_M ~2.4 GB — fits comfortably in 6GB VRAM
  # head_dim=96 → attn_rot ❌ (96%64≠0) — use q8_0 + q8_0 cache
  # No enable_thinking toggle (instruct variant only — reasoning model is separate)
  # 128K native context (sliding_window 262144)
  # -------------------------------------------
  "phi4-mini-instruct":
    name: "Phi-4 Mini Instruct"
    description: "Dense 3.8B tool-calling, phi3 arch (Q4_K_M, upstream)"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Phi-4-mini-instruct-Q4_K_M.gguf
      --jinja
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size 131072
      --parallel 4
      --cont-batching
      --temp ${code_temp}
      --top-p ${code_top_p}
      --top-k ${code_top_k}
      --min-p ${code_min_p}
      --repeat-penalty ${code_repeat_penalty}
      --cache-type-k q8_0
      --cache-type-v q8_0
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
        size: "~2.4 GB (Q4_K_M)"
        context: "64K-128K (dynamic)"
        vram_usage: "~3.5GB (model + cache)"
        source: "unsloth/Phi-4-mini-instruct-GGUF (Q4_K_M)"
        kv_cache: "q8_0 + q8_0 (no attn_rot — head_dim=96)"
        features:
            thinking: false
            vision: false
            tools: true
        warning: "No thinking/reasoning mode (instruct-only variant). Tool calling uses Phi-style <|tool|> tags, NOT Qwen3 XML. attn_rot not supported (head_dim=96)."