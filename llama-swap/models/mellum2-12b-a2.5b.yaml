# -------------------------------------------
# MELLUM2-12B-A2.5B — JETBRAINS MoE CODING + REASONING
# MoE 12B params, 2.5B ativo por token. 64 experts, top-8 routing.
# GQA 32Q/4KV, sliding window 1024, vocab 98K
# Apache 2.0 license
# Variantes via setParamsByID: instruct (chat), :think (reasoning)
# Upstream llama.cpp required — Mellum arch added in b9484 (PR #23966)
# Upstream b9484: no --tool-call-parser, no --reasoning-parser (ik-only flags)
# Tool calling and reasoning handled by chat template --jinja
# RTX 3050 6GB: --fit on with partial offload
# -------------------------------------------
"mellum2-12b-a2.5b":
  name: "Mellum 2 12B MoE"
  description: "JetBrains coding MoE — 12B total, 2.5B active. Excels at tool use, agentic workflows, code generation and reasoning."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/Mellum2-12B-A2.5B-Thinking-Q4_K_M.gguf
    --jinja
    --fit on
    --fit-target 96
    --fit-ctx 16384
    --ctx-size 131072
    --temp 0.6
    --top-p 0.95
    --top-k 20
    --min-p 0.1
    --repeat-penalty 1.05
    --reasoning on
    --cache-type-k q8_0
    --cache-type-v q4_0
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p, top_k"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.6
        top_p: 0.95
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.95
  ttl: 300
  metadata:
    size: "~7.6 GB (Q4_K_M)"
    context: "16K-131K (dynamic)"
    vram_usage: "~4.5GB VRAM + ~3GB RAM (partial expert offload)"
    source: "RJ000/Mellum2-12B-A2.5B-Thinking-GGUF (Q4_K_M)"
    note: "Community quant (RJ000). Upstream-only — Mellum arch not yet in ik. Testing phase."
    kv_cache: "q8_0 + q4_0"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: mellum
    parameters: 12000000000
    context_length: 131072
    embedding_length: 2304
    quantization: Q4_K_M