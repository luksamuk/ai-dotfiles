# -------------------------------------------
# SMOLVLM2-500M-VIDEO — HuggingFace ultra-light video VLM
# 500M params, llama arch, SmolLM2-360M backbone + vision encoder
# Trained for video understanding (frames from webcam/video feeds)
# Very small — ~0.7GB VRAM total, coexists with any fleet model
# No grounding training — uses prompt engineering for bounding boxes
# Backend: upstream llama.cpp (llama arch + mtmd multimodal pipeline)
# -------------------------------------------
"smolvlm2-500m-video":
  name: "SmolVLM2 500M Video"
  description: "HuggingFace ultra-light video VLM — 500M params, trained for video understanding. Runs on minimal hardware."
  tags: ["vision"]
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/smolvlm2-500m-video/SmolVLM2-500M-Video-Instruct-Q8_0.gguf
    --mmproj ${models_dir}/smolvlm2-500m-video/mmproj-SmolVLM2-500M-Video-Instruct-Q8_0.gguf
    --media-path ${media_path}
    --jinja
    --fit on
    --fit-target ${vram_margin}
    --fit-ctx 4096
    --ctx-size 8192
    --parallel 4
    --cont-batching
    --temp ${default_temp}
    --top-p 0.9
    --top-k 40
    --min-p ${default_min_p}
    --repeat-penalty 1.1
    --cache-type-k f16
    --cache-type-v f16
    --flash-attn on
    --metrics
  ttl: 60
  health_check_timeout: 300
  capabilities:
    in: ['text', 'image']
    out: ['text']
    tools: false
    reranker: false
    context: 8192
  metadata:
    size: "437 MB (Q8_0) + 109 MB mmproj"
    context: "8K (video-optimized)"
    vram_usage: "~0.7 GB (model + mmproj + cache)"
    source: "ggml-org/SmolVLM2-500M-Video-Instruct-GGUF (Q8_0 + mmproj Q8_0)"
    note: "Video-trained VLM. No native grounding — requires prompt engineering for bbox output."
    kv_cache: "f16"
    features:
      completion: true
      tools: false
      thinking: false
      vision: true
      embedding: false
      insert: false
      audio: false
      image: true
    architecture: llama
    parameters: 500000000
    context_length: 8192
    embedding_length: 1024
    quantization: Q8_0