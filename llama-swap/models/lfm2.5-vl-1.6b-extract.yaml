# -------------------------------------------
# LFM2.5-VL-1.6B-EXTRACT — Structured Vision Extraction
# Liquid AI — VLM that returns JSON, not free-form text
# Pass image + YAML field list → get structured JSON object
# Architecture: lfm2 — upstream llama.cpp ONLY (ik does not support lfm2)
# Use cases: document scanning, dashboard reading, industrial inspection
# -------------------------------------------
"lfm2.5-vl-1.6b-extract":
  name: "LFM2.5-VL 1.6B Extract"
  description: "Vision-language model specialized in structured extraction. Pass an image and a list of fields, get back a JSON object. No parsing layer needed."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/LFM2.5-VL-1.6B-Extract-Q4_K_M.gguf
    --jinja
    --mmproj ${models_dir}/mmproj-LFM2.5-VL-1.6B-Extract-F16.gguf
    --media-path ${media_path}
    --fit on
    --fit-target ${vram_margin}
    --fit-ctx ${small_model_min_ctx}
    --ctx-size ${small_model_max_ctx}
    --temp 0.1
    --top-p 0.9
    --top-k 40
    --min-p 0.15
    --repeat-penalty 1.05
    --reasoning off
    --cache-type-k f16
    --cache-type-v f16
    --flash-attn on
    --metrics
  ttl: 60
  metadata:
    size: "0.70 GB (Q4_K_M) + 0.82 GB mmproj"
    context: "32K (dynamic)"
    vram_usage: "~2.7GB"
    source: "LiquidAI/LFM2.5-VL-1.6B-Extract-GGUF"
    kv_cache: "f16"
    features:
      completion: true
      tools: false
      thinking: false
      vision: true
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: lfm2
    parameters: 1600000000
    context_length: 128000
    embedding_length: 2048
    quantization: Q4_K_M
    note: "Structured extraction VLM — returns JSON instead of free-form text. lfm2 arch requires upstream llama.cpp (not ik)."