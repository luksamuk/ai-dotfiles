# -------------------------------------------
# QWEN3.5-4B - Bee BACKEND (TurboQuant KV cache)
# BeeLlama.cpp with turbo3_tcq KV cache (~5x compression, PPL ≈ fp16)
# head_dim=128 → attn_rot ✅ (auto-activates on Bee with quantized cache)
# MoQ-3.75 quant (~1.92GB), fits entirely in VRAM
# Dual mode: base (chat) and :think (reasoning)
# -------------------------------------------
"qwen3.5-4b-bee":
  unlisted: true
  name: "Qwen3.5 4B (Bee)"
  description: "Qwen 3.5 4B MoQ-3.75 — BeeLlama.cpp backend with TurboQuant turbo3_tcq KV cache."
  cmd: |
    ${bee_server} --port ${PORT}
    --model ${models_dir}/MoQ-3.75.gguf
    --jinja
    --fit on
    --fit-target 768
    --ctx-size 131072
    --timeout 0
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k turbo3_tcq
    --cache-type-v turbo3_tcq
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~1.92 GB (MoQ-3.75)"
    context: "64K-128K (dynamic, TurboQuant)"
    vram_usage: "~2.8GB VRAM (model + turbo3_tcq cache)"
    source: "kaitchup/Qwen3.5-4B-GGUF-MoQ (MoQ-3.75)"
    kv_cache: "turbo3_tcq (BeeLlama.cpp — ~5x compression)"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 4210000000
    context_length: 262144
    embedding_length: 2560
    quantization: MoQ-3.75
    note: "BeeLlama backend with TurboQuant. Was on ik for -khad/-vhad; Bee has TurboQuant instead."