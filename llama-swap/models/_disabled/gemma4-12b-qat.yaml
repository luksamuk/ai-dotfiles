# -------------------------------------------
# GEMMA-4-12B-QAT - Q4_0 Quantization-Aware Training
# Google official QAT checkpoint for Gemma 4 12B dense model.
# Benchmark-only: 6.98 GB dense, requires CPU offload on RTX 3050 6GB.
# QAT won benchmark vs PTQ Q4_0 by 1 point (18 vs 17/25 Snake).
# NOT for regular fleet use — too slow (~12 tok/s with offload).
# Only upstream llama.cpp supported (ik crashes: fused KV in MoE layers).
# ik #1921 unblocked head_dim 512 + gqa_ratio % 8 — 12B loads but QAT fused KV still crashes.
# Re-benchmark pending with ik updated (t0002-737 → 6b9de3db).
# -------------------------------------------
"gemma4-12b-qat":
  unlisted: true
  name: "Gemma 4 12B QAT"
  description: "Gemma 4 12B with Quantization-Aware Training (Q4_0). Benchmark-only — dense 12B requires CPU offload on 6GB VRAM. QAT won vs PTQ by 1pt (18 vs 17)."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/gemma-4-12b-it-qat-q4_0.gguf
    --no-mmproj
    --fit on
    --fit-target 512
    --ctx-size 8192
    --temp 0.7
    --top-p 0.9
    --top-k 40
    --min-p 0.01
    --repeat-penalty 1.0
    --reasoning on
    --cache-type-k q4_0
    --cache-type-v q4_0
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~6.98 GB (Q4_0 QAT)"
    context: "8K (limited by VRAM)"
    vram_usage: "~6.98GB + offload to RAM"
    source: "google/gemma-4-12B-it-qat-q4_0-gguf"
    kv_cache: "q4_0 + attn_rot"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: gemma4
    parameters: 12000000000
    context_length: 262144
    embedding_length: 3072
    quantization: Q4_0_QAT
    note: "Google QAT checkpoint. Dense 12B — requires CPU offload on RTX 3050. Fused KV in MoE layers crashes ik_llama.cpp. Upstream only."