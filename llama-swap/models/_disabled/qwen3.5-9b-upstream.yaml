"qwen3.5-9b-upstream":
  name: "Qwen3.5 9B"
  description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/Qwen3.5-9B-UD-Q3_K_XL.gguf
    --no-mmproj
    --fit on
    --fit-target 512
    --fit-ctx ${small_model_min_ctx}
    --ctx-size ${small_model_max_ctx}
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k ${small_cache_k}
    --cache-type-v ${small_cache_v}
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~5.05 GB (UD-Q3_K_XL Dynamic 2.0)"
    context: "64K-128K (dynamic)"
    vram_usage: "~5GB VRAM (text-only, mmproj offload needs fix)"
    source: "unsloth/Qwen3.5-9B-GGUF"
    kv_cache: "q8_0 + attn_rot"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 8950000000
    context_length: 262144
    embedding_length: 4096
    quantization: UD-Q3_K_XL
      # vision: disabled temporarily — mmproj + fit doesn't handle offload yet
    warning: "Vision disabled temporarily — mmproj offload with --fit causes OOM"
