# -------------------------------------------
# GEMMA-4-E2B - Bee BACKEND (TurboQuant KV cache)
# BeeLlama.cpp with turbo3_tcq KV cache (~5x compression, PPL ≈ fp16)
# head_dim=256 → attn_rot ✅ (auto-activates with quantized cache on Bee)
# --n-gpu-layers 99: model fits entirely in VRAM (~2.5GB)
# No mmproj (text-only) — same as upstream config
# Dual mode: base (chat) and :think (reasoning)
# -------------------------------------------
"gemma4-e2b-bee":
  name: "Gemma 4 E2B (Bee)"
  description: "Gemma 4 E2B QAT — BeeLlama.cpp backend with TurboQuant turbo3_tcq KV cache."
  cmd: |
    ${bee_server} --port ${PORT}
    --model ${models_dir}/gemma-4-E2B-it-qat-UD-Q4_K_XL.gguf
    --no-mmproj
    --fit on
    --fit-target 768
    --ctx-size ${small_model_max_ctx}
    --timeout 0
    --temp 0.7
    --top-p 0.9
    --top-k 40
    --min-p 0.01
    --repeat-penalty 1.0
    --reasoning on
    --cache-type-k turbo3_tcq
    --cache-type-v turbo3_tcq
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~2.5 GB (UD-Q4_K_XL)"
    context: "64K-128K (dynamic, TurboQuant)"
    vram_usage: "~2.5GB VRAM (model + turbo3_tcq cache)"
    source: "unsloth/gemma-4-E2B-it-qat-GGUF"
    kv_cache: "turbo3_tcq (BeeLlama.cpp — ~5x compression)"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: gemma4
    parameters: 4650000000
    context_length: 131072
    embedding_length: 1536
    quantization: UD-Q4_K_XL
    note: "BeeLlama backend with TurboQuant. No --fit (Bee doesn't have it). --n-gpu-layers 99 for full VRAM fit."