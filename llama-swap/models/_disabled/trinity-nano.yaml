# -------------------------------------------
# Trinity Nano Preview (Arcee) - UPSTREAM backend
# 6B MoE (128 experts, 8 active + 1 shared = ~1B active/token), Q5_K_M ~4.1 GB
# Context: 128K (rope theta 10000, head_dim 128)
# Vocab: 200K, 56 layers, 1024 embed, 8 heads (GQA: 2 KV heads), moe_intermediate 256
# Features: tool calling, reasoning (preview — experimental, may be unstable)
# License: OpenMDW-1.1 (permissive, commercial use OK)
# Backend: upstream llama.cpp b766+ (AfmoeForCausalLM arch)
# -------------------------------------------
  "trinity-nano":
    unlisted: true
    name: "Trinity Nano Preview"
    description: "Arcee 6B MoE (1B active), reasoning + tool calling preview (OpenMDW-1.1)"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Trinity-Nano-Preview-Q5_K_M.gguf
      --fit on --fit-target 768 --fit-ctx 65536
      --ctx-size 32768
      --parallel 1
      --temp 0.3
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --cache-type-k q8_0
      --cache-type-v q4_0
      --flash-attn on
      --n-predict -1
      --jinja
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          temperature: 0.3
          min_p: 0.15
    ttl: 60
    metadata:
      size: "~4.1 GB (Q5_K_M)"
      context: "128K"
      vram_usage: "~5GB VRAM (4.1 GB model + KV)"
      source: "arcee-ai/Trinity-Nano-Preview-GGUF"
      kv_cache: "q8_0 (K) + q4_0 (V)"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen3
      parameters: 600000000
      context_length: 40960
      embedding_length: 896
      quantization: Q8_0
      license: "OpenMDW-1.1"
      note: "Preview model — experimental, may be unstable. AfmoeForCausalLM arch, upstream b766+."