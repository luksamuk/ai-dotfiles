# -------------------------------------------
# MINICPM5-1B — OpenBMB small dense model
# LlamaForCausalLM (standard arch), GQA 16Q/2KV, 24 layers
# 1.08B params, 131K context, think/no-think dual mode
# Tool calling: XML format <function name="X"><param name="Y">val</param></function>
# llama.cpp bug #23781: tool calling broken (arg_name_suffix inference)
# Chat + think mode work fine; tool calling awaiting upstream fix
# Chat template built into GGUF works correctly in llama.cpp v712+
# ⚠️ NEVER use custom chat template — causes garbage output
# -------------------------------------------
"minicpm5-1b":
  name: "MiniCPM5 1B"
  description: "Dense 1B Transformer built for on-device deployment, designed for local assistants, coding agents, tool-use workflows, and hybrid reasoning."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/MiniCPM5-1B-Q8_0.gguf
    --jinja
    --fit on
    --fit-target ${vram_margin}
    --fit-ctx ${small_model_min_ctx}
    --ctx-size ${small_model_max_ctx}
    --temp 0.3
    --top-p 0.9
    --top-k 40
    --min-p 0.15
    --repeat-penalty 1.05
    --cache-type-k ${small_cache_k}
    --cache-type-v ${small_cache_v}
    --flash-attn on
    --metrics
  ttl: 60
  metadata:
    size: "~1.1 GB (Q8_0)"
    context: "32K-128K (dynamic)"
    vram_usage: "~1.8GB (model + cache)"
    source: "openbmb/MiniCPM5-1B-GGUF (Q8_0)"
    note: "Tool calling broken (llama.cpp bug #23781). Chat + think work fine. NEVER use custom chat template."
    kv_cache: "q8_0"
    features:
      completion: true
      tools: false
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: llama
    parameters: 1080000000
    context_length: 131072
    embedding_length: 1536
    quantization: Q8_0