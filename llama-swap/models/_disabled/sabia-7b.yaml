# -------------------------------------------
# SABIA-7B — Maritaca AI Portuguese Language Model
# Base (pretrained) model, LLaMA-1-7B architecture, same tokenizer
# Trained on Portuguese subset of ClueWeb22 (7B tokens additional training)
# Context: 2048 tokens (native LLaMA-1 context, no rope scaling)
# No chat template, no tool calling, no reasoning — completion only
# Backend: upstream llama.cpp (llama arch, universally supported)
# Q4_K_M ~4.08 GB — fits entirely in 6GB VRAM, no offload needed
# attn_rot compatible: head_dim=128, 128%64==0
# -------------------------------------------
"sabia-7b":
  name: "Sabiá 7B"
  description: "Maritaca AI's Portuguese language model — LLaMA-1-7B architecture, pretrained on Portuguese ClueWeb22. Base completion model, 2048 context."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/sabia-7b-Q4_K_M.gguf
    --fit on
    --fit-target ${vram_margin}
    --ctx-size 2048
    --parallel 1
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --repeat-penalty ${default_repeat_penalty}
    --cache-type-k ${small_cache_k}
    --cache-type-v ${small_cache_v}
    --flash-attn on
    --spec-type ngram-mod
      --spec-ngram-mod-n-match 24
      --spec-ngram-mod-n-min 48
      --spec-ngram-mod-n-max 64
      --metrics
  health_check_timeout: 300
  ttl: 60
  capabilities:
    in: ['text']
    out: ['text']
    tools: false
    reranker: false
    context: 2048
  metadata:
    size: "~4.08 GB (Q4_K_M)"
    context: "2048 (native LLaMA-1)"
    vram_usage: "~4.7GB (model + cache, fits in VRAM)"
    source: "RichardErkhov/maritaca-ai_-_sabia-7b-gguf (Q4_K_M)"
    kv_cache: "q8_0 + q8_0"
    features:
      completion: true
      tools: false
      thinking: false
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: llama
    parameters: 7000000000
    context_length: 2048
    embedding_length: 4096
    quantization: Q4_K_M
    note: "Portuguese base model (not instruction-tuned). LLaMA-1-7B architecture, same tokenizer. Completion-only, no chat template. Trained on Portuguese ClueWeb22 subset. 2048 token native context."