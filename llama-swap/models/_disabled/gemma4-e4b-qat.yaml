# -------------------------------------------
# GEMMA-4-E4B-QAT - Q4_0 Quantization-Aware Training
# Google official QAT checkpoint: trained with quantization simulation,
# preserves more quality than PTQ Q4_K_M at similar size.
# Text-only — no mmproj (vision handled by dedicated VLMs in fleet).
# Uses ik backend with Hadamard cache for quality (same as PTQ variant).
# -------------------------------------------
"gemma4-e4b-qat":
  unlisted: true
  name: "Gemma 4 E4B QAT"
  description: "Gemma 4 E4B with Quantization-Aware Training (Q4_0). Official Google checkpoint — higher quality than PTQ at same quant level."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/gemma-4-E4B_q4_0-it.gguf
    # No --no-mmproj: ik doesn't support this flag (upstream-only)
    --fit
    --fit-margin 512
    --jinja
    --parallel-tool-calls
    --ctx-size ${small_model_max_ctx}
    --temp 0.7
    --top-p 0.9
    --top-k 40
    --min-p 0.01
    --repeat-penalty 1.0
    --reasoning on
    --cache-type-k q8_0
    --cache-type-v q4_0
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~5.15 GB (Q4_0 QAT)"
    context: "64K-128K (dynamic)"
    vram_usage: "~5.7GB VRAM"
    source: "google/gemma-4-E4B-it-qat-q4_0-gguf"
    kv_cache: "q8_0 + q4_0 hadamard"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: gemma4
    parameters: 7520000000
    context_length: 131072
    embedding_length: 2560
    quantization: Q4_0_QAT
    note: "Google QAT checkpoint. Trained with quantization-aware training for Q4_0 format. Text-only — no mmproj."