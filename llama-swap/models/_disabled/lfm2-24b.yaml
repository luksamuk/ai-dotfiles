  # -------------------------------------------
  # LFM2-24B-A2B - MoE HYBRID (CONV + GQA + MOE)
  # Liquid AI's 24B MoE — 2.3B active per token, 64 experts top-4 routing
  # 40 layers: 30 conv + 10 GQA (first 2 dense for stability)
  # Hybrid architecture: NOT a pure transformer, conv blocks replace most attention
  # Liquid AI recommends: temp=0.3, min_p=0.15, repeat_penalty=1.05
  # head_dim=128 → attn_rot ✅ (128%64==0)
  # Architecture: lfm2moe (upstream llama.cpp b8145+, ik_llama.cpp DOES NOT SUPPORT)
  # Using llama_server (upstream): no pinned memory for expert offload = slower than ik
  # Q4_K_M ~14.4GB → heavy offload to RAM (~9GB), fits 32GB total system
  # Context ceiling: 32K (LFM2 limitation, not our hardware)
  # Tool calling reliability: INCONSISTENT — MoE varies, sometimes hallucinates instead of calling tools
  # -------------------------------------------
  # UNLISTED: tool-calling disappointing, superseded by lfm2.5-1.2b Instruct for edge use cases. Disk freed.
  "lfm2-24b":
    name: "LFM2 24B"
    description: "Hybrid MoE — conv+GQA+MoE, 2.3B active/token (llama.cpp upstream)"
    unlisted: true
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2-24B-A2B-Q4_K_M.gguf
      --jinja
      --no-mmproj
      --fit on
      --fit-target 256
      --fit-ctx 16384
      --ctx-size 32768
      --temp 0.3
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
    ttl: 120
    metadata:
      size: "~14.4 GB (Q4_K_M)"
      context: "16K-32K (dynamic, 32K max)"
      vram_usage: "~5GB VRAM + ~9GB RAM (MoE offload, upstream llama.cpp)"
      source: "LiquidAI/LFM2-24B-A2B-GGUF (Q4_K_M)"
      kv_cache: "q4_0 + attn_rot"
      features:
        thinking: false
        vision: false
        tools: true
      warning: "ik_llama.cpp does NOT support lfm2moe arch — running on upstream llama_server without pinned memory. 32K context ceiling (model limitation)."
