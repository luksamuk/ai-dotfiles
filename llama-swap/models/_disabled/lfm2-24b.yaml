"lfm2-24b":
  name: "LFM2 24B"
  description: "LFM2 is a family of hybrid models designed for on-device deployment. LFM2-24B-A2B is the largest, scaling to 24B parameters with only 2B active per token."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/LFM2-24B-A2B-Q4_K_M.gguf
    --jinja
    --no-mmproj
    --fit on
    --fit-target 256
    --fit-ctx 16384
    --ctx-size 32768
    --temp 0.3
    --top-p 0.9
    --top-k 40
    --min-p 0.15
    --repeat-penalty 1.05
    --cache-type-k ${large_cache_k}
    --cache-type-v ${large_cache_v}
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p"
  ttl: 120
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 131072
  metadata:
    size: "~14.4 GB (Q4_K_M)"
    context: "16K-32K (dynamic, 32K max)"
    vram_usage: "~5GB VRAM + ~9GB RAM (MoE offload, upstream llama.cpp)"
    source: "LiquidAI/LFM2-24B-A2B-GGUF (Q4_K_M)"
    kv_cache: "q4_0 + attn_rot"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: lfm2moe
    parameters: 24000000000
    context_length: 131072
    embedding_length: 2048
    quantization: Q4_K_M
    warning: "ik_llama.cpp does NOT support lfm2moe arch — running on upstream llama_server without pinned memory. 32K context ceiling (model limitation)."