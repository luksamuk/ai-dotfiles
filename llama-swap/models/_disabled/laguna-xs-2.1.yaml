# -------------------------------------------
# LAGUNA XS 2.1 - POOLSIDE 33B/3B MoE AGENTIC CODING MODEL
# MoE 33B params, 3B active per token. 256 routed + 1 shared expert.
# Mixed attention: 40 layers (10 global + 30 sliding-window, 3:1 ratio), SWA=512.
# Improved over XS.2: +5.4% SWE-bench Multilingual, stronger terminal-style tasks.
# Native interleaved reasoning (enable/disable per request).
# ik_llama.cpp ONLY backend — upstream PR #25165 not merged, BeeLama has no laguna arch.
# Q3_K_M (16.1GB) from AtomicChat with imatrix — better than requant from Q4_K_M.
# Chat template: custom jinja (GGUF embeds {% include %} which llama.cpp doesn't support).
# Stop: ["</assistant>"] required — template uses text close tags, not special tokens.
# Known: over-generates tool calls 2-3x. repeat-penalty 1.12 mitigates. First 2-3 calls correct.
# Thinking: ik_llama PR #1943 (END_DELIMITED) extracts Brie/Brie reasoning_content correctly.
# --parallel 1: reasoning + --parallel 2 splits context, causes 500 on long agent sessions.
# License: OpenMDW-1.1
#
# REACTIVATION ATTEMPT (2026-07-10) — FAILED:
#   Originally disabled 2026-07-03 (commit 61359fb) due to CUDA graph OOM on ik_llama
#   build 4681. Attempted reactivation with ik_llama build 4704 (c32c3819).
#   The CUDA graph OOM is resolved, but a new blocker was found:
#   KERNEL OOM KILLER — the Q3_K_M GGUF (16GB on disk) expands to ~29GB RSS in RAM
#   because Laguna has 256+1 experts (vs 128+1 on Qwen3.6), and ik_llama populates
#   all expert tensors into RAM during model load. --defer-experts only works with
#   mmap and does not prevent full population of expert pages. --no-mmap also fails
#   (same 29GB RSS). The GPU is never reached because the process is killed before
#   offloading completes. Tested with: --fit, -ngl 0, -ngl 10, -ngl 99, --no-mmap,
#   --no-graph-reuse, ctx 4K/16K/32K — all killed by kernel OOM with ~29GB anon-rss.
#
#   Root cause: 257 experts × N tensors each = too many individual tensor allocations,
#   all populated to RAM before GPU offload can begin. Other MoE models (Qwen3.6 128+1,
#   Ornith 128+1) don't have this issue because fewer experts = less RAM expansion.
#
#   Available quants: Q3_K_M (16.1GB, AtomicChat), Q4_K_M (20.3GB, Poolside/AtomicChat).
#   No Q2_K or APEX quant exists. Q4_K_M is even larger and would be worse.
#   Poolside also offers NVFP4 and INT4 but these are safetensors (vLLM only, not GGUF).
#
#   BLOCKED until: ik_llama fixes lazy mmap for laguna experts, OR a smaller quant
#   (Q2_K) becomes available, OR more RAM is added to the machine.
# -------------------------------------------
"laguna-xs-2.1":
  name: "Laguna XS 2.1"
  description: "Poolside's 33B/3B MoE agentic coding model with mixed SWA+global attention, native interleaved reasoning, and 262K context. Improved over XS.2 with +5.4% SWE-bench Multilingual. Designed for agentic coding and terminal-style tasks."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/laguna-xs-2.1/Laguna-XS-2.1-Q3_K_M.gguf
    --fit
    --fit-margin 512
    --ctx-size 32768
    --batch-size 8
    --temp 0.3
    --top-p 0.85
    --top-k 40
    --min-p 0.02
    --repeat-penalty 1.12
    --parallel-tool-calls
    --jinja
    --parallel 1
    --no-graph-reuse
    --chat-template-file ${templates_dir}/laguna-chat-template.jinja
    --cache-type-k q4_0
    --cache-type-v q4_0
    --flash-attn auto
    --defer-experts
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParams:
      stop: ["</assistant>"]
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.3
        top_p: 0.85
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.7
        top_p: 0.9
  ttl: 300
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 32768
  metadata:
    size: "~16.1 GB (Q3_K_M with imatrix)"
    context: "32K (configured, 262K native)"
    vram_usage: "~5.5GB VRAM (model offload + attention on GPU, experts on CPU)"
    source: "AtomicChat/Laguna-XS-2.1-GGUF (Q3_K_M with imatrix)"
    kv_cache: "q4_0 (SWA keeps cache small)"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: laguna
    parameters: 33000000000
    context_length: 262144
    embedding_length: 2048
    quantization: Q3_K_M
    note: "33B/3B MoE. SWA+global attention (30 SWA + 10 global, 40 layers). 256+1 experts. ik_llama only (PR #1939 split mode graph, PR #1943 END_DELIMITED reasoning). imatrix Q3_K_M from AtomicChat. --no-graph-reuse prevents CUDA graph OOM. Over-generates tool calls 2-3x, repeat-penalty 1.12 mitigates."