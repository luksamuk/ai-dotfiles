# -------------------------------------------
# QWEN3.5-4B - UPSTREAM llama.cpp BACKEND
# Dense 4B params, Q4_K_M ~2.52GB.
# Upstream llama.cpp (no hadamard KV).
# qwen-fixed-chat-template.jinja — embedded GGUF template lacks tool-call format instructions.
# Tool calling: --parallel-tool-calls.
# Thinking: reasoning_content field, separate from content.
# Dual mode: base (chat, no think) and :think (reasoning)
# -------------------------------------------
"qwen3.5-4b":
  name: "Qwen3.5 4B"
  description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/unsloth-qwen35-4b/Qwen3.5-4B-Q4_K_M.gguf
    --fit on
    --fit-target 512
    --jinja
    --chat-template-file ${templates_dir}/qwen-fixed-chat-template.jinja
    --parallel 1
    --ctx-size ${small_model_max_ctx}
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k q8_0
    --cache-type-v q4_0
    --flash-attn auto
    --spec-type ngram-mod
    --spec-ngram-mod-n-max 64
    --spec-ngram-mod-n-min 48
    --spec-ngram-mod-n-match 24
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 131072
  metadata:
    size: "~2.52 GB (Q4_K_M)"
    context: "64K-128K (dynamic)"
    vram_usage: "~4GB VRAM (model 2.52GB + q8_0/q4_0 cache + compute)"
    source: "unsloth/Qwen3.5-4B-GGUF (Q4_K_M)"
    kv_cache: "q8_0 (K) + q4_0 (V)"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 4210000000
    context_length: 262144
    embedding_length: 2560
    quantization: Q4_K_M
    note: "Upstream llama.cpp (no hadamard KV). Uses qwen-fixed-chat-template.jinja — embedded GGUF template lacks tool-call format instructions, causing token leakage."