# -------------------------------------------
# NORTH MINI CODE — Cohere 30B-A3B MoE AGENTIC CODING (NVFP4, upstream backend)
# CohereLabs/North-Mini-Code-1.0 — MoE 30B params, 3B active per token (top-8/128 experts).
# Architecture: cohere2moe — merged upstream in PR #24260 (2026-06-13), parser #24615, vocab #24601.
# Apache 2.0 license. Context: 256K, max output: 64K.
# Text-only model — NO mmproj, NO vision.
# Sampling: temp=1.0, top_p=0.95 per model card recommendation.
# Sliding window attention (SWA) 3:1 ratio with RoPE — same pattern as cohere2.
# Quantization: NVFP4 (4-bit weights, 16-bit activations) — GGML_TYPE_NVFP4 supported in CPU + CUDA.
# On RTX 3050 (Ampere): NVFP4 uses MMQ fallback (no native FP4 tensor cores). Functional but not optimal.
# Backend: upstream llama.cpp (NOT ik_llama — cohere2moe KQ mask bug in ik_llama not fixed as of b4633).
# GGUF: michaelw9999/North-Mini-Code-1.0-GGUF (NVFP4 = 17.3 GB) — author is the PR #24260 author.
# Local fix: tokenizer.ggml.pre = "cohere2-moe" (with hyphen) — upstream expects "cohere2moe" (no hyphen).
#   Patched in src/llama-vocab.cpp: added "cohere2-moe" as alias for cohere2moe pre-tokenizer.
#
# SMOKE TEST RESULTS (2026-06-18, b1056, RTX 3050 6GB):
#   - Model loads with --fit on --fit-target 512, ctx 8192
#   - Code generation: correct, concise, with reasoning (1111 chars thinking)
#   - Tool calling: working (finish_reason=tool_calls, correct function args)
#   - Performance: 22.68 t/s prompt, 4.14 t/s generation
#   - VRAM: fits with heavy offload (--fit adjusts automatically)
#
# Flags changed from old ik_llama config:
#   - ${ik_llama_server} -> ${llama_server} (upstream has cohere2moe support)
#   - --fit-margin -> --fit-target (upstream renamed)
#   - --parallel-tool-calls removed (ik_llama only, not in upstream)
#   - --defer-experts removed (ik_llama only, not in upstream)
#   - --k-cache-hadamard / --v-cache-hadamard removed (ik_llama only)
# -------------------------------------------
"north-mini-code":
  name: "North Mini Code"
  description: "Cohere's first open-source agentic coding model. 30B MoE with only 3B active params, optimized for code generation, agentic software engineering, and terminal tasks."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/north-mini-code/BLS-Mini-Code-1.0-NVFP4.gguf
    --jinja
    --reasoning on
    --fit on
    --fit-target 512
    --ctx-size 131072
    --timeout 0
    --temp 1.0
    --top-p 0.95
    --repeat-penalty 1.0
    --ubatch-size 2048
    --batch-size 2048
    --cache-type-k ${large_cache_k}
    --cache-type-v ${large_cache_v}
    --flash-attn auto
    --metrics
  filters:
    stripParams: "temperature, top_p"
  ttl: 120
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 262144
  metadata:
    size: "~17.3 GB (NVFP4)"
    context: "16K-128K (dynamic with --fit)"
    vram_usage: "~5-6GB VRAM + ~12GB RAM (heavy offload, MoE)"
    source: "michaelw9999/North-Mini-Code-1.0-GGUF"
    kv_cache: "q4_0 + attn_rot"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: cohere2moe
    parameters: 30484340938
    context_length: 262144
    embedding_length: 2048
    quantization: NVFP4