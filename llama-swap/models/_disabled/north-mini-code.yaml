# -------------------------------------------
# NORTH MINI CODE — Cohere 30B-A3B MoE AGENTIC CODING (Q3_K_M, ik_llama backend)
# CohereLabs/North-Mini-Code-1.0 — MoE 30B params, 3B active per token (top-8/128 experts).
# Architecture: cohere2moe — merged upstream in PR #24260 (2026-06-13), parser #24615, vocab #24601.
# ik_llama has cohere2moe arch + graph builder, but arch name mismatch: GGUF uses "cohere2moe"
#   (no underscore), ik_llama used "cohere2_moe" (with underscore).
#   Patched in ik_llama src/llama-arch.cpp L68: "cohere2_moe" -> "cohere2moe"
#   Patched in ik_llama src/llama-vocab.cpp L2113: added "cohere2moe" to tiny_aya block
#   (aligned with upstream PR #24601). Reapply both patches after ik_llama git pull.
# Apache 2.0 license. Context: 256K native, max output: 64K.
# Text-only model — NO mmproj, NO vision.
# Sampling: temp=1.0, top_p=0.95 per model card recommendation.
# Sliding window attention (SWA) 3:1 ratio with RoPE — same pattern as cohere2.
#
# Quantization: UD-Q3_K_M (unsloth) — 14.2 GB, 3.727 BPW, imatrix calibrated.
#   Q4_K_M (Arki05) — 18.6 GB, 91.3% Top-1, 93.29% HumanEval. Max ctx 65K on 6GB.
#   UD-Q3_K_M (unsloth) — 14.2 GB. Max ctx 80K on 6GB with --no-graph-reuse.
#   131K OOM on 6GB (needs 5400 MiB, only 4506 available).
#   98K OOM by 12 MiB (4518 vs 4506). 80K works with --no-graph-reuse.
#   NVFP4 (michaelw9999) deprecated: ik_llama SIGFPE on NVFP4, upstream only, 4.2 tok/s.
# Backend: ik_llama.cpp (NOT upstream — ik gives 5-6x speedup with MoE offload).
# GGUF: unsloth/North-Mini-Code-1.0-GGUF (UD-Q3_K_M = 14.2 GB)
#   Also: Arki05/North-Mini-Code-1.0-GGUF (Q4_K_M = 18.6 GB, higher quality)
#
# SMOKE TEST RESULTS (2026-07-14, ik b4704, RTX 3050 6GB):
#   - Q3_K_M loads with --fit --fit-margin 128, ctx 81920, parallel 1, --no-graph-reuse
#   - --no-graph-reuse is CRITICAL: disables CUDA graph capture that OOMs at 80K+
#   - Code generation: correct, concise, with reasoning
#   - VRAM: 5678 MiB used (118 MiB free), compute buffer 516MB
#   - Experts offloaded to CPU via --defer-experts
#
# Flags (ik_llama specific):
#   - --fit (no "on" argument — ik uses bare flag)
#   - --fit-margin (ik uses margin in MiB, not --fit-target)
#   - --k-cache-hadamard / --v-cache-hadamard (ik only, improves q4_0 cache quality)
#   - --no-graph-reuse (disables CUDA graph capture, saves ~400 MiB VRAM, REQUIRED for 80K)
#   - --defer-experts (ik only, defers MoE expert mmap on Linux)
#   - --parallel 1 (parallel 2 + ctx 80K OOM)
# -------------------------------------------
# -------------------------------------------
"north-mini-code":
  name: "North Mini Code"
  description: "Cohere's first open-source agentic coding model. 30B MoE with only 3B active params, optimized for code generation, agentic software engineering, and terminal tasks."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/north-mini-code-q3km/North-Mini-Code-1.0-UD-Q3_K_M.gguf
    --jinja
    --reasoning on
    --fit
    --fit-margin 128
    --parallel-tool-calls
    --ctx-size 81920
    --temp 1.0
    --top-p 0.95
    --repeat-penalty 1.0
    --parallel 1
    --cache-type-k ${large_cache_k}
    --cache-type-v ${large_cache_v}
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --no-graph-reuse
    --defer-experts
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 1.0
        top_p: 0.95
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 1.0
        top_p: 0.95
  ttl: 300
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 81920
  metadata:
    size: "~14.2 GB (UD-Q3_K_M)"
    context: "16K-80K (dynamic with --fit)"
    vram_usage: "~5.7GB VRAM + ~12GB RAM (ik pinned memory, MoE offload)"
    source: "unsloth/North-Mini-Code-1.0-GGUF (UD-Q3_K_M)"
    kv_cache: "q4_0 + hadamard"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: cohere2moe
    parameters: 30484340939
    context_length: 262144
    embedding_length: 2048
    quantization: UD-Q3_K_M