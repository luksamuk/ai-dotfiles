  # -------------------------------------------
  # LFM2.5-1.2B-INSTRUCT - vLLM BACKEND (PAUSADO — venv + HF models deletados)
  # Restaurar: pip install vllm em ~/.vllm, HF models re-downloaded no primeiro serve
  # UNLISTED: pausado até Sprachspiel suportar multi-provider via OpenAI API
  # -------------------------------------------
  "lfm2.5-1.2b-vllm":
    unlisted: true
    name: "LFM2.5 1.2B Instruct (vLLM)"
    description: "vLLM backend — lfm2 tool parser, proper tool calling (Sprachspiel compat)"
    cmd: |
      ${vllm_bin} serve LiquidAI/LFM2.5-1.2B-Instruct
      --port ${PORT}
      --served-model-name lfm2.5-1.2b-vllm
      --gpu-memory-utilization 0.70
      --max-model-len 8192
      --max-num-seqs 2
      --dtype half
      --trust-remote-code
      --enable-auto-tool-choice
      --tool-call-parser lfm2
    ttl: 900
    metadata:
      backend: vllm
      size: "~2.4 GB (BF16 safetensors, auto-download from HF)"
      context: "8K (vLLM optimized for 6GB VRAM)"
      vram_usage: "~3GB (model + cache)"
      source: "LiquidAI/LFM2.5-1.2B-Instruct (HuggingFace safetensors)"
      note: "vLLM backend with native lfm2 tool parser — no --jinja workaround needed"
      features:
        thinking: false
        vision: false
        tools: true
