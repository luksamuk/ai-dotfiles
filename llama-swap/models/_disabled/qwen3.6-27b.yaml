# -------------------------------------------
# QWEN3.6-27B - ik BACKEND (Hadamard KV cache, mlock, heavy CPU offload)
# Dense 27B, state-of-the-art local LLM. Heavy offload on 6GB VRAM (~13/64 layers GPU).
# i1-Q3_K_M (importance matrix quant) ~12.4GB — smaller per layer = more GPU layers = better speed.
# i1 quants from mradermacher work with ik_llama.cpp (NOT Unsloth UD-XL which breaks).
# Qwen3.6 sampling: temp 0.6-0.7, top_p 0.8-0.9, top_k 20-40
# --mlock: pin model in RAM, prevent swap during heavy offload
# --k-cache-hadamard / --v-cache-hadamard: near-fp16 quality with q4_0 cache
# --flash-attn auto: disable FA on short contexts for savings
# Dual mode: base (chat, no think) and :think (reasoning)
#
# DISABLED: 3.65 tok/s too slow for practical use. 13GB disk for ~4 tok/s not justified.
# 35B MoE covers the heavy model niche at better speed. Snake 23/25 preserved in benchmarks.
# Awaiting Qwen3.7-35B MoE to potentially replace 35B APEX.
# -------------------------------------------
"qwen3.6-27b":
  unlisted: true
  name: "Qwen 3.6 27B"
  description: "Qwen3.6-27B is a dense 27B parameter model delivering frontier-level performance in reasoning, coding, and multilingual tasks."
  cmd: |-
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/Qwen3.6-27B.i1-Q3_K_M.gguf
    --mlock
    --fit
    --fit-margin 512
    --ctx-size ${large_model_max_ctx}
    --jinja
    --parallel-tool-calls
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k ${large_cache_k}
    --cache-type-v ${large_cache_v}
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 120
  metadata:
    size: "~12.4 GB (i1-Q3_K_M)"
    context: "64K-128K (dynamic, heavy offload)"
    vram_usage: "~5GB VRAM + ~7GB RAM (ik pinned memory, hadamard cache)"
    source: "mradermacher/Qwen3.6-27B-i1-GGUF (i1-Q3_K_M)"
    kv_cache: "q4_0 + hadamard (ik -khad/-vhad)"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 27000000000
    context_length: 262144
    embedding_length: 4608
    quantization: i1-Q3_K_M
    note: "Snake 23/25 (missed wasd, self_collision). 3.65 tok/s on RTX 3050 6GB. DISABLED: too slow + 13GB disk for ~4 tok/s not justified. 35B MoE covers heavy niche."