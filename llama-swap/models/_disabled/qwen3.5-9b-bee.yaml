# -------------------------------------------
# QWEN3.5-9B - Bee BACKEND (TurboQuant KV cache)
# Served by BeeLlama.cpp with turbo3_tcq KV cache (~5x compression, PPL ≈ fp16)
# head_dim=256 → attn_rot ✅
# --n-gpu-layers 99: model fits entirely in 6GB VRAM at Q3_XL (~5.05GB)
# Original upstream config moved to _disabled/qwen3.5-9b.yaml (q8_0 cache + --fit)
# Benchmark: 41.2 tok/s (Bee/TurboQuant) vs 27.7 tok/s (upstream) — ~49% faster
# -------------------------------------------
"qwen3.5-9b-bee":
  unlisted: true
  name: "Qwen3.5 9B"
  description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
  cmd: |
    ${bee_server} --port ${PORT}
    --model ${models_dir}/Qwen3.5-9B-MoQ-3.6.gguf
    --no-mmproj
    --jinja
    --fit on
    --fit-target 768
    --ctx-size 131072
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k turbo3_tcq
    --cache-type-v turbo3_tcq
    --flash-attn on
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~5.05 GB (UD-Q3_K_XL Dynamic 2.0)"
    context: "64K-128K (TurboQuant enables longer context)"
    vram_usage: "~5GB VRAM (model + turbo3_tcq cache, ~5x less KV memory)"
    source: "unsloth/Qwen3.5-9B-GGUF (UD-Q3_K_XL)"
    kv_cache: "turbo3_tcq (BeeLlama.cpp — ~5x compression, PPL ≈ fp16)"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 8950000000
    context_length: 262144
    embedding_length: 4096
    quantization: UD-Q3_K_XL
      # vision: disabled temporarily — mmproj + fit doesn't handle offload yet
    warning: "TurboQuant turbo3_tcq KV cache — ~5x compression at near-fp16 quality. BeeLlama.cpp backend (no --fit, uses --n-gpu-layers 99)."