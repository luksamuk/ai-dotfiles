# -------------------------------------------
# GEMMA-4-12B - Bee BACKEND (TurboQuant KV cache)
# BeeLlama.cpp with turbo3_tcq KV cache (~5x compression, PPL ≈ fp16)
# head_dim=256 → attn_rot ✅ (auto-activates on Bee with quantized cache)
# Q4_0 QAT dense 12B params (~6.7GB + 168 MB mmproj)
# UNIFIED MULTIMODAL: mmproj loads vision+audio projector
# --n-gpu-layers 99: model + mmproj fit in 6GB with turbo3_tcq cache
# Dual mode: base (chat) and :think (reasoning)
# -------------------------------------------
"gemma4-12b-bee":
  name: "Gemma 4 12B (Bee)"
  description: "Gemma 4 12B QAT Q4_0 — BeeLlama.cpp with TurboQuant turbo3_tcq KV cache. Unified multimodal."
  cmd: |
    ${bee_server} --port ${PORT}
    --model ${models_dir}/gemma-4-12b-it-qat-q4_0.gguf
    --mmproj ${models_dir}/mmproj-gemma-4-12b-it-qat-q4_0.gguf
    --fit on
    --fit-target 768
    --ctx-size 131072
    --timeout 0
    --jinja
    --reasoning on
    --cache-type-k turbo3_tcq
    --cache-type-v turbo3_tcq
    --flash-attn on
    --min-p 0.01
    --repeat-penalty 1.05
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 1.2
        top_p: 0.95
  ttl: 300
  capabilities:
    in: ['text', 'image', 'audio']
    out: ['text']
    tools: true
    reranker: false
    context: 262144
  metadata:
    size: "~6.7 GB (Q4_0 QAT + 168 MB mmproj)"
    context: "8K-128K (dynamic, TurboQuant)"
    vram_usage: "~5GB VRAM + ~354 MB mmproj (Bee turbo3_tcq cache)"
    source: "google/gemma-4-12B-it-qat-q4_0-gguf"
    kv_cache: "turbo3_tcq (BeeLlama.cpp — ~5x compression)"
    features:
      completion: true
      tools: true
      thinking: true
      vision: true
      embedding: false
      insert: false
      audio: true
      image: false
    architecture: gemma4
    parameters: 12000000000
    context_length: 262144
    embedding_length: 3072
    quantization: Q4_0_QAT
    note: "BeeLlama backend with TurboQuant. No --fit (Bee doesn't have it). --n-gpu-layers 99 for full VRAM. TurboQuant saves ~2GB KV cache at 128K."