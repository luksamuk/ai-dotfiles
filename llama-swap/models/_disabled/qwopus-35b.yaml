  # -------------------------------------------
  # QWOPUS3.6-35B-A3B-V1 - MoE CODING+REASONING (text-only, no vision) (APEX I-Compact)
  # Qwen3.6-35B-A3B fine-tuned by Jackrong with 3-stage curriculum SFT.
  # Same MoE arch as qwen3.6-35b-moe (35B params, 3B active, 256 experts, top-8 routing)
  # APEX I-Compact ~16.5GB — mixed-precision MoE quant com imatrix diversa
  # --no-mmproj: same as vanilla Qwen3.6, mmproj blocks expert offload
  # KV cache: q4_0 + attn_rot (head_k=128, 128%64==0 ✅)
  # Architecture: qwen35moe (Qwen3MoeForCausalLM)
  # Using ik_llama.cpp: better MoE performance via pinned memory for expert offload
  # --multi-token-prediction: MTP now supported for Qwen3.5-MoE (#1745, v4496+). Use long form (not --mtp).
  # -------------------------------------------
  # UNLISTED: Redundant — Qwopus SFT variant superseded by qwen3.6-35b-moe (same arch, better base)
  "qwopus-35b":
    name: "Qwopus 35B"
    description: "MoE coding+reasoning — Qwopus SFT, 3B active/token (APEX I-Compact)"
    unlisted: true
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Qwopus3.6-35B-A3B-v1-APEX-I-Compact.gguf
      # No --no-mmproj: ik_llama.cpp doesn't support this flag (upstream-only)
      # No --fit-ctx: ik_llama.cpp doesn't support this flag; --ctx-size serves as ceiling
      --fit
      --fit-margin 512
      --ctx-size 131072
      --temp ${code_temp}
      --top-p ${code_top_p}
      --top-k ${code_top_k}
      --min-p ${code_min_p}
      --repeat-penalty ${code_repeat_penalty}
      --reasoning on
      --jinja
      --parallel-tool-calls
      --multi-token-prediction
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.85
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 120
    metadata:
      size: "~16.5 GB (APEX I-Compact)"
      context: "16K-128K (dynamic)"
      vram_usage: "~5GB VRAM + ~11GB RAM (APEX mixed-precision offload, ik_llama.cpp pinned memory)"
      source: "mudler/Qwopus3.6-35B-A3B-v1-APEX-GGUF"
      kv_cache: "q4_0 + attn_rot"
      features:
        thinking: true
        vision: false
        tools: true
      warning: "Vision disabled — mmproj blocks partial expert offload. APEX I-Compact: edges Q4_K, middle Q3_K, shared Q6_K, attn Q4_K."
