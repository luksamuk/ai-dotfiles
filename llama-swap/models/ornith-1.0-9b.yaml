# -------------------------------------------
# ORNITH-1.0-9B - ik BACKEND (Hadamard KV cache)
# Dense 9B params, Q4_K_M ~5.63GB.
# Post-trained Qwen 3.5 9B Dense + Gemma 4 (agentic coding RL).
# Self-scaffolding RL: jointly optimizes scaffold + solution.
# Same qwen3_5 architecture as Qwen3.5-9B.
# ik with hadamard cache gives near-fp16 quality at smaller memory footprint.
# --flash-attn auto: disables FA on short contexts for MoE/offload savings
# --parallel-tool-calls: enables multiple tool calls in single response
# Dual mode: base (chat, no think) and :think (reasoning)
# Identity bleeding: responds "trained by Google" (Gemma 4 base) — system prompt overrides.
# -------------------------------------------
"ornith-1.0-9b":
  name: "Ornith 1.0 9B"
  description: "Ornith-1.0 is a family of open-source LLMs specialized for agentic coding, trained with a novel self-scaffolding reinforcement learning approach that jointly optimizes the scaffold and the solution."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/ornith-1.0-9b/ornith-1.0-9b-Q4_K_M.gguf
    --fit
    --fit-margin 512
    --jinja
    --parallel 2
    --parallel-tool-calls
    --ctx-size ${small_model_max_ctx}
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k q8_0
    --cache-type-v q4_0
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 262144
  metadata:
    size: "~5.63 GB (Q4_K_M)"
    context: "64K-128K (dynamic)"
    vram_usage: "~5.2GB VRAM (text-only, ik with hadamard cache)"
    source: "deepreinforce-ai/Ornith-1.0-9B-GGUF"
    kv_cache: "q8_0 + q4_0 hadamard"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 9000000000
    context_length: 262144
    embedding_length: 4096
    quantization: Q4_K_M
    note: "Post-trained Qwen 3.5 9B Dense + Gemma 4. Self-scaffolding RL for agentic coding. Identity bleeds as 'trained by Google' — use system prompt to override."