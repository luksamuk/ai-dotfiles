# -------------------------------------------
# QWEN3.5-4B - ik_llama.cpp BACKEND
# Dense 4B params, UD-Q4_K_XL ~2.8GB.
# ik_llama.cpp with hadamard KV cache + --fit for dynamic context.
# Ngram speculative decoding via ik syntax.
# qwen-fixed-chat-template.jinja for tool-call instructions.
# Tool calling: --parallel-tool-calls.
# Thinking: reasoning_content field, separate from content.
# Dual mode: base (chat, no think) and :think (reasoning)
# NOTE: Formerly "qwen3.5-4b-mtp" — consolidated as canonical qwen3.5-4b (Jul 2026)
#   Old upstream+Q4_K_M variant moved to _disabled/qwen3.5-4b-upstream.yaml
# -------------------------------------------
"qwen3.5-4b":
  name: "Qwen3.5 4B"
  description: "Qwen 3.5 4B with UD-Q4_K_XL quantization and ik_llama.cpp. Uses hadamard KV cache for maximum context efficiency and ngram speculative decoding."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/qwen3.5-4b-mtp/Qwen3.5-4B-UD-Q4_K_XL.gguf
    --fit
    --fit-margin 512
    --jinja
    --chat-template-file ${templates_dir}/qwen-fixed-chat-template.jinja
    --parallel 1
    --parallel-tool-calls
    --ctx-size ${small_model_max_ctx}
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k q4_0
    --cache-type-v q4_0
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --no-graph-reuse
    --ctx-checkpoints 0
    --ctx-checkpoints-interval 0
    --batch-size 512
    --ubatch-size 128
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 131072
  metadata:
    size: "~2.8 GB (UD-Q4_K_XL)"
    context: "64K-128K (dynamic)"
    vram_usage: "~4.5GB VRAM (model 2.8GB + q8_0/q4_0 hadamard cache + compute)"
    source: "unsloth/Qwen3.5-4B-GGUF (UD-Q4_K_XL)"
    kv_cache: "q4_0/q4_0 + hadamard"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 4210000000
    context_length: 262144
    embedding_length: 2560
    quantization: UD-Q4_K_XL
    note: "ik_llama.cpp with hadamard KV cache + --fit for dynamic context. Ngram spec decode via ik syntax. Uses qwen-fixed-chat-template.jinja for tool-call instructions. Formerly qwen3.5-4b-mtp, consolidated Jul 2026."