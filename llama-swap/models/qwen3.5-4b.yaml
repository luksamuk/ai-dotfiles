# -------------------------------------------
# QWEN3.5-4B - ik BACKEND (Hadamard KV cache)
# Dense 4B params, MoQ-3.75 ~1.92GB.
# MoQ-3.75: 51% faster than i1-Q4_K_M (45.7 vs 30.2 tok/s),
# same quality (23/25 Snake), 24% smaller (1.92 vs 2.52 GB).
# ik with hadamard cache gives near-fp16 quality at smaller memory footprint than q8_0.
# --flash-attn auto: disables FA on short contexts for savings
# --parallel-tool-calls: enables multiple tool calls in single response
# Dual mode: base (chat, no think) and :think (reasoning)
# -------------------------------------------
"qwen3.5-4b":
  name: "Qwen3.5 4B"
  description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/MoQ-3.75.gguf
    --jinja
    --parallel 2
    --parallel-tool-calls
    --fit
    --fit-margin 512
    --ctx-size 131072
    --timeout 0
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k q8_0
    --cache-type-v q4_0
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 262144
  metadata:
    size: "~1.92 GB (MoQ-3.75)"
    context: "64K-128K (dynamic)"
    vram_usage: "~2.8GB VRAM (model + hadamard cache)"
    source: "kaitchup/Qwen3.5-4B-GGUF-MoQ (MoQ-3.75)"
    kv_cache: "q8_0 + q4_0 hadamard"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 4210000000
    context_length: 262144
    embedding_length: 2560
    quantization: MoQ-3.75
    note: "MoQ-3.75 replaces i1-Q4_K_M: 51% faster, 24% smaller, same quality. Mixture of Quants by Waleed Ahmad."