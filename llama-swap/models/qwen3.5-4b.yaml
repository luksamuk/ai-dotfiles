  # -------------------------------------------
  # QWEN3.5-4B - Bee BACKEND (TurboQuant KV cache)
  # Served by BeeLlama.cpp with turbo3_tcq KV cache (~5x compression, PPL ≈ fp16)
  # head_dim=256 → attn_rot ✅
  # --n-gpu-layers 99: model fits entirely in 6GB VRAM at Q3_XL (2.27GB model + cache)
  # Original upstream config moved to _disabled/qwen3.5-4b.yaml (q8_0 cache + --fit)
  # -------------------------------------------
  "qwen3.5-4b":
    name: "Qwen3.5 4B"
    description: "TurboQuant KV cache — turbo3_tcq, 5x compression (Bee backend)"
    cmd: |
      ${bee_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-4B-UD-Q3_K_XL.gguf
      --no-mmproj
      --n-gpu-layers 99
      --ctx-size 131072
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --reasoning-loop-guard force-close
      --reasoning-loop-min-tokens 1024
      --reasoning-loop-window 2048
      --cache-type-k turbo3_tcq
      --cache-type-v turbo3_tcq
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~2.27 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (TurboQuant enables longer context)"
      vram_usage: "~3GB VRAM (model + turbo3_tcq cache, ~5x less KV memory)"
      source: "unsloth/Qwen3.5-4B-GGUF (UD-Q3_K_XL)"
      kv_cache: "turbo3_tcq (BeeLlama.cpp — ~5x compression, PPL ≈ fp16)"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 4210000000
      context_length: 262144
      embedding_length: 2560
      quantization: Q3_K_XL
      warning: "TurboQuant turbo3_tcq KV cache — ~5x compression at near-fp16 quality. BeeLlama.cpp backend (no --fit, uses --n-gpu-layers 99)."
