# -------------------------------------------
# QWEN3.5-4B - ik BACKEND (Hadamard KV cache)
# Dense 4B params, i1-Q4_K_M ~2.52GB.
# Switched from Bee/TurboQuant to ik — i1 quant format incompatible with Bee (emits slashes).
# ik with hadamard cache gives near-fp16 quality at smaller memory footprint than q8_0.
# --flash-attn auto: disables FA on short contexts for savings
# --parallel-tool-calls: enables multiple tool calls in single response
# Dual mode: base (chat, no think) and :think (reasoning)
# -------------------------------------------
"qwen3.5-4b":
  name: "Qwen3.5 4B"
  description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/Qwen3.5-4B.i1-Q4_K_M.gguf
    --jinja
    --parallel-tool-calls
    --fit
    --fit-margin 512
    --ctx-size 131072
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k q8_0
    --cache-type-v q4_0
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~2.52 GB (i1-Q4_K_M)"
    context: "64K-128K (dynamic)"
    vram_usage: "~3.5GB VRAM (model + hadamard cache)"
    source: "mradermacher/Qwen3.5-4B-i1-GGUF (i1-Q4_K_M)"
    kv_cache: "q8_0 (K) + q4_0 (V) + hadamard (ik -khad/-vhad)"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 4210000000
    context_length: 262144
    embedding_length: 2560
    quantization: i1-Q4_K_M
    note: "Switched from Bee/TurboQuant to ik — i1 format caused Bee slash bug. hadamard cache near-fp16 quality."