# -------------------------------------------
# QWEN3.5-4B - ik_llama.cpp BACKEND
# Dense 4B params, i1-Q4_K_M ~2.52GB.
# ik_llama.cpp with hadamard KV cache + --fit for dynamic context.
# Ngram speculative decoding via ik syntax.
# Tool calling: --parallel-tool-calls.
# Thinking: reasoning_content field, separate from content.
# Dual mode: base (chat, no think) and :think (reasoning)
# -------------------------------------------
"qwen3.5-4b":
  name: "Qwen3.5 4B"
  description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/Qwen3.5-4B.i1-Q4_K_M.gguf
    --jinja
    --parallel-tool-calls
    --fit
    --fit-margin 512
    --ctx-size 131072
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k q8_0
    --cache-type-v q4_0
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --spec-type ngram-mod:n_max=64,n_min=48,ngram_size_n=24
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 131072
  metadata:
    size: "~2.52 GB (i1-Q4_K_M)"
    context: "64K-128K (dynamic via --fit)"
    vram_usage: "~4GB VRAM (model 2.52GB + q8_0/q4_0 hadamard cache + compute)"
    source: "unsloth/Qwen3.5-4B-GGUF i1-Q4_K_M"
    kv_cache: "q8_0 (K) + q4_0 (V) + hadamard"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen35
    parameters: 4210000000
    context_length: 131072
    embedding_length: 2560
    quantization: i1-Q4_K_M
    note: "ik_llama.cpp with hadamard KV cache + --fit for dynamic context. Ngram spec decode via ik syntax. 131K max context, --fit adjusts to available VRAM."