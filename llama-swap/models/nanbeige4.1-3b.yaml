# -------------------------------------------
# NANBEIGE4.1-3B — BOSS Zhipin dense reasoning + agentic coding model
# Dense 3B params (4B total with embeddings), 32 layers, GQA 20Q/4KV
# Architecture: LlamaForCausalLM (llama) — supported in ALL backends
# Trained on 23T tokens + SFT + RL (reasoning, alignment, agentic deep-search)
# head_dim=128 → attn_rot ✅ (128%64==0)
# Q4_K_M ~1.8 GB — fits entirely in VRAM with room for KV cache
# Vocab: 166,144 (larger than Qwen3.5's 151K — slightly larger tokenizer, no perf impact)
# 256K context, Apache 2.0 license
#
# Tool calling: uses XML <func_call> tags with JSON {name, arguments}
#   llama.cpp + --jinja parses these correctly into OpenAI-compatible format
#   Tested: 4 parallel tool calls (2 weather + 2 time) — all succeeded
#   Agentic reasoning pattern: pre-tool planning → batch calls → post-tool analysis → response
#
# ⚠️ MULTI-TURN TOOL CALLING BUG (llama.cpp upstream, affects ALL backends):
#   First round of tool calls works perfectly. On SECOND round (assistant generates
#   reasoning + tool calls after receiving tool results), the model leaks XML <func_call>
#   tags as verbatim text in content instead of structured tool_calls.
#   Root cause: llama.cpp peg-native parser fails to extract tool calls from reasoning
#   blocks in multi-turn conversations. Same bug affects Qwen3.5/3.6 (llama.cpp #20837,
#   #22684 — both OPEN, no fix merged yet). BeeLlama.cpp and ik_llama.cpp share the
#   same parser — switching backends does NOT help.
#   WORKAROUND: use for single-turn tool calling or non-agentic tasks only.
#   Monitor: https://github.com/ggml-org/llama.cpp/issues/22684
#
# ⚠️ ALWAYS THINKING (like gpt-oss-20b):
#   The template has NO enable_thinking toggle. The model ALWAYS generates reasoning
#   with 十六条/第十七条 tags (same format as Qwen3). Use --reasoning on to extract.
#   No :think variant (it's always thinking). The only tag exposed is the base model ID.
#
# ⚠️ BENCHMARK CAVEATS:
#   - Self-reported benchmarks show Qwen3-32B-level performance, which is exceptional for 3B
#   - Benjamin Marie (Kaitchup) ran CoDeC contamination checks: GPQA at 40.9 (not contaminated)
#   - But: learning curves were validated on the same benchmarks (hyperparameter selection)
#   - Community confirms model is "genuinely very good" but benchmarks may be inflated
#   - Artificial Analysis Intelligence Index: 16 (above 3B median of 8, but below 30B+ models at 25-35)
#   - NO independent third-party agentic coding tests (Pacman, HTML game, etc.) exist yet
#
# Backend: upstream llama.cpp ONLY (dense model, no MoE/MTP tricks needed)
# No --no-mmproj needed (text-only model, no vision)
# --jinja REQUIRED (chat template is complex with tool calling + reasoning)
# -------------------------------------------
"nanbeige4.1-3b":
  name: "Nanbeige 4.1 3B"
  description: "Compact generalist language model that simultaneously achieves strong agentic behavior, code generation, and general reasoning with only 3B parameters."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/Nanbeige4.1-3B-Q4_K_M.gguf
    --jinja
    --fit on
    --fit-target 768
    --fit-ctx ${small_model_min_ctx}
    --ctx-size ${small_model_max_ctx}
    --temp 0.6
    --top-p 0.9
    --top-k 40
    --min-p 0.01
    --repeat-penalty 1.05
    --reasoning on
    --n-predict 32768
    --cache-type-k ${small_cache_k}
    --cache-type-v ${small_cache_v}
    --flash-attn on
    --metrics
  ttl: 60
  metadata:
    size: "~1.8 GB (Q4_K_M)"
    context: "64K-128K (dynamic)"
    vram_usage: "~2.5GB (model + cache)"
    source: "DevQuasar/Nanbeige.Nanbeige4.1-3B-GGUF (Q4_K_M)"
    kv_cache: "q8_0 + attn_rot"
    features:
      completion: true
      tools: false
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: llama
    parameters: 3930000000
    context_length: 262144
    embedding_length: 2560
    quantization: Q4_K_M
    warning: "ALWAYS thinks (no :think toggle). Verbose reasoning (~300+ tokens even for simple tasks). MULTI-TURN TOOL CALL BUG: second round of tool calls leaks XML as text (llama.cpp #22684, no fix yet). Use single-turn tool calling only. Benchmarks promising but may be inflated."