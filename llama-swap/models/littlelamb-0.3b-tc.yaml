# -------------------------------------------
# LITTLELAMB 0.3B TC — Ultra-light tool-calling model
# Compressed from Qwen3-0.6B to 290M params via CompactifAI (50% compression)
# Architecture: qwen3 — causes SEGFAULT in ik_llama.cpp, use upstream
# Q8_0 ~303 MB — fits ENTIRELY in VRAM with room to spare
# Tool calling: Qwen3-style JSON format, BFCL v4 51.5%
# 40K context, English only for tool-calling variant
# Dual mode: base (chat, no think) and :think (reasoning)
# Uses ${llama_server} (upstream) — ik_llama.cpp segfaults with this model
# NOTE: BFCL 51.5% is low — test if sufficient for simple agentic loops
# Apache 2.0 license
# -------------------------------------------
"littlelamb-0.3b-tc":
  name: "LittleLamb 0.3B TC"
  description: "Compact 0.3B-parameter model specialized for function and tool calling tasks in resource-constrained environments."
  tags: ["tools"]
  cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LittleLamb-ToolCalling.Q8_0.gguf
      --jinja
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size 40960
      --timeout 0
      --parallel 4
      --cont-batching
      --temp ${code_temp}
      --top-p ${code_top_p}
      --top-k ${code_top_k}
      --min-p ${code_min_p}
      --repeat-penalty ${code_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.6
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  metadata:
    size: "~303 MB (Q8_0)"
    context: "8K-40K (dynamic)"
    vram_usage: "~0.5GB (model + cache)"
    source: "mradermacher/LittleLamb-ToolCalling-GGUF (Q8_0)"
    kv_cache: "q8_0 + attn_rot"
    features:
      completion: true
      tools: true
      thinking: false
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen3
    parameters: 293260000
    context_length: 40960
    embedding_length: 544
    quantization: Q8_0
    warning: "ik_llama.cpp incompatible — use llama.cpp upstream"