# -------------------------------------------
# RIO 3.0 OPEN MINI 4B - IplanRIO (Prefeitura do Rio)
# Fine-tune of Qwen3-4B-Thinking-2507 via distillation
# This model ONLY supports thinking mode (enable_thinking=false has no effect)
# SwiReasoning (latent/explicit switching) NOT supported in llama.cpp
# Q4_K_M ~2.5GB, fits 6GB VRAM with --fit dynamic context
# -------------------------------------------
"rio-mini-4b":
  name: "Rio 3.0 Open Mini 4B"
  description: "IplanRIO/Prefeitura do Rio - distilled from Qwen3-4B-Thinking-2507 with reasoning traces from Rio 3.0. Thinking-only model. MIT license."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/rio-mini-4b/Rio-3.0-Open-Mini.Q4_K_M.gguf
    --jinja
    --parallel 2
    --fit
    --fit-margin 512
    --ctx-size 131072
    --timeout 0
    --temp 0.6
    --top-p 0.95
    --top-k 20
    --min-p 0.0
    --repeat-penalty 1.1
    --cache-type-k q8_0
    --cache-type-v q4_0
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        temperature: 0.6
        top_p: 0.95
  ttl: 60
  health_check_timeout: 300
  capabilities:
    in: ['text']
    out: ['text']
    tools: true
    reranker: false
    context: 262144
  metadata:
    size: "~2.5 GB (Q4_K_M)"
    context: "128K (fit dynamic, 262K native)"
    vram_usage: "~3.5GB VRAM (model + hadamard cache)"
    source: "mradermacher/Rio-3.0-Open-Mini-GGUF (Q4_K_M)"
    kv_cache: "q8_0 + q4_0 hadamard"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    architecture: qwen3
    parameters: 4000000000
    context_length: 262144
    embedding_length: 2560
    quantization: Q4_K_M
    note: "IplanRIO distilled Qwen3-4B-Thinking with Rio 3.0 reasoning traces. Thinking-only model — enable_thinking=false has no effect."