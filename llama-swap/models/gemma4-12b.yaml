# -------------------------------------------
# GEMMA-4-12B-QAT - UPSTREAM BACKEND (--fit on, UNIFIED MULTIMODAL)
# Google Q4_0 Quantization-Aware Training — dense 12B params.
# Won benchmark vs PTQ on ik: 25 vs 24/25 Snake (speed progression bonus).
# Migrated from ik to upstream: ik --gpu-layers 24 OOMs on compute buffer
# with ctx-size > 16K. Upstream --fit on handles compute buffer automatically.
# UNIFIED MULTIMODAL: mmproj loads vision+audio projector (~168 MB QAT).
# Speed impact: -8% with mmproj (9.2 vs 10.0 tok/s). Worth it for multimodal.
# Upstream doesn't have --parallel-tool-calls. Jinja template handles tool calling.
# --fit on + --fit-target 768: leave 768 MiB headroom for desktop use.
# --fit-ctx 8192: minimum pre-allocated context at startup.
# --flash-attn on: stable on upstream for gemma4 dense.
# --reasoning on: dual mode base (chat, temp 0.7) and :think (reasoning, temp 1.2).
# head_dim=512 → attn_rot ✅ (auto-activates on upstream with quantized cache).
# -------------------------------------------
"gemma4-12b":
  name: "Gemma 4 12B"
  description: "Gemma 4 12B QAT (Q4_0) — Unified multimodal (vision + audio). Won vs PTQ on ik (25 vs 24/25 Snake). Upstream --fit on for 128K ctx with mmproj."
  cmd: |
    ${llama_server} --port ${PORT}
    --model ${models_dir}/gemma-4-12b-it-qat-q4_0.gguf
    --mmproj ${models_dir}/mmproj-gemma-4-12b-it-qat-q4_0.gguf
    --fit on
    --fit-target 768
    --fit-ctx 8192
    --ctx-size 131072
    --jinja
    --reasoning on
    --cache-type-k q4_0
    --cache-type-v q4_0
    --flash-attn on
    --min-p 0.01
    --repeat-penalty 1.05
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 1.2
        top_p: 0.95
  ttl: 300
  metadata:
    size: "~6.7 GB (Q4_0 QAT + 168 MB mmproj)"
    context: "8K-128K (dynamic)"
    vram_usage: "~5GB VRAM + ~354 MB mmproj (upstream --fit on)"
    source: "google/gemma-4-12B-it-qat-q4_0-gguf"
    kv_cache: "q4_0 + attn_rot"
    features:
      completion: true
      tools: true
      thinking: true
      vision: true
      embedding: false
      insert: false
      audio: true
      image: false
    architecture: gemma4
    parameters: 12000000000
    context_length: 262144
    embedding_length: 3072
    quantization: Q4_0_QAT