# -------------------------------------------
# QWEN3.5-4B-ABLITERATED - ik BACKEND (Hadamard KV cache)
# Qwen3.5-4B with refusal behaviors removed via Abliterix (orthogonalized steering + Bayesian optimization)
# KL divergence 0.0065 — minimal capability degradation. For Sprachspiel adversarial testing ONLY.
# Same architecture as base Qwen3.5-4B (qwen35) — all llama-swap flags work identically
# Switched from Bee/TurboQuant to ik — i1 quant format causes Bee slash bug.
# ik with hadamard cache gives near-fp16 quality.
# --parallel-tool-calls: enables multiple tool calls in single response
# -------------------------------------------
"qwen3.5-4b-abliterated":
  name: "Qwen3.5 4B Abliterated"
  description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance. Abliterated variant with refusal behaviors removed for adversarial testing."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/Qwen3.5-4B-abliterated.i1-Q4_K_M.gguf
    --jinja
    --parallel 2
    --parallel-tool-calls
    --fit
    --fit-margin 512
    --ctx-size 131072
    --timeout 0
    --temp ${default_temp}
    --top-p ${default_top_p}
    --top-k ${default_top_k}
    --min-p ${default_min_p}
    --repeat-penalty ${default_repeat_penalty}
    --reasoning on
    --cache-type-k q8_0
    --cache-type-v q4_0
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.7
        top_p: 0.9
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 60
  health_check_timeout: 300
  metadata:
    architecture: qwen35
    parameters: 4210000000
    context_length: 262144
    embedding_length: 2560
    quantization: i1-Q4_K_M
    size: "~2.71 GB (i1-Q4_K_M)"
    context: "64K-128K (dynamic)"
    vram_usage: "~3.5GB VRAM (model + hadamard cache)"
    source: "mradermacher/Qwen3.5-4B-abliterated-i1-GGUF (i1-Q4_K_M)"
    kv_cache: "q8_0 + q4_0 hadamard"
    features:
      completion: true
      tools: true
      thinking: true
      vision: false
      embedding: false
      insert: false
      audio: false
      image: false
    note: "Abliterated variant for Sprachspiel adversarial testing — no refusal. Switched from Bee to ik — i1 format causes Bee slash bug."