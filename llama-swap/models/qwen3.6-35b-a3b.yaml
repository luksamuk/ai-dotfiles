# -------------------------------------------
# QWEN3.6-35B-A3B - MoE CODING + VISION (APEX I-Compact + mmproj)
# MoE 35B params, 3B ativo por token. Substitui o Qwen3-Coder-30B.
# 33 experts, top-8 routing. APEX I-Compact ~17.3GB + mmproj 858MB F16.
#   Mixed-precision MoE quant com imatrix diversa (chat, code, reasoning, tool-calling)
#   Perplexity comparable to Q8_0 (6.669 vs 6.533), beats UD-Q3_K_XL on real benchmarks
#
# VISION ENABLED 2026-07-10 (ik_llama build 4704):
#   Previously vision crashed (CUDA graph OOM on 6GB RTX 3050).
#   Fixed with --no-graph-reuse: prevents cudaGraphLaunch OOM from mmproj compute buffer.
#   Trade-off: ctx 131072 → 32768 (mmproj uses ~560MB VRAM, less for KV cache).
#   Speed: 27.6 tok/s with vision (vs 33-34 text-only — 17% slower).
#   VRAM: 5587 MiB (tight but stable).
#   Image processing: 209ms, encoding: 52ms, decode: 157ms.
#
# KV cache: q4_0 + attn_rot (head_k=128, 128%64==0 ✅)
# Architecture: qwen35moe (Qwen3MoeForCausalLM)
# Using ik_llama.cpp: better MoE performance via pinned memory for expert offload
# --fit-margin 1536: larger margin needed for mmproj VRAM headroom
# --no-graph-reuse: CRITICAL — prevents CUDA graph OOM when mmproj is loaded
# --k-cache-hadamard / --v-cache-hadamard: Hadamard transform before K/V cache quantization
# --defer-experts: defers expert mmap on Linux → faster model loading
# --flash-attn auto: disables FA on short prompts (saves overhead on MoE offloaded models)
# -------------------------------------------
"qwen3.6-35b-a3b":
  name: "Qwen 3.6 35B"
  description: "Qwen3.6 delivers substantial upgrades in agentic coding and thinking preservation. Built on direct community feedback for a more intuitive, responsive, and productive coding experience. Vision enabled via mmproj."
  cmd: |
    ${ik_llama_server} --port ${PORT}
    --model ${models_dir}/Qwen3.6-35B-A3B-APEX-I-Compact.gguf
    --mmproj ${models_dir}/mmproj-Qwen3.6-35B-A3B-F16.gguf
    --fit
    --fit-margin 2048
    --ctx-size 32768
    --temp ${code_temp}
    --top-p ${code_top_p}
    --top-k ${code_top_k}
    --min-p ${code_min_p}
    --repeat-penalty ${code_repeat_penalty}
    --reasoning on
    --jinja
    --chat-template-file ${templates_dir}/qwen-fixed-chat-template.jinja
    --parallel 1
    --parallel-tool-calls
    --no-graph-reuse
    --cache-type-k ${large_cache_k}
    --cache-type-v ${large_cache_v}
    --k-cache-hadamard
    --v-cache-hadamard
    --flash-attn auto
    --defer-experts
    --metrics
  filters:
    stripParams: "temperature, top_p"
    setParamsByID:
      "${MODEL_ID}":
        chat_template_kwargs:
          enable_thinking: false
        temperature: 0.6
        top_p: 0.85
      "${MODEL_ID}:think":
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.9
  ttl: 300
  health_check_timeout: 300
  capabilities:
    in: ['text', 'image']
    out: ['text']
    tools: true
    reranker: false
    context: 32768
  metadata:
    size: "~17.3 GB (APEX I-Compact) + 858 MB mmproj"
    context: "32K (reduced from 131K for vision VRAM headroom)"
    vram_usage: "~5.6 GB VRAM (5587 MiB measured) + ~14GB pinned RAM"
    source: "mudler/Qwen3.5-35B-A3B-APEX-GGUF (+ mmproj-F16)"
    kv_cache: "q4_0 + attn_rot + hadamard"
    features:
      completion: true
      tools: true
      thinking: true
      vision: true
      embedding: false
      insert: false
      audio: false
      image: true
    architecture: qwen35moe
    parameters: 34660000000
    context_length: 262144
    embedding_length: 2048
    quantization: APEX I-Compact
    note: "Vision enabled via --no-graph-reuse + --fit-margin 1536. ctx 32K (from 131K) for VRAM headroom. 27.6 tok/s with vision (17% slower than text-only 33-34). Both base and :think modes support vision."