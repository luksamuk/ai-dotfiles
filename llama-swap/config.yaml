      --model ${models_dir}/Qwen3.5-4B-Q4_K_M.gguf
      --mmproj ${models_dir}/mmproj-Qwen3.5-4B-F16.gguf
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${think_temp}
      --top-p ${think_top_p}
      --top-k ${think_top_k}
      --min-p ${think_min_p}
      --repeat-penalty ${think_repeat_penalty}
      --reasoning auto
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
    ttl: 60
    aliases:
      - "qwen3.5-4b-think"
      - "qwen3.5-4b-reasoning"
    metadata:
      size: "2.63 GB"
      context: "32K-128K (dynamic)"
