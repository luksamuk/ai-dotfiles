      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/NVIDIA-Nemotron-3-Nano-4B-GGUF"
      features:
        thinking: true
        tools: true

  # -------------------------------------------
  # QWOPUS-4B - TOOL-CALLING + REASONING (FITS VRAM)
  # Fine-tune do Qwen3.5-4B focado em tool-calling
  # Sempre usa reasoning (treinado assim, não suporta desativar)
  # Melhor para: agentes, function calling, código
  # CABE INTEIRO NA VRAM (~3GB)
  # -------------------------------------------
  "qwopus-4b":
    name: "Qwopus 4B"
    description: "Qwopus3.5-4B-v3 Q4_K_M - Tool-calling + reasoning"
    cmd: |
      ${llama_server} --port ${PORT}
