healthCheckTimeout: 300
logLevel: info
logTimeFormat: rfc3339
logToStdout: proxy
captureBuffer: 15
startPort: 10001
sendLoadingState: false
includeAliasesInList: true
globalTTL: 0
macros:
  models_dir: ${env.HOME}/.llama-models
  media_path: ${env.HOME}/testfiles/vision
  templates_dir: ${env.HOME}/git/ai-dotfiles/llama-swap/templates
  llama_server: ${env.HOME}/git/llama.cpp/build/bin/llama-server
  ik_llama_server: ${env.HOME}/git/ik_llama.cpp/build/bin/llama-server
  bonsai_llama_server: ${env.HOME}/git/bonsai-llama.cpp/build/bin/llama-server
  bee_server: ${env.HOME}/git/beellama.cpp/build/bin/llama-server
  vllm_bin: ${env.HOME}/.vllm/bin/vllm
  default_temp: '0.7'
  default_top_p: '0.9'
  default_top_k: '20'
  default_min_p: '0.01'
  default_repeat_penalty: '1.05'
  code_temp: '0.6'
  code_top_p: '0.85'
  code_top_k: '40'
  code_min_p: '0.02'
  code_repeat_penalty: '1.05'
  think_temp: '0.6'
  think_top_p: '0.9'
  think_top_k: '20'
  think_min_p: '0.0'
  think_repeat_penalty: '1.0'
  small_model_min_ctx: '65536'
  small_model_max_ctx: '131072'
  large_model_min_ctx: '65536'
  large_model_max_ctx: '131072'
  vram_margin: '512'
  small_cache_k: q8_0
  small_cache_v: q8_0
  large_cache_k: q4_0
  large_cache_v: q4_0
  gemma_cache_k: q4_0
  gemma_cache_v: q4_0
models:
  qwen3.5-4b:
    name: Qwen3.5 4B
    description: Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/Qwen3.5-4B.i1-Q4_K_M.gguf

      --jinja

      --parallel-tool-calls

      --fit

      --fit-margin 512

      --ctx-size 131072

      --temp ${default_temp}

      --top-p ${default_top_p}

      --top-k ${default_top_k}

      --min-p ${default_min_p}

      --repeat-penalty ${default_repeat_penalty}

      --reasoning on

      --cache-type-k q8_0

      --cache-type-v q4_0

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --spec-type ngram-mod:n_max=64,n_min=48,ngram_size_n=24

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~2.52 GB (i1-Q4_K_M)
      context: 64K-128K (dynamic via --fit)
      vram_usage: ~4GB VRAM (model 2.52GB + q8_0/q4_0 hadamard cache + compute)
      source: unsloth/Qwen3.5-4B-GGUF i1-Q4_K_M
      kv_cache: q8_0 (K) + q4_0 (V) + hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 4210000000
      context_length: 131072
      embedding_length: 2560
      quantization: i1-Q4_K_M
      note: ik_llama.cpp with hadamard KV cache + --fit for dynamic context. Ngram spec decode via ik syntax. 131K max context, --fit adjusts to available VRAM.
  qwen3.5-9b:
    name: Qwen3.5 9B
    description: Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning.
    cmd: "${ik_llama_server} --port ${PORT}\n--model ${models_dir}/Qwen3.5-9B-MoQ-3.6.gguf\n--fit\n--fit-margin 512\n--jinja\n--chat-template-file ${templates_dir}/qwen-fixed-chat-template.jinja\n--parallel 1\n--parallel-tool-calls\n--ctx-size ${small_model_max_ctx}\n--temp ${default_temp}\n--top-p ${default_top_p}\n--top-k ${default_top_k}\n--min-p ${default_min_p}\n--repeat-penalty ${default_repeat_penalty}\n--reasoning on\n--cache-type-k q8_0\n--cache-type-v q4_0\n--k-cache-hadamard\n--v-cache-hadamard\n--flash-attn auto\n--spec-type ngram-mod:n_max=64,n_min=48,ngram_size_n=24\n  --metrics\n"
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~3.75 GB (MoQ-3.6)
      context: 64K-128K (dynamic)
      vram_usage: ~4.8GB VRAM (text-only, ik with hadamard cache)
      source: w-ahmad/Qwen3.5-9B-GGUF-MoQ (MoQ-3.6)
      kv_cache: q8_0 + q4_0 hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 8950000000
      context_length: 262144
      embedding_length: 4096
      quantization: MoQ-3.6
      note: 'MoQ-3.6 replaces UD-Q4_K_XL: same speed (12.2 tok/s), equal+ quality (21/25 vs 20/25 Snake), 32% smaller (3.75 vs 5.55 GB). MTP OOM on 6GB VRAM.'
  gemma4-e4b:
    name: Gemma 4 E4B
    description: Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding.
    cmd: "${ik_llama_server} --port ${PORT}\n--model ${models_dir}/gemma-4-E4B-it-Q4_K_M.gguf\n# No --no-mmproj: ik doesn't support this flag (upstream-only)\n--fit\n--fit-margin 512\n--jinja\n--parallel 1\n--parallel-tool-calls\n--ctx-size ${small_model_max_ctx}\n--temp 0.7\n--top-p 0.9\n--top-k 40\n--min-p 0.01\n--repeat-penalty 1.0\n--reasoning on\n--cache-type-k q8_0\n--cache-type-v q4_0\n--k-cache-hadamard\n--v-cache-hadamard\n--flash-attn auto\n--spec-type ngram-mod:n_max=64,n_min=48,ngram_size_n=24\n  --metrics\n"
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~4.63 GB (Q4_K_M)
      context: 64K-128K (dynamic)
      vram_usage: ~5.3GB VRAM (fits with mmproj)
      source: unsloth/gemma-4-E4B-it-GGUF (Q4_K_M)
      kv_cache: q8_0 + q4_0 hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 7520000000
      context_length: 131072
      embedding_length: 2560
      quantization: Q4_K_M
      note: Upgraded from UD-Q3_K_XL → Q4_K_M. Text-only (no mmproj). Tightest VRAM model — adding mmproj reduces ctx.
  lfm2.5-vl-450m:
    name: LFM2.5-VL 450M
    description: Liquid AI general VLM with native bounding box grounding (RefCOCO-M 81.28). 450M params, 0-1 normalized coordinates.
    tags:
    - vision
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/LFM2.5-VL-450M-Q8_0.gguf\n--mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf\n--media-path ${media_path}\n--jinja\n--fit on\n--fit-target ${vram_margin}\n--fit-ctx 4096\n--ctx-size 8192\n--parallel 1\n--cont-batching\n--temp 0.3\n--top-p 0.9\n--top-k 40\n--min-p 0.0\n--repeat-penalty 1.1\n--cache-type-k f16\n--cache-type-v f16\n--flash-attn on\n--spec-type ngram-mod\n  --spec-ngram-mod-n-match 24\n  --spec-ngram-mod-n-min 48\n  --spec-ngram-mod-n-max 64\n  --metrics\n"
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      - image
      out:
      - text
      tools: false
      reranker: false
      context: 8192
    metadata:
      size: 379 MB (Q8_0) + 189 MB mmproj
      context: 8K (grounding-optimized)
      vram_usage: ~0.8 GB (model + mmproj + cache)
      source: LiquidAI/LFM2.5-VL-450M-GGUF (Q8_0 + mmproj F16)
      note: 'General VLM with grounding. Format: [{label, bbox:[x1,y1,x2,y2]}] 0-1 floats. NOT the Extract variant.'
      kv_cache: f16
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: true
      architecture: lfm2
      parameters: 450000000
      context_length: 128000
      embedding_length: 1024
      quantization: Q8_0
  ornith-1.0-35b:
    name: Ornith 1.0 35B
    description: Ornith-1.0 is a family of open-source LLMs specialized for agentic coding, trained with a novel self-scaffolding reinforcement learning approach that jointly optimizes the scaffold and the solution.
    cmd: "${ik_llama_server} --port ${PORT}\n--model ${models_dir}/ornith-1.0-35b/Ornith-1.0-35B-APEX-I-Compact.gguf\n--fit\n--fit-margin 1024\n--ctx-size 131072\n--temp 1.0\n--top-p 1.0\n--top-k ${code_top_k}\n--min-p ${code_min_p}\n--repeat-penalty ${code_repeat_penalty}\n--reasoning on\n--jinja\n--chat-template-file ${templates_dir}/qwen-fixed-chat-template.jinja\n--parallel 1\n--parallel-tool-calls\n--cache-type-k ${large_cache_k}\n--cache-type-v ${large_cache_v}\n--k-cache-hadamard\n--v-cache-hadamard\n--flash-attn auto\n--defer-experts\n--spec-type ngram-mod:n_max=64,n_min=48,ngram_size_n=24\n  --metrics\n"
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 1.0
          top_p: 1.0
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 1.0
          top_p: 1.0
    ttl: 900
    health_check_timeout: 900
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~16.5 GB (APEX I-Compact)
      context: 1K-131K (safe max)
      vram_usage: ~5.4GB VRAM + ~12GB pinned RAM (ik pinned memory, estimated 33-34 t/s)
      source: mudler/Ornith-1.0-35B-APEX-GGUF
      kv_cache: q4_0 + attn_rot + hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35moe
      parameters: 35000000000
      context_length: 262144
      embedding_length: 2048
      quantization: I-Compact
      note: 'Post-trained Qwen 3.5 35B MoE. Self-scaffolding RL for agentic coding. 256 experts, 8+1 active, ~3B active/token. APEX I-Compact: 22% smaller than Q4_K_M, imatrix v1.3 calibrated. Expected 33-34 t/s matching Qwen 3.6 APEX. Uses qwen-fixed-chat-template.jinja — embedded GGUF template lacks tool-call format instructions, causing <|mask_start|>/<tool_code> leakage.'
  agentworld-35b:
    name: Qwen AgentWorld 35B
    description: Qwen's native language world model. 35B params, 3B active. Simulates 7 agent environments (MCP, Search, Terminal, SWE, Android, Web, OS) via long chain-of-thought reasoning. Trained from CPT onward for environment modeling.
    cmd: "${ik_llama_server} --port ${PORT}\n--model ${models_dir}/agentworld-35b/Qwen-AgentWorld-35B-A3B-APEX-I-Compact.gguf\n--fit\n--fit-margin 768\n--ctx-size 131072\n--temp ${think_temp}\n--top-p ${think_top_p}\n--top-k ${think_top_k}\n--min-p ${think_min_p}\n--repeat-penalty ${think_repeat_penalty}\n--reasoning on\n--jinja\n--parallel 1\n--cache-type-k ${large_cache_k}\n--cache-type-v ${large_cache_v}\n--k-cache-hadamard\n--v-cache-hadamard\n--flash-attn auto\n--defer-experts\n--spec-type ngram-mod:n_max=64,n_min=48,ngram_size_n=24\n  --metrics\n"
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.95
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.95
    ttl: 600
    health_check_timeout: 600
    capabilities:
      in:
      - text
      out:
      - text
      tools: false
      reranker: false
      context: 131072
    metadata:
      size: ~16.5 GB (APEX I-Compact)
      context: 1K-131K (safe max)
      vram_usage: ~5.4GB VRAM + ~12GB pinned RAM (ik pinned memory, estimated 33-34 t/s)
      source: mudler/Qwen-AgentWorld-35B-A3B-APEX-GGUF
      kv_cache: q4_0 + attn_rot + hadamard
      domains: MCP, Search, Terminal, SWE, Android, Web, OS
      features:
        completion: true
        tools: false
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35moe
      parameters: 35000000000
      context_length: 262144
      embedding_length: 2048
      quantization: APEX I-Compact
      note: World model — simulates 7 agent environments. Use with worldsim CLI. Thinking mode recommended for simulation fidelity. 131K ctx safe max with APEX I-Compact (same as Qwen3.6/Ornith).
  bonsai-27b-1bit:
    name: Bonsai 27B 1-bit
    description: PrismML's 1-bit 27B reasoning model — Qwen3.6-27B with 1.125-bit weights, full thinking/reasoning at 3.9 GB. 89.5% of FP16 intelligence. Fits entirely in 6GB VRAM. Now on upstream llama.cpp with ngram-mod speculative decoding.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/bonsai-27b-1bit/Bonsai-27B-Q1_0.gguf

      --jinja

      --reasoning on

      -ngl 99

      --ctx-size 32768

      --temp 0.7

      --top-p 0.95

      --top-k 20

      --min-p 0

      --repeat-penalty 1.0

      --parallel 1

      --cache-type-k ${large_cache_k}

      --cache-type-v ${large_cache_v}

      --flash-attn on

      --spec-type ngram-mod

      --spec-ngram-mod-n-max 64

      --spec-ngram-mod-n-min 48

      --spec-ngram-mod-n-match 24

      --metrics

      '
    filters:
      stripParams: temperature, top_p, top_k, min_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.95
          top_k: 20
          min_p: 0
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.7
          top_p: 0.95
          top_k: 20
          min_p: 0
    ttl: 900
    health_check_timeout: 900
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 32768
    metadata:
      size: ~3.9 GB (Q1_0 binary 1.125 bpw)
      context: 32K (full GPU offload, RTX 3050 6GB — experimental/bisturi)
      vram_usage: ~4.8 GB (model + KV cache q4_0, fits entirely in GPU)
      source: prism-ml/Bonsai-27B-gguf (Q1_0)
      kv_cache: q4_0 + attn_rot
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen3
      parameters: 27300000000
      context_length: 262144
      embedding_length: 3584
      quantization: Q1_0 (binary 1.125 bpw)
      note: Reativado Jul 2026 — Q1_0 CUDA kernels merged upstream (b9867+), sem fork. ngram-mod speculative decoding para ~20-31 tok/s em RTX 3050 6GB. 48K ctx é o sweet spot de full-GPU offload.
  qwen3-vl-4b:
    name: Qwen3-VL 4B
    description: Qwen3-VL dense 4B vision-language model with native 2D/3D grounding, OCR in 32 languages, visual agent GUI, and video understanding.
    tags:
    - vision
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/qwen3-vl-4b/Qwen3VL-4B-Instruct-Q4_K_M.gguf\n--mmproj ${models_dir}/qwen3-vl-4b/mmproj-Qwen3VL-4B-Instruct-Q8_0.gguf\n--media-path ${media_path}\n--jinja\n--fit on\n--fit-target ${vram_margin}\n--fit-ctx 8192\n--ctx-size 32768\n--parallel 1\n--temp 0.7\n--top-p 0.8\n--top-k 20\n--min-p 0.0\n--repeat-penalty 1.0\n--presence-penalty 1.5\n--cache-type-k ${small_cache_k}\n--cache-type-v ${small_cache_v}\n--flash-attn on\n--spec-type ngram-mod\n  --spec-ngram-mod-n-match 24\n  --spec-ngram-mod-n-min 48\n  --spec-ngram-mod-n-max 64\n  --metrics\n"
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      - image
      out:
      - text
      tools: false
      reranker: false
      context: 32768
    metadata:
      size: 2.5 GB (Q4_K_M) + 454 MB mmproj
      context: 8K-256K (dynamic)
      vram_usage: ~4 GB (model + mmproj + cache)
      source: Qwen/Qwen3-VL-4B-Instruct-GGUF (Q4_K_M + mmproj Q8_0)
      note: 'Native grounding: bbox_2d [x1,y1,x2,y2] in 0-1000 scale. repeat_penalty 1.0 mandatory.'
      kv_cache: q8_0
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: true
      architecture: qwen3vl
      parameters: 4000000000
      context_length: 256000
      embedding_length: 2560
      quantization: Q4_K_M
  lfm2.5-vl-1.6b:
    name: LFM2.5-VL 1.6B
    description: Liquid AI flagship VLM with native grounding and visual reasoning. 1.6B params, 0-1 normalized coordinates.
    tags:
    - vision
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/lfm2.5-vl-1.6b-g/LFM2.5-VL-1.6B-Q8_0.gguf\n--mmproj ${models_dir}/lfm2.5-vl-1.6b-g/mmproj-LFM2.5-VL-1.6b-F16.gguf\n--media-path ${media_path}\n--jinja\n--fit on\n--fit-target ${vram_margin}\n--fit-ctx 8192\n--ctx-size 32768\n--parallel 1\n--temp 0.3\n--top-p 0.9\n--top-k 40\n--min-p 0.0\n--repeat-penalty 1.1\n--cache-type-k ${small_cache_k}\n--cache-type-v ${small_cache_v}\n--flash-attn on\n--spec-type ngram-mod\n  --spec-ngram-mod-n-match 24\n  --spec-ngram-mod-n-min 48\n  --spec-ngram-mod-n-max 64\n  --metrics\n"
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      - image
      out:
      - text
      tools: false
      reranker: false
      context: 32768
    metadata:
      size: 1.25 GB (Q8_0) + 854 MB mmproj
      context: 8K-32K (dynamic)
      vram_usage: ~2.5 GB (model + mmproj + cache)
      source: LiquidAI/LFM2.5-VL-1.6B-GGUF (Q8_0 + mmproj F16)
      note: 'Flagship VLM with grounding. Format: [{label, bbox:[x1,y1,x2,y2]}] 0-1 floats. NOT the Extract variant.'
      kv_cache: q8_0
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: true
      architecture: lfm2
      parameters: 1600000000
      context_length: 128000
      embedding_length: 2048
      quantization: Q8_0
  glm-4.7-flash:
    name: GLM 4.7 Flash
    description: GLM-4.7-Flash is a 30B Mixture-of-Experts model with Multi-head Latent Attention (MLA), 64 experts with 4 active per token. Built for fast, efficient conversational AI and tool calling.
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/glm-4.7-flash/GLM-4.7-Flash-APEX-I-Compact.gguf\n--fit on\n--fit-target 128\n--ctx-size 131072\n--temp 0.7\n--top-p 1.0\n--top-k -1\n--min-p 0.01\n--repeat-penalty 1.0\n--jinja\n--parallel 1\n--cache-type-k q4_0\n--cache-type-v q4_0\n--flash-attn on\n--spec-type ngram-mod\n  --spec-ngram-mod-n-match 24\n  --spec-ngram-mod-n-min 48\n  --spec-ngram-mod-n-max 64\n  --metrics\n"
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 1.0
          top_p: 0.95
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.7
          top_p: 1.0
    ttl: 300
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~14.6 GB (APEX I-Compact)
      context: 1K-131K (MLA enables full context, 24 t/s at 131K)
      vram_usage: ~5GB VRAM + ~10GB pinned RAM (upstream llama.cpp, 30 tok/s at 128K with q4_0+FA)
      source: mudler/GLM-4.7-Flash-APEX-GGUF
      kv_cache: q4_0
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: deepseek2
      parameters: 30000000000
      context_length: 131072
      embedding_length: 2048
      quantization: I-Compact
      note: 30B MoE with MLA (Multi-head Latent Attention, DeepSeek-V2 style). 64 experts, 4 active, ~2B active/token. Smallest 35B-class in fleet (14.6GB). MLA compresses KV cache internally — no hadamard transform needed. Apache-2.0.
  glm-ocr:
    name: GLM-OCR
    description: Multimodal OCR model for complex document understanding, built on the GLM-V encoder-decoder architecture integrating CogViT visual encoder with a GLM-0.5B language decoder.
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/GLM-OCR-Q8_0.gguf\n--mmproj ${models_dir}/mmproj-GLM-OCR-Q8_0.gguf\n--jinja\n--media-path ${media_path}\n--fit on\n--fit-target ${vram_margin}\n--fit-ctx ${small_model_min_ctx}\n--ctx-size ${small_model_max_ctx}\n--temp 0.1\n--top-p 0.9\n--top-k 40\n--repeat-penalty 1.0\n--reasoning off\n--cache-type-k f16\n--cache-type-v f16\n--flash-attn on\n--spec-type ngram-mod\n  --spec-ngram-mod-n-match 24\n  --spec-ngram-mod-n-min 48\n  --spec-ngram-mod-n-max 64\n  --metrics\n"
    ttl: 60
    capabilities:
      in:
      - text
      - image
      out:
      - text
      tools: false
      reranker: false
      context: 131072
    metadata:
      architecture: glm4
      parameters: 940000000
      context_length: 131072
      embedding_length: 2048
      quantization: Q8_0
      size: ~0.95 GB (Q8_0) + ~0.48 GB mmproj (Q8_0)
      vram_usage: ~2GB (model + mmproj + cache)
      source: ggml-org/GLM-OCR-GGUF (Q8_0 + mmproj Q8_0)
      kv_cache: f16
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      note: Specialized OCR model — use prompts like 'OCR', 'OCR markdown', 'Table Recognition:'. NOT a general VLM. Complements LFM2.5-VL-450M (general vision) for document extraction.
  hy-mt2-1.8b:
    name: Hy-MT2 1.8B
    description: Fast-thinking multilingual translation model from Tencent Hunyuan, supporting translation across 33 languages for complex real-world scenarios.
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/Hy-MT2-1.8B-Q4_K_M.gguf\n--jinja\n--fit on\n--fit-target 768\n--fit-ctx ${small_model_min_ctx}\n--ctx-size ${small_model_max_ctx}\n--parallel 1\n--temp 0.7\n--top-p 0.6\n--top-k 20\n--repeat-penalty 1.05\n--cache-type-k ${small_cache_k}\n--cache-type-v ${small_cache_v}\n--flash-attn on\n--spec-type ngram-mod\n  --spec-ngram-mod-n-match 24\n  --spec-ngram-mod-n-min 48\n  --spec-ngram-mod-n-max 64\n  --metrics\n"
    health_check_timeout: 300
    ttl: 60
    capabilities:
      in:
      - text
      out:
      - text
      tools: false
      reranker: false
      context: 131072
    metadata:
      size: ~1.1 GB (Q4_K_M)
      context: 32K-128K (dynamic)
      vram_usage: ~2GB (model + cache)
      source: tencent/Hy-MT2-1.8B-GGUF (Q4_K_M)
      kv_cache: q8_0 + attn_rot
      features:
        completion: true
        tools: false
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: hunyuan-dense
      parameters: 1790000000
      context_length: 262144
      embedding_length: 2048
      quantization: Q4_K_M
      note: 'Translation-only model. No system prompt needed (per Hy-MT2 docs). Official prompt: ''Translate the following text into {target_lang}. Note that you should only output the translated result without any additional explanation:


        {source_text}''. Supports terminology, style, personalization, delimiter preservation, and structured data translation. See https://github.com/Tencent-Hunyuan/Hy-MT2 for all prompt formats.'
  lfm2.5-230m:
    name: LFM2.5 230M
    description: 'Liquid AI''s smallest model — 230M params, ultra-fast tool calling and data extraction. Runs anywhere: CPU, NPU, GPU.'
    tags:
    - tools
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/LFM2.5-230M-Q8_0.gguf

      --jinja

      --fit on

      --fit-target ${vram_margin}

      --fit-ctx ${small_model_min_ctx}

      --ctx-size 32768

      --parallel 1

      --cont-batching

      --temp ${code_temp}

      --top-p ${code_top_p}

      --top-k ${code_top_k}

      --min-p ${code_min_p}

      --repeat-penalty ${code_repeat_penalty}

      --cache-type-k ${small_cache_k}

      --cache-type-v ${small_cache_v}

      --flash-attn on

      --spec-type ngram-mod

      --spec-ngram-mod-n-match 24

      --spec-ngram-mod-n-min 48

      --spec-ngram-mod-n-max 64

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          temperature: 0.3
          top_p: 0.9
    health_check_timeout: 300
    ttl: 60
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 32768
    metadata:
      size: ~247 MB (Q8_0)
      context: 32K (extendable to 128K)
      vram_usage: ~0.4GB (model + cache)
      source: LiquidAI/LFM2.5-230M-GGUF (Q8_0)
      kv_cache: q8_0 + q8_0
      features:
        completion: true
        tools: true
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2
      parameters: 229693184
      context_length: 128000
      embedding_length: 1024
      quantization: Q8_0
      warning: NOT recommended for math, code generation, or creative writing
  lfm2.5-8b-a1b:
    name: LFM 2.5 8B
    description: Liquid AI MoE hybrid — 8.3B total, 1.5B active per token. Built for fast, reliable tool calling on consumer hardware.
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/lfm2.5-8b-a1b/LFM2.5-8B-A1B-APEX-I-Compact.gguf\n--fit on\n--fit-ctx 16384\n--ctx-size 131072\n--parallel 1\n--no-cont-batching\n--reasoning-format deepseek-legacy\n--reasoning on\n--chat-template-file ${templates_dir}/lfm2.5-chat-template.jinja\n--temp 0.2\n--top-p 0.8\n--top-k 40\n--min-p 0.15\n--repeat-penalty 1.05\n--cache-type-k q8_0\n--cache-type-v q4_0\n--flash-attn on\n--n-predict -1\n--jinja\n--spec-type ngram-mod\n  --spec-ngram-mod-n-match 24\n  --spec-ngram-mod-n-min 48\n  --spec-ngram-mod-n-max 64\n  --metrics\n"
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          temperature: 0.2
          min_p: 0.15
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.3
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~4.2 GB (APEX I-Compact)
      context: 128K
      vram_usage: ~5.2GB VRAM (4.2 GB model + KV)
      source: mudler/LFM2.5-8B-A1B-APEX-GGUF
      kv_cache: q8_0 + q4_0 hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2moe
      parameters: 8470000000
      context_length: 128000
      embedding_length: 2048
      quantization: APEX I-Compact
      note: 'MoE 1.5B active, hybrid conv+GQA. Reasoning + tool calling. APEX I-Compact: 13% smaller than Q4_0, imatrix v1.3 calibrated. Uses upstream (BeeLlama segfaults on LFM2.5). GGUF has empty chat_template — requires --chat-template-file + --reasoning-format deepseek.'
  lfm2.5-colbert-350m:
    name: LFM2.5 ColBERT 350M
    description: Liquid AI late-interaction reranker with best-in-class multilingual performance. Per-token 128-dim vectors matched via MaxSim. Higher accuracy than dense embedders across 11 languages.
    env:
    - CUDA_VISIBLE_DEVICES=
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/LFM2.5-ColBERT-350M-Q8_0.gguf\n--embeddings\n--pooling mean\n--ctx-size 512\n--cont-batching\n--cache-type-k f16\n--cache-type-v f16\n-ngl 0\n  --metrics\n"
    ttl: 300
    capabilities:
      in:
      - text
      out: []
      tools: false
      reranker: true
      context: 512
    metadata:
      architecture: lfm2-bidir
      parameters: 353000000
      context_length: 512
      embedding_length: 128
      quantization: Q8_0
      size: ~378 MB (Q8_0)
      vram_usage: ~0.1GB (CPU-only, -ngl 0, CUDA ctx overhead only)
      source: LiquidAI/LFM2.5-ColBERT-350M-GGUF (Q8_0)
      kv_cache: f16
      features:
        completion: false
        tools: false
        thinking: false
        vision: false
        embedding: true
        insert: false
        audio: false
        image: false
      note: Late-interaction model. OAI-compatible /v1/embeddings uses mean-pooled 128-dim vectors. For true MaxSim reranking, use raw /embedding endpoint for per-token vectors and compute MaxSim client-side. Asymmetric prompts from config_sentence_transformers.json. 11 languages. Higher accuracy than dense (0.605 vs 0.577 NDCG@10) but larger index (per-token vectors).
  lfm2.5-embed-350m:
    name: LFM2.5 Embed 350M
    description: Liquid AI dense bi-encoder for fast multilingual retrieval. Single 1024-dim vector per document. Best-in-class dense embedder at 350M scale across 11 languages.
    env:
    - CUDA_VISIBLE_DEVICES=
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/LFM2.5-Embedding-350M-Q8_0.gguf\n--embeddings\n--pooling cls\n--ctx-size 512\n--cont-batching\n--cache-type-k f16\n--cache-type-v f16\n-ngl 0\n  --metrics\n"
    ttl: 300
    capabilities:
      in:
      - text
      out: []
      tools: false
      reranker: false
      context: 512
    metadata:
      architecture: lfm2-bidir
      parameters: 354000000
      context_length: 512
      embedding_length: 1024
      quantization: Q8_0
      size: ~379 MB (Q8_0)
      vram_usage: ~0.1GB (CPU-only, -ngl 0, CUDA ctx overhead only)
      source: LiquidAI/LFM2.5-Embedding-350M-GGUF (Q8_0)
      kv_cache: f16
      features:
        completion: false
        tools: false
        thinking: false
        vision: false
        embedding: true
        insert: false
        audio: false
        image: false
      note: 'Embedding-only model. Use /v1/embeddings endpoint. Asymmetric prompts: ''query: '' for queries, ''document: '' for passages. 11 languages. Dense bi-encoder — one 1024-dim vector per document.'
  lfm2.5-vl-450m-hand-tracking:q8_0:
