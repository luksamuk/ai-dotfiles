      --top-k 40
      --min-p 0.0
      --repeat-penalty 1.0
      --flash-attn on
    ttl: 60
    aliases:
      - "qwopus4b"
      - "qwopus-4b"
    metadata:
      size: "2.63 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "Jackrong/Qwopus3.5-4B-v3-GGUF"
      features:
        thinking: true
        tools: true

  # -------------------------------------------
  # QWOPUS-9B - TOOL-CALLING + REASONING
  # Fine-tune do Qwen3.5-9B focado em tool-calling
  # Sempre usa reasoning (treinado assim)
  # Melhor para: agentes, function calling, código
  # 87.80% HumanEval (+4.87pp sobre base)
  # -------------------------------------------
  "qwopus-9b":
    name: "Qwopus 9B"
    description: "Qwopus3.5-9B-v3 Q4_K_M - Tool-calling + reasoning"
