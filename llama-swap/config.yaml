# llama-swap configuration for RTX 3050 Laptop (6GB VRAM)
# Configuração otimizada para uso com --fit automático + attn_rot (KV cache quantizado)
# Dual binary: llama.cpp for dense models, ik_llama.cpp for MoE models (pinned memory, better expert offload)
#
# Repositório: ~/git/ai-dotfiles/llama-swap/
# Modelos: ~/.llama-models/
# Requer: llama-swap v212+ (Prometheus metrics, SIGHUP reload, reasoning UI, race fix, zstd captures)
# Requer: llama.cpp build b9174+ (MTP support via --spec-type draft-mtp, Qwen3.5/3.6 tokenizer fix, WebGPU gpt-oss, /v1/models modalities, NCCL-free TP)
# Requer: ik_llama.cpp v4504+ (MTP re-quant output tensor, Gemma4 MTP + imatrix, --threads-mtmd, MTP recurrent state restore, mmproj n_batch fix)

# Schema para validação (VS Code)

healthCheckTimeout: 300
logLevel: info
logTimeFormat: "rfc3339"
logToStdout: "proxy"
captureBuffer: 15
startPort: 10001
sendLoadingState: false
includeAliasesInList: true
globalTTL: 0

# Macros reutilizáveis
macros:
  "models_dir": "${env.HOME}/.llama-models"
  "media_path": "${env.HOME}/testfiles/vision"
  
  # Caminho para o llama-server compilado com CUDA (--fit disponível)
  # Build local em ~/git/llama.cpp/build/bin/llama-server
  "llama_server": "${env.HOME}/git/llama.cpp/build/bin/llama-server"
  
  # Caminho para ik_llama.cpp — fork otimizado para MoE (pinned memory, faster expert offload)
  # Build local em ~/git/ik_llama.cpp/build/bin/llama-server
  "ik_llama_server": "${env.HOME}/git/ik_llama.cpp/build/bin/llama-server"
  
  # Caminho para o vLLM (installed in ~/.vllm venv)
  "vllm_bin": "${env.HOME}/.vllm/bin/vllm"
  
  # ===========================================
  # PARÂMETROS DE INFERÊNCIA (baseados no Unsloth)
  # ===========================================
  # Qwen3.5: temp 0.6-0.7, top_p 0.8-0.9, top_k 20-40

  # Gemma: temp 0.7, top_p 0.9
  # Referência: https://unsloth.ai/docs/models/qwen3.5
  # ===========================================
  
  # Parâmetros padrão (uso geral)
  "default_temp": "0.7"
  "default_top_p": "0.9"
  "default_top_k": "20"
  "default_min_p": "0.01"
  "default_repeat_penalty": "1.05"
  
  # Parâmetros para código/tool-calling (mais determinístico)
  "code_temp": "0.6"
  "code_top_p": "0.85"
  "code_top_k": "40"
  "code_min_p": "0.02"
  "code_repeat_penalty": "1.05"
  
  # Parâmetros para thinking/reasoning
  "think_temp": "0.6"
  "think_top_p": "0.9"
  "think_top_k": "20"
  "think_min_p": "0.0"
  "think_repeat_penalty": "1.0"
  
  # Contexto para modelos pequenos (cabem inteiros na VRAM)
  # fit-ctx: mínimo garantido, ctx-size: máximo teto
  "small_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "small_model_max_ctx": "131072"  # 128K máximo
  
  # Contexto para modelos grandes (requerem offload)
  "large_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "large_model_max_ctx": "131072"  # 128K máximo
  
  # Margem de segurança para VRAM (MiB) - usada pelo --fit-target
  "vram_margin": "512"

  # ===========================================
  # KV CACHE QUANTIZADO + ATTN_ROT
  # ===========================================
  # attn_rot é ativado AUTOMATICAMENTE quando o cache é quantizado
  # (q4_0/q8_0) e n_embd_head % 64 == 0
  # Reduz degradação de velocidade em contextos longos (~37% → ~10%)
  # NOTA: Gemma4 iSWA attn_rot bug FIXED (commit 4eb19514d, b8815+). q4_0 cache works now!
  # ===========================================
  #
  # Compatibilidade attn_rot por modelo:
  #   Qwen3.5-4B/9B   ✅ head_k=256 (256%64==0)
  #   Qwen3-14B        ✅ head_k=128 (128%64==0)
  #   Qwen3.6-35B-A3B  ✅ head_k=128
    #   Nemotron-3-Nano  ✅ head_k=128 (REMOVED — poor quality)
    # Nemotron-Omni-30B ✅ head_k=128 (NOT added — upstream-only, ik doesn't support nemotron_h_moe)
  #   Gemma-4 E2B/E4B  ✅ head_k=256, iSWA attn_rot fixed (b8815+)
  #   Gemma-4 26B-MoE  ✅ head_k=256, iSWA attn_rot fixed (b8815+)
  #   LFM2.5-1.2B       ✅ head_k=64 (64%64==0) — dense hybrid
  #   LFM2-24B-A2B     ✅ head_k=128 (128%64==0) — MoE hybrid
  #   LFM2.5-VL-450M   ❌ vision model, manter f16
  #
  # Tipos de cache:
  #   q8_0: ~47% economia vs f16, perda mínima
  #   q4_0: ~72% economia vs f16, mais compressão
  #
  # Escolha: modelos pequenos (fit VRAM) usam q8_0 (saldo perf/mem)
  #          modelos grandes (offload) usam q4_0 (maximizar contexto)
  "small_cache_k": "q8_0"
  "small_cache_v": "q8_0"
  "large_cache_k": "q4_0"
  "large_cache_v": "q4_0"
  "gemma_cache_k": "q4_0"
  "gemma_cache_v": "q4_0"
# ===========================================
# MODELOS (nomes estilo Ollama: modelo:tamanho)
# ===========================================
models:

  # -------------------------------------------
  # QWEN3.5-0.8B - MULTIMODAL (VISION + TEXT)
  # Smallest Qwen3.5 variant with native vision (early fusion)
  # Cabe inteiro na VRAM: 0.55GB model + 0.20GB mmproj + ~1GB cache
  # mmproj ~196MB (F16) — lightweight enough to fit with model+cache
  # NOTE: Bug #21402 (Gemma 4 mmproj crash) does NOT affect Qwen3.5
  # NOTE: Bug #22785 (Qwen-VL accuracy degraded in llama-server) — monitor
  # KV cache: q8_0 + attn_rot (head_dim provavelmente 128, 128%64==0)
  # -------------------------------------------
  # UNLISTED: nice-to-have tiny model, disk freed for space
  "qwen3.5-0.8b":
    name: "Qwen3.5 0.8B"
    description: "Compact multimodal reasoning model — text + vision (llama.cpp GGUF)"
    unlisted: true
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-0.8B-UD-Q3_K_XL.gguf
      --mmproj ${models_dir}/mmproj-Qwen3.5-0.8B-F16.gguf
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~0.47 GB (UD-Q3_K_XL Dynamic 2.0) + ~0.20 GB (mmproj F16)"
      context: "64K-128K (dynamic)"
      vram_usage: "~1.6GB (model + mmproj + cache)"
      source: "unsloth/Qwen3.5-0.8B-GGUF (UD-Q3_K_XL)"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        vision: true
        tools: true

  # -------------------------------------------
  # QWEN3.5-0.8B - vLLM BACKEND (PAUSADO — venv + HF models deletados)
  # Restaurar: pip install vllm em ~/.vllm, HF models re-downloaded no primeiro serve
  # UNLISTED: pausado até Sprachspiel suportar multi-provider via OpenAI API
  # -------------------------------------------
  "qwen3.5-0.8b-vllm":
    name: "Qwen3.5 0.8B (vLLM)"
    description: "vLLM backend test — Sprachspiel compatibility (NOT for daily use)"
    unlisted: true
    cmd: |
      ${vllm_bin} serve Qwen/Qwen3.5-0.8B
      --port ${PORT}
      --served-model-name qwen3.5-0.8b-vllm
      --gpu-memory-utilization 0.70
      --max-model-len 8192
      --max-num-seqs 2
      --dtype half
      --trust-remote-code
      --default-chat-template-kwargs '{"enable_thinking": true}'
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --skip-mm-profiling
      --limit-mm-per-prompt '{"image": 0}'
    ttl: 900
    metadata:
      backend: vllm
      size: "~1.6 GB (BF16 safetensors, auto-download from HF)"
      context: "8K (vLLM optimized for 6GB VRAM)"
      vram_usage: "~2-2.5GB (vision disabled)"
      source: "Qwen/Qwen3.5-0.8B (HuggingFace safetensors)"
      note: "vLLM test backend for Sprachspiel — slow startup (~30-90s), use only for API compat testing"
      features:
        thinking: true
        vision: false
        tools: true

  # -------------------------------------------
  # LFM2.5-1.2B-INSTRUCT - vLLM BACKEND (PAUSADO — venv + HF models deletados)
  # Restaurar: pip install vllm em ~/.vllm, HF models re-downloaded no primeiro serve
  # UNLISTED: pausado até Sprachspiel suportar multi-provider via OpenAI API
  # -------------------------------------------
  "lfm2.5-1.2b-vllm":
    name: "LFM2.5 1.2B Instruct (vLLM)"
    description: "vLLM backend — lfm2 tool parser, proper tool calling (Sprachspiel compat)"
    unlisted: true
    cmd: |
      ${vllm_bin} serve LiquidAI/LFM2.5-1.2B-Instruct
      --port ${PORT}
      --served-model-name lfm2.5-1.2b-vllm
      --gpu-memory-utilization 0.70
      --max-model-len 8192
      --max-num-seqs 2
      --dtype half
      --trust-remote-code
      --enable-auto-tool-choice
      --tool-call-parser lfm2
    ttl: 900
    metadata:
      backend: vllm
      size: "~2.4 GB (BF16 safetensors, auto-download from HF)"
      context: "8K (vLLM optimized for 6GB VRAM)"
      vram_usage: "~3GB (model + cache)"
      source: "LiquidAI/LFM2.5-1.2B-Instruct (HuggingFace safetensors)"
      note: "vLLM backend with native lfm2 tool parser — no --jinja workaround needed"
      features:
        thinking: false
        vision: false
        tools: true

  # -------------------------------------------
  # SGLANG BACKEND (PAUSADO — venv ~/.sglang-venv deletado)
  # Restaurar: pip install sglang em ~/.sglang-venv, HF models re-downloaded
  # UNLISTED: pausado até Sprachspiel suportar multi-provider via OpenAI API
  # -------------------------------------------
  "lfm2.5-sgl":
    name: "LFM2.5 1.2B (SGLang)"
    description: "SGLang backend test — Sprachspiel compatibility (NOT for daily use)"
    unlisted: true
    cmd: |
      ${env.HOME}/.sglang-venv/bin/python -m sglang.launch_server
      --model-path LiquidAI/LFM2.5-1.2B-Instruct
      --trust-remote-code
      --port ${PORT}
      --host 127.0.0.1
      --mem-fraction-static 0.7
      --tool-call-parser lfm2
    ttl: 900
    healthCheckTimeout: 300
    metadata:
      backend: sglang
      size: "~2.5 GB (BF16 safetensors, cached from HF)"
      context: "~32K default (mem-fraction 0.7)"
      vram_usage: "~3.2 GB (model + KV cache)"
      source: "LiquidAI/LFM2.5-1.2B-Instruct (HuggingFace safetensors)"
      note: "SGLang backend for Sprachspiel compat testing — RadixAttention cache, slower startup (~2 min JIT compile)."
      health_check_timeout: 300
      features:
        thinking: false
        vision: false
        tools: true

  # -------------------------------------------
  # QWEN3.5-4B - MULTIMODAL (VISION + TEXT)
  # Cabe inteiro na VRAM com mmproj
  # mmproj ~400MB - --fit-target 512 para vision
  # KV cache: q8_0 + attn_rot (auto)
  # -------------------------------------------
  "qwen3.5-4b":
    name: "Qwen3.5 4B"
    description: "Multimodal reasoning and agentic chat with 201-language support"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-4B-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~2.27 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/Qwen3.5-4B-GGUF (UD-Q3_K_XL)"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        tools: true
        # vision: disabled — Gated Delta Net mmproj OOM on CUDA (issue #21323)
      warning: "Vision disabled — Gated Delta Net mmproj crashes/CUDA OOM (llama.cpp issues #21323, #21402)"

  # UNLISTED: nice-to-have 9B variant, disk freed for space. qwen3.5-4b covers daily use.
  "qwen3.5-9b":
    name: "Qwen3.5 9B"
    description: "Multimodal reasoning, coding, and agentic chat with 201-language support"
    unlisted: true
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 512
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~5.05 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5GB VRAM (text-only, mmproj offload needs fix)"
      source: "unsloth/Qwen3.5-9B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        tools: true
        # vision: disabled temporarily — mmproj + fit doesn't handle offload yet
      warning: "Vision disabled temporarily — mmproj offload with --fit causes OOM"

  "gemma4-e4b":
    name: "Gemma 4 E4B"
    description: "On-device multimodal reasoning with text, image, and audio understanding"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 512
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~4.5 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5GB VRAM (fits with mmproj!)"
      source: "unsloth/gemma-4-E4B-it-GGUF"
      kv_cache: "q4_0 + attn_rot (iSWA fix b8815+)"
      features:
        thinking: true
        tools: true
        # vision: disabled — mmproj crashes on CUDA (issue #21402)
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA (llama.cpp issue #21402). Text-only mode."

  "gemma4-e2b":
    name: "Gemma 4 E2B"
    description: "Compact on-device multimodal reasoning with text, image, and audio"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E2B-it-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 1024
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~2.72 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/gemma-4-E2B-it-GGUF (UD-Q3_K_XL)"
      kv_cache: "q4_0 + attn_rot (iSWA fix b8815+)"
      features:
        thinking: true
        tools: true

  # -------------------------------------------
  # LFM2.5-1.2B-INSTRUCT - DENSE HYBRID (CONV + GQA)
  # Liquid AI's 1.2B dense instruct model — best tool-calling / agentic
  # Treinado em 28T tokens + RL. Melhor pra tool-calling (sem CoT forçado).
  # Tool calling reliability: CONSISTENT — best LFM2 for agentic tasks
  # Liquid AI recommends: temp=0.3, min_p=0.15, repeat_penalty=1.05
  # head_dim=64 → attn_rot ✅ (64%64==0)
  # Architecture: lfm2 (upstream llama.cpp b8145+)
  # Q8_0 ~1.25GB — practically lossless, still fits entirely in VRAM
  # -------------------------------------------
  "lfm2.5-1.2b":
    name: "LFM2.5 1.2B Instruct"
    description: "Edge hybrid — conv+GQA dense, tool-calling optimized (Q8_0, llama.cpp)"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-1.2B-Instruct-Q8_0.gguf
      --jinja
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.3
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      size: "~1.25 GB (Q8_0)"
      context: "32K-128K (dynamic)"
      vram_usage: "~2GB (model + cache)"
      source: "LiquidAI/LFM2.5-1.2B-Instruct-GGUF (Q8_0)"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: false
        vision: false
        tools: true

  # -------------------------------------------
  # LFM2.5-1.2B-THINKING - DENSE HYBRID (CONV + GQA) WITH CHAIN-OF-THOUGHT
  # Liquid AI's 1.2B reasoning model — CoT before answer, best for math/reasoning
  # Treinado em 28T tokens + multi-stage RL. MATH-500: 88%, GSM8K: 85.6%
  # Liquid AI recommends: temp=0.3, min_p=0.15, repeat_penalty=1.05
  # head_dim=64 → attn_rot ✅ (64%64==0)
  # Architecture: lfm2 (upstream llama.cpp b8145+)
  # Q8_0 ~1.25GB — practically lossless, still fits entirely in VRAM
  # Tool calling reliability: HOPELESS for agentic — CoT disperses reasoning away from tool-call structure
  # UNLISTED: always-on CoT is useless for tool-calling, superseded by lfm2.5-1.2b (Instruct)
  # -------------------------------------------
  "lfm2.5-1.2b-think":
    name: "LFM2.5 1.2B Thinking"
    description: "Edge hybrid reasoning — conv+GQA dense, always thinks (Q8_0, llama.cpp)"
    unlisted: true
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-1.2B-Thinking-Q8_0.gguf
      --jinja
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.3
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
    ttl: 60
    metadata:
      size: "~1.25 GB (Q8_0)"
      context: "32K-128K (dynamic)"
      vram_usage: "~2GB (model + cache)"
      source: "LiquidAI/LFM2.5-1.2B-Thinking-GGUF (Q8_0)"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        vision: false
        tools: true
      warning: "SEMPRE gera CoT internamente (como gpt-oss-20b). Pior pra tool-calling — use lfm2.5-1.2b (Instruct) para tarefas agenticas."

  # Edge vision-language model — 0.22 GB + 0.18 GB mmproj, fits entirely in VRAM
  "lfm2.5-vl-450m":
    name: "LFM2.5-VL 450M"
    description: "Edge vision-language model for object detection and captioning"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-VL-450M-Q8_0.gguf
      --jinja
      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf
      --media-path ${media_path}
      --fit on
