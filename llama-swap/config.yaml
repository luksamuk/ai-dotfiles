# Features: tool calling, reasoning (preview — experimental, may be unstable)
# License: OpenMDW-1.1 (permissive, commercial use OK)
# Backend: upstream llama.cpp b766+ (AfmoeForCausalLM arch)
# -------------------------------------------
  "trinity-nano":
    unlisted: true
