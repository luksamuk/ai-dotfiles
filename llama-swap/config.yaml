# llama-swap configuration for RTX 3050 Laptop (6GB VRAM)
# Configuração otimizada para uso com --fit automático + attn_rot (KV cache quantizado)
#
# Repositório: ~/git/ai-dotfiles/llama-swap/
# Modelos: ~/.llama-models/
# Requer: llama-swap v209+ (reasoning UI, macro length, histogram split, SIGHUP reload)
# Requer: llama.cpp build b8991+ (reasoning budget sampler fix, fast i-quant matmul, CUDA refactor)

# Schema para validação (VS Code)

healthCheckTimeout: 300
logLevel: info
logTimeFormat: "rfc3339"
logToStdout: "proxy"
captureBuffer: 15
startPort: 10001
sendLoadingState: false
includeAliasesInList: true
globalTTL: 0

# Macros reutilizáveis
macros:
  "models_dir": "${env.HOME}/.llama-models"
  
  # Caminho para o llama-server compilado com CUDA (--fit disponível)
  # Build local em ~/git/llama.cpp/build/bin/llama-server
  "llama_server": "${env.HOME}/git/llama.cpp/build/bin/llama-server"
  
  # ===========================================
  # PARÂMETROS DE INFERÊNCIA (baseados no Unsloth)
  # ===========================================
  # Qwen3.5: temp 0.6-0.7, top_p 0.8-0.9, top_k 20-40
  # Nemotron: temp 0.6, top_p 0.9
  # Gemma: temp 0.7, top_p 0.9
  # Referência: https://unsloth.ai/docs/models/qwen3.5
  # ===========================================
  
  # Parâmetros padrão (uso geral)
  "default_temp": "0.7"
  "default_top_p": "0.9"
  "default_top_k": "20"
  "default_min_p": "0.01"
  "default_repeat_penalty": "1.05"
  
  # Parâmetros para código/tool-calling (mais determinístico)
  "code_temp": "0.6"
  "code_top_p": "0.85"
  "code_top_k": "40"
  "code_min_p": "0.02"
  "code_repeat_penalty": "1.05"
  
  # Parâmetros para thinking/reasoning
  "think_temp": "0.6"
  "think_top_p": "0.9"
  "think_top_k": "20"
  "think_min_p": "0.0"
  "think_repeat_penalty": "1.0"
  
  # Contexto para modelos pequenos (cabem inteiros na VRAM)
  # fit-ctx: mínimo garantido, ctx-size: máximo teto
  "small_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "small_model_max_ctx": "131072"  # 128K máximo
  
  # Contexto para modelos grandes (requerem offload)
  "large_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "large_model_max_ctx": "131072"  # 128K máximo
  
  # Margem de segurança para VRAM (MiB) - usada pelo --fit-target
  "vram_margin": "512"

  # ===========================================
  # KV CACHE QUANTIZADO + ATTN_ROT
  # ===========================================
  # attn_rot é ativado AUTOMATICAMENTE quando o cache é quantizado
  # (q4_0/q8_0) e n_embd_head % 64 == 0
  # Reduz degradação de velocidade em contextos longos (~37% → ~10%)
  # NOTA: Gemma4 tem bug com attn_rot (issue #21394), usar f16 nele
  # ===========================================
  #
  # Compatibilidade attn_rot por modelo:
  #   Qwen3.5-4B/9B   ✅ head_k=256 (256%64==0)
  #   Qwen3-14B        ✅ head_k=128 (128%64==0)
  #   Qwen3.6-27B      ✅ head_k=256 (256%64==0) — Gated Attn
  #   Qwen3.6-35B-A3B  ✅ head_k=128
  #   Nemotron-3-Nano  ✅ head_k=128
  #   Nemotron-Omni-30B ✅ head_k=128
  #   Gemma-4 E2B/E4B  ❌ bug #21394, usar f16
  #   LFM2.5-VL-450M   ❌ vision model, manter f16
  #
  # Tipos de cache:
  #   q8_0: ~47% economia vs f16, perda mínima
  #   q4_0: ~72% economia vs f16, mais compressão
  #
  # Escolha: modelos pequenos (fit VRAM) usam q8_0 (saldo perf/mem)
  #          modelos grandes (offload) usam q4_0 (maximizar contexto)
  "small_cache_k": "q8_0"
  "small_cache_v": "q8_0"
  "large_cache_k": "q4_0"
  "large_cache_v": "q4_0"
  "gemma_cache_k": "f16"
  "gemma_cache_v": "f16"

# ===========================================
# MODELOS (nomes estilo Ollama: modelo:tamanho)
# ===========================================
models:
  # -------------------------------------------
  # QWEN3.5-4B - MULTIMODAL (VISION + TEXT)
  # Cabe inteiro na VRAM com mmproj
  # mmproj ~400MB - --fit-target 512 para vision
  # KV cache: q8_0 + attn_rot (auto)
  # -------------------------------------------
  "qwen3.5-4b":
    name: "Qwen3.5 4B"
    description: "Multimodal reasoning and agentic chat with 201-language support"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-4B-Q4_K_M.gguf
      --no-mmproj
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "2.63 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/Qwen3.5-4B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        # vision: disabled — Gated Delta Net mmproj OOM on CUDA (issue #21323)
      warning: "Vision disabled — Gated Delta Net mmproj crashes/CUDA OOM (llama.cpp issues #21323, #21402)"

  "qwen3.5-9b":
    name: "Qwen3.5 9B"
    description: "Multimodal reasoning, coding, and agentic chat with 201-language support"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 512
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~5.05 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5GB VRAM (text-only, mmproj offload needs fix)"
      source: "unsloth/Qwen3.5-9B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        # vision: disabled temporarily — mmproj + fit doesn't handle offload yet
      warning: "Vision disabled temporarily — mmproj offload with --fit causes OOM"

  "gemma4-e4b":
    name: "Gemma 4 E4B"
    description: "On-device multimodal reasoning with text, image, and audio understanding"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 512
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~4.5 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5GB VRAM (fits with mmproj!)"
      source: "unsloth/gemma-4-E4B-it-GGUF"
      kv_cache: "f16 (Gemma4 bug #21394)"
      features:
        thinking: true
        # vision: disabled — mmproj crashes on CUDA (issue #21402)
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA (llama.cpp issue #21402). Text-only mode."

  "gemma4-e2b":
    name: "Gemma 4 E2B"
    description: "Compact on-device multimodal reasoning with text, image, and audio"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E2B-it-Q4_K_M.gguf
      --no-mmproj
      --fit on
      --fit-target 1024
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "3.11 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/gemma-4-E2B-it-GGUF"
      kv_cache: "f16 (Gemma4 bug #21394)"
      features:
        thinking: true
        # vision: disabled — mmproj crashes on CUDA (issue #21402)
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA (llama.cpp issue #21402). Text-only mode."

  "nemotron-3-nano-4b":
    name: "Nemotron 3 Nano 4B"
    description: "Compact edge-ready reasoning and agentic AI with tool use"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/NVIDIA-Nemotron-3-Nano-4B-Q4_K_M.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.6
      --top-p 0.9
      --top-k 40
      --min-p 0.00
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "2.90 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/NVIDIA-Nemotron-3-Nano-4B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        tools: true

  "lfm2.5-vl-450m":
    name: "LFM2.5-VL 450M"
    description: "Edge vision-language model for object detection and captioning"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-VL-450M-Q4_0.gguf
      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.1
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --reasoning off
      --cache-type-k f16
      --cache-type-v f16
      --flash-attn on
    ttl: 60
    metadata:
      size: "0.22 GB + mmproj"
      context: "32K-128K (dynamic)"
      vram_usage: "~0.5GB"
      source: "LiquidAI/LFM2.5-VL-450M-GGUF"
      kv_cache: "f16 (vision, precision priority)"
      features:
        vision: true

  # -------------------------------------------
  # NEMOTRON-3-NANO-OMNI-30B - MULTIMODAL OMNI (VIDEO + IMAGE + TEXT)
  # MoE 30B params, 3B ativo por token. Contexto até 256K.
  # NVIDIA recomenda: temp 1.0, top_p 1.0 (geral); temp 0.6, top_p 0.95 (tools)
  # Variantes via filters.setParamsByID: base (chat) e :think (reasoning)
  # UD-Q3_K_XL ~17GB + mmproj ~1.48GB → ~18.5GB total (Dynamic 2.0)
  # Offload pesado na RTX3050 (~2.5GB VRAM + ~16GB RAM)
  # mmproj unificado (audio+imagem) — não separar, é um arquivo só
  # KV cache: q4_0 + attn_rot (base Nemotron, head_k=128, 128%64==0)
  # NOTA: O nome é "Nano Omni" — NÃO confundir com Nemotron-3-Nano-4B (text-only)
  # Audio N/A em GGUF (Parakeet encoder não convertido)
  # -------------------------------------------
  "nemotron3-omni-30b":
    name: "Nemotron 3 Nano Omni 30B"
    description: "Omni-modal understanding across documents, audio, and video"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/NVIDIA-Nemotron-3-Nano-Omni-30B-A3B-Reasoning-UD-Q3_K_XL.gguf
      --mmproj ${models_dir}/mmproj-Nemotron-3-Nano-Omni-30B-A3B-F16.gguf
      --fit on
      --fit-target 2048
      --fit-ctx 16384
      --ctx-size 131072
      --temp 1.0
      --top-p 1.0
      --reasoning on
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --flash-attn on
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 1.0
          top_p: 1.0
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.95
    ttl: 180
    metadata:
      size: "~17 GB + mmproj 1.48 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "16K-128K (dynamic, supports 256K)"
      vram_usage: "~2.5GB VRAM + ~16GB RAM"
      source: "unsloth/NVIDIA-Nemotron-3-Nano-Omni-30B-A3B-Reasoning-GGUF"
      kv_cache: "q4_0 + attn_rot"
      features:
        vision: true
        thinking: true
        tools: true
      warning: "Heavy offload - slow inference"

  # -------------------------------------------
  # GLM-4.7-FLASH - 30B MoE A3B CODING CHAMPION
  # MoE 30B total, 3B ativo por token. SWE-Bench Verified 59.2%.
  # Gated Delta Net — mmproj CRASHA no CUDA (issue #21402), TEXT-ONLY.
  # UD-Q3_K_XL ~14.6GB (Dynamic 2.0). Temp 1.0, top_p 0.95, min_p 0.01.
  # Repeat penalty 1.0 (z.ai recommendation). KV cache: f16 (Gated Delta Net bug #21394)
  # NOTA: unlisted até terminar testes do Qwen3.6-35B.
  # -------------------------------------------
  "glm-4.7-flash":
    name: "GLM 4.7 Flash"
    description: "30B MoE coding champion — 3B active, best SWE-bench in class"
    unlisted: true
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/GLM-4.7-Flash-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 1024
      --fit-ctx 16384
      --ctx-size 131072
      --temp 1.0
      --top-p 0.95
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 1.0
          top_p: 0.95
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 120
    metadata:
      size: "~14.6 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "16K-128K (dynamic)"
      vram_usage: "~2GB VRAM + ~13GB RAM"
      source: "unsloth/GLM-4.7-Flash-GGUF"
      kv_cache: "f16 (Gated Delta Net bug #21394)"
      features:
        thinking: true
        vision: false
        tools: true
      warning: "Vision disabled — Gated Delta Net mmproj crash on CUDA (llama.cpp issue #21402). Text-only mode. Heavy offload."

  # -------------------------------------------
  # QWEN3.6-27B - DENSE MULTIMODAL (HEAVY OFFLOAD)
  # Denso 27B params, substitui o 35B MoE (era lento demais)
  # SWE-bench melhor que 35B MoE em denso, melhor qualidade/token
  # UD-Q3_K_XL ~14.5GB (Unsloth Dynamic 2.0), mmproj ~885MB
  # REQUER OFFLOAD PESADO - inference lenta mas mais rápida que MoE
  # Nota: UD-Q3_K_XL = Q3 base com Q4/Q5 nos tensores importantes (Dynamic 2.0)
  # KV cache: q4_0 + attn_rot (head_k=256, 256%64==0 ✅)
  # -------------------------------------------
  "qwen3.6-27b":
    name: "Qwen3.6 27B"
    description: "Agentic coding and multimodal reasoning with thinking preservation"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.6-27B-UD-Q3_K_XL.gguf
      --mmproj ${models_dir}/mmproj-Qwen3.6-27B-F16.gguf
      --fit on
      --fit-target 1024
      --fit-ctx 16384
      --ctx-size 131072
      --temp ${code_temp}
      --top-p ${code_top_p}
      --top-k ${code_top_k}
      --min-p ${code_min_p}
      --repeat-penalty ${code_repeat_penalty}
      --reasoning on
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --flash-attn on
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.85
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 120
    metadata:
      size: "~14.5 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "16K-128K (dynamic)"
      vram_usage: "~2GB VRAM + ~13GB RAM"
      source: "unsloth/Qwen3.6-27B-GGUF"
      kv_cache: "q4_0 + attn_rot"
      features:
        thinking: true
        vision: true
        tools: true
      warning: "Heavy offload - slow inference"

  # -------------------------------------------
  # QWEN3.6-35B-A3B - MoE CODING + MULTIMODAL
  # MoE 35B params, 3B ativo por token. Substitui o Qwen3-Coder-30B.
  # 33 experts, top-8 routing. UD-Q3_K_XL ~13.8GB (Dynamic 2.0)
  # mmproj ~885MB → ~14.7GB total
  # Offload pesado (~2GB VRAM + ~13GB RAM), mas MoE = 3B ativo/token
  # KV cache: q4_0 + attn_rot (head_k=128, 128%64==0 ✅)
  # -------------------------------------------
  "qwen3.6-35b-moe":
    name: "Qwen3.6 35B MoE"
    description: "Efficient MoE for agentic coding and multimodal reasoning"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.6-35B-A3B-UD-Q3_K_XL.gguf
      --mmproj ${models_dir}/mmproj-Qwen3.6-35B-A3B-F16.gguf
      --fit on
      --fit-target 2048
      --fit-ctx 16384
      --ctx-size 131072
      --temp ${code_temp}
      --top-p ${code_top_p}
      --top-k ${code_top_k}
      --min-p ${code_min_p}
      --repeat-penalty ${code_repeat_penalty}
      --reasoning on
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --flash-attn on
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.85
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 120
    metadata:
      size: "~13.8 GB (UD-Q3_K_XL Dynamic 2.0) + mmproj ~885MB"
      context: "16K-128K (dynamic)"
      vram_usage: "~2GB VRAM + ~13GB RAM"
      source: "unsloth/Qwen3.6-35B-A3B-GGUF"
      kv_cache: "q4_0 + attn_rot"
      features:
        thinking: true
        vision: true
        tools: true
      warning: "Heavy offload - slow inference"

# ============================================
# SWAP MATRIX (v202+) - Substitui o antigo groups
# ============================================
# O solver determina automaticamente qual combinação de modelos
# pode rodar simultaneamente e quais descarregar quando necessário.
#
# Regras de concorrência para RTX 3050 6GB:
# - Modelos pequenos (~3GB VRAM) podem rodar SOZINHOS ou com LFM2.5-VL
# - Modelos grandes (~5GB VRAM) rodam SOZINHOS
# - Modelos pesados (14B+, offload) rodam SOZINHOS
# - LFM2.5-VL (0.5GB) pode acompanhar modelos pequenos
# - Gemma4-E2B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - Qwen3.5-4B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - Variantes "think" usam o mesmo modelo, só mudam --reasoning
#   (não rodam simultaneamente com a variante base)
# ============================================

matrix:
  # Variáveis de modelo para a matrix
  # Removemos aliases curtos desnecessários — usamos IDs completos ou vars mínimos
  # NOTA: todo ID usado em sets/evict_costs DEVE estar definido aqui
  vars:
    # Atalhos para IDs longos (usados em sets e evict_costs)
    no30: nemotron3-omni-30b
    # Modelos pequenos
    q4: qwen3.5-4b
    n4: nemotron-3-nano-4b
    g2: gemma4-e2b
    # Vision
    vl: lfm2.5-vl-450m
    # Modelos médios (agora cabem na VRAM!)
    q9: qwen3.5-9b
    g4: gemma4-e4b
    # Pesados
    qw27: qwen3.6-27b
    qw36: qwen3.6-35b-moe
    glm: glm-4.7-flash
  # Sets: combinações válidas de modelos simultâneos
  # DSL: & = AND (rodar junto), | = OR (alternativa), () = agrupamento
  # +ref = expandir outro set inline
  #
  # Lógica:
  # - small_vision: modelo pequeno + vision (cabem juntos na VRAM)
  # - small_only: modelo pequeno sem vision
  # - medium: modelos ~5GB rodam sozinhos
  # - heavy: modelos 14B+ rodam sozinhos (toda VRAM)
  sets:
    # LLM pequeno + Vision: trocar entre modelos leves NÃO evicta o vision
    small_vision: "(q4 | n4 | g2) & vl"

    # LLM pequeno sozinho (sem vision ativo)
    small_only: "q4 | n4 | g2"

    # Modelos médios (~5GB VRAM) - agora cabem na VRAM com UD-Q3!
    # Qwen3.5-9B e Gemma4-E4B cabem inteiramente com mmproj
    medium: "q9 | g4"

    # Modelo omni + Vision (ambos grandes, mas podem coexistir com swap)
    omni_vision: "no30 & vl"

    # Modelos pesados - toda VRAM + RAM offload
    heavy: "no30 | qw27 | qw36 | glm"

    # Vision sozinho
    vision_only: "vl"

  # Custo de eviction (modelos mais caros pra recarregar = prioridade pra ficar)
  # Modelos pesados demoram mais pra carregar → custo alto
  evict_costs:
    no30: 10     # 17GB omni UD-Q3, very heavy offload
    qw27: 10     # 14.5GB dense UD-Q3, heavy offload
    qw36: 10     # 13.8GB MoE UD-Q3, heavy offload
    glm: 10      # 14.6GB MoE UD-Q3, heavy offload
    q9: 4        # ~5GB, fits VRAM now
    g4: 4        # ~4.5GB, fits VRAM now
    vl: 3        # vision, leve mas útil manter vivo
    q4: 2
    n4: 1
    g2: 1