# ============================================
# SWAP MATRIX (v202+) - Substitui o antigo groups
# ============================================
# O solver determina automaticamente qual combinação de modelos
# pode rodar simultaneamente e quais descarregar quando necessário.
#
# Regras de concorrência para RTX 3050 6GB:
# - Modelos pequenos (~3GB VRAM) podem rodar SOZINHOS ou com LFM2.5-VL
# - Modelos grandes (~5GB VRAM) rodam SOZINHOS
# - Modelos pesados (14B+, offload) rodam SOZINHOS
# - LFM2.5-VL (0.5GB) pode acompanhar modelos pequenos
# - Gemma4-E2B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - Qwen3.5-4B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - Variantes "think" usam o mesmo modelo, só mudam --reasoning
#   (não rodam simultaneamente com a variante base)
# ============================================

matrix:
  # Nomes curtos para os modelos (1-8 chars, alfanumérico)
  vars:
    # Modelos pequenos (fit VRAM ~3GB)
    q4: qwen3.5-4b
    q4t: qwen3.5-4b-think
    qw4: qwopus3.5-4b
    n4: nemotron-3-nano-4b
    n4t: nemotron-3-nano-4b-think
    g2: gemma4-e2b
    g2t: gemma4-e2b-think
    # Vision (~0.5GB)
    vl: lfm2.5-vl-450m
    # Modelos médios (~5GB VRAM, offload parcial)
    q9: qwen3.5-9b
    q9t: qwen3.5-9b-think
    qw9: qwopus3.5-9b
    c9: carnice-9b
    c9t: carnice-9b-think
    g4: gemma4-e4b
    g4t: gemma4-e4b-think
    # Qwopus-GLM-18B frankenmerge (heavy offload mas +rápido que MoE)
    qw18: qwopus-glm-18b-think
    # Modelos pesados (offload pesado, rodam sozinhos)
    q14: qwen3-14b
    q14t: qwen3-14b-think
    qc30: qwen3-coder-30b
    qc30t: qwen3-coder-30b-think
    # Qwen3.6-27B dense (replaces 35B MoE)
    qw27: qwen3.6-27b
    qw27t: qwen3.6-27b-think
    # UNLISTED - GGUF deleted
    q27: qwen3.5-27b
    q27t: qwen3.5-27b-think
    g31: gemma4-31b
    qw36: qwen3.6-35b-moe
    qw36t: qwen3.6-35b-moe-think

  # Custo de eviction (modelos mais caros pra recarregar = prioridade pra ficar)
  # Modelos pesados demoram mais pra carregar → custo alto
  evict_costs:
    qw18: 9     # 9.84GB frankenmerge, heavy offload
    qc30: 10    # 17.7GB, demora muito pra carregar
    qc30t: 10
    qw27: 10     # 16.8GB dense, heavy offload
    qw27t: 10
    q27: 10     # 17GB unlisted
    q27t: 10
    g31: 10     # 18GB unlisted
    qw36: 10    # 22GB unlisted, DELETED
    qw36t: 10
    q14: 8      # 8.5GB, pesado (unlisted)
    q14t: 8
    c9: 5       # offload parcial
    c9t: 5
    qw9: 5
    q9: 4
    q9t: 4
    g4: 4
    g4t: 4
    vl: 3       # vision, leve mas útil manter vivo
    q4: 2
    q4t: 2
    qw4: 2
    n4: 1
    n4t: 1
    g2: 1
    g2t: 1

  # Sets: combinações válidas de modelos simultâneos
  # DSL: & = AND (rodar junto), | = OR (alternativa), () = agrupamento
  # +ref = expandir outro set inline
  #
  # Lógica:
  # - small_vision: modelo pequeno + vision (cabem juntos na VRAM)
  # - small_only: modelo pequeno sem vision
  # - medium: modelos ~5GB rodam sozinhos
  # - heavy: modelos 14B+ rodam sozinhos (toda VRAM)
  sets:
    # LLM pequeno + Vision: trocar entre modelos leves NÃO evicta o vision
    # Expande: [q4,vl], [qw4,vl], [n4,vl], [g2,vl] (+ variants think com vl)
    small_vision: "(q4 | q4t | qw4 | n4 | n4t | g2 | g2t) & vl"

    # LLM pequeno sozinho (sem vision ativo)
    small_only: "q4 | q4t | qw4 | n4 | n4t | g2 | g2t"

    # Modelos médios (~5GB VRAM) - rodam sozinhos (não cabe + vision)
    medium: "q9 | q9t | qw9 | c9 | c9t | g4 | g4t"

    # Modelos pesados - toda VRAM + RAM offload
    heavy: "qw18 | qw27 | qw27t | q14 | q14t | qc30 | qc30t | q27 | q27t | g31 | qw36 | qw36t"

    # Vision sozinho
    vision_only: "vl"
