# -------------------------------------------
# NORTH MINI CODE — Cohere 30B-A3B MoE AGENTIC CODING (Q4_K_M, ik_llama backend)
# CohereLabs/North-Mini-Code-1.0 — MoE 30B params, 3B active per token (top-8/128 experts).
# Architecture: cohere2moe — merged upstream in PR #24260 (2026-06-13), parser #24615, vocab #24601.
# ik_llama has cohere2moe arch + graph builder, but arch name mismatch: GGUF uses "cohere2moe"
#   (no underscore), ik_llama used "cohere2_moe" (with underscore).
#   Patched in ik_llama src/llama-arch.cpp L68: "cohere2_moe" -> "cohere2moe"
#   Patched in ik_llama src/llama-vocab.cpp L2113: added "cohere2moe" to tiny_aya block
#   (aligned with upstream PR #24601). Reapply both patches after ik_llama git pull.
# Apache 2.0 license. Context: 256K native, max output: 64K.
# Text-only model — NO mmproj, NO vision.
# Sampling: temp=1.0, top_p=0.95 per model card recommendation.
# Sliding window attention (SWA) 3:1 ratio with RoPE — same pattern as cohere2.
# Quantization: Q4_K_M (Arki05) — 18.6 GB, 91.3% Top-1, 93.29% HumanEval.
#   NVFP4 (michaelw9999) deprecated: ik_llama SIGFPE on NVFP4, upstream only, 4.2 tok/s.
#   Q4_K_M works on ik_llama: 20-25 tok/s with MoE offload + hadamard cache.
# Backend: ik_llama.cpp (NOT upstream — ik gives 5-6x speedup with MoE offload).
# GGUF: Arki05/North-Mini-Code-1.0-GGUF (Q4_K_M = 18.6 GB) — correct chat template, imatrix calibrated.
# Context: 65536 max on RTX 3050 6GB (131072 OOM with Q4_K_M — 1.3GB larger than I-Compact).

# SMOKE TEST RESULTS (2026-06-19, ik b4633, RTX 3050 6GB):
#   - Model loads with --fit --fit-margin 128, ctx 65536, parallel 1
#   - Code generation: correct, concise, with reasoning
#   - Performance: 20-25 t/s generation, 70+ t/s prompt processing
#   - VRAM: ~5.6GB used (compute buffer 516MB + KV cache + non-MoE tensors)
#   - Experts offloaded to CPU via --defer-experts

# Flags (ik_llama specific):
#   - --fit (no "on" argument — ik uses bare flag)
#   - --fit-margin (ik uses margin in MiB, not --fit-target)
#   - --k-cache-hadamard / --v-cache-hadamard (ik only, improves q4_0 cache quality)
#   - --defer-experts (ik only, defers MoE expert mmap on Linux)
#   - --parallel 1 (parallel 2 + ctx 65K OOM; Qwen 3.6 uses parallel 2 but with I-Compact)
# -------------------------------------------
  "north-mini-code":
    name: "North Mini Code"
    description: "Cohere's first open-source agentic coding model. 30B MoE with only 3B active params, optimized for code generation, agentic software engineering, and terminal tasks."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/north-mini-code-q4km/North-Mini-Code-1.0-Q4_K_M.gguf
      --jinja
      --reasoning on
      --fit
      --fit-margin 128
      --ctx-size 65536
      --temp 1.0
      --top-p 0.95
      --repeat-penalty 1.0
      --parallel 1
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --defer-experts
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 1.0
          top_p: 0.95
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 1.0
          top_p: 0.95
    ttl: 300
    health_check_timeout: 300
    capabilities:
      in:
        - 'text'
      out:
        - 'text'
      tools: true
      reranker: false
      context: 65536
    metadata:
      size: "~18.6 GB (Q4_K_M)"
      context: "16K-65K (dynamic with --fit)"
      vram_usage: "~5.6GB VRAM + ~14GB RAM (ik pinned memory, MoE offload)"
      source: "Arki05/North-Mini-Code-1.0-GGUF"
      kv_cache: "q4_0 + hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: cohere2moe
      parameters: 30484340938
      context_length: 262144
      embedding_length: 2048
      quantization: Q4_K_M
