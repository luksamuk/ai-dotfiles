# -------------------------------------------
# LFM2.5-8B-A1B MoE - UPSTREAM backend (lfm2moe hybrid conv+attention)
# 8.3B total / 1.5B active, 32 experts x top-4, 18 conv + 6 GQA layers
# Context: 131K (128K rope), vocab 128K, reasoning + tool calling
# Recommended: temp=0.2, top_p=0.8, rep_penalty=1.05
# Backend: upstream llama.cpp (BeeLlama segfaults on LFM2.5, works fine on LFM2)
# NOTE: TurboQuant INCOMPATIBLE (all turbo types have block_size=128, head_dim=64 doesn't divide)
# NOTE: ik_llama does NOT support lfm2moe (no conv/ssm/gated_delta_net kernels)
# NOTE: GGUF ships with EMPTY chat_template — must use --chat-template-file with the Jinja
# NOTE: --reasoning-format deepseek parses  tags into reasoning_content field
# -------------------------------------------
  "lfm2.5-8b-a1b":
    name: "LFM 2.5 8B"
    description: "Liquid AI MoE hybrid — 8.3B total, 1.5B active per token. Built for fast, reliable tool calling on consumer hardware."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/lfm2.5-8b-a1b/LFM2.5-8B-A1B-APEX-I-Compact.gguf
      --fit on
      --fit-ctx 16384
      --ctx-size 131072
      --parallel 2
      --no-cont-batching
      --reasoning-format deepseek-legacy
      --reasoning on
      --chat-template-file ${templates_dir}/lfm2.5-chat-template.jinja
      --temp 0.2
      --top-p 0.8
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --cache-type-k q8_0
      --cache-type-v q4_0
      --flash-attn on
      --n-predict -1
      --jinja
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          temperature: 0.2
          min_p: 0.15
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.3
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
        - 'text'
      out:
        - 'text'
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: "~4.2 GB (APEX I-Compact)"
      context: "128K"
      vram_usage: "~5.2GB VRAM (4.2 GB model + KV)"
      source: "mudler/LFM2.5-8B-A1B-APEX-GGUF"
      kv_cache: "q8_0 + q4_0 hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2moe
      parameters: 8470000000
      context_length: 128000
      embedding_length: 2048
      quantization: APEX I-Compact
      note: "MoE 1.5B active, hybrid conv+GQA. Reasoning + tool calling. APEX I-Compact: 13% smaller than Q4_0, imatrix v1.3 calibrated. Uses upstream (BeeLlama segfaults on LFM2.5). GGUF has empty chat_template — requires --chat-template-file + --reasoning-format deepseek."
# -------------------------------------------
# LFM2.5-COLBERT-350M - UPSTREAM BACKEND (reranker/late-interaction model, CPU-only)
# 353M params, 128-dim per-token vectors, late interaction via MaxSim
# Architecture: lfm2-bidir — first bidirectional LFM, built on LFM2.5-350M-Base
# Reranker model — use via /v1/embeddings (mean-pooled, OAI-compatible) or raw /embedding (per-token, MaxSim)
# NOT a chat model — --embeddings flag required, --pooling mean for OAI compat
# For true MaxSim reranking: use raw /embedding endpoint (per-token vectors), compute MaxSim client-side
# Asymmetric prompts: query_prefix / document_prefix (from config_sentence_transformers.json)
# 512 max context — short but sufficient for most retrieval/reranking tasks
# 11 language support: en, es, de, fr, it, pt, ar, sv, no, ja, ko
# Best-in-class late retriever at 350M scale (NanoBEIR avg 0.605 NDCG@10)
# Late interaction: one vector per token, matched via MaxSim (max dot product per query token)
# Higher accuracy than dense embedder at cost of larger index (per-token vs per-document)
# --cont-batching: safe for embedding (no generation, just encoding)
# KV cache: f16 — reranking models benefit from precision, not compression
# CPU-ONLY (-ngl 0): frees VRAM for LLMs. ~8ms p50 query embed, ~34ms full pipeline on M4 Max
# -------------------------------------------
  "lfm2.5-colbert-350m":
    name: "LFM2.5 ColBERT 350M"
    description: "Liquid AI late-interaction reranker with best-in-class multilingual performance. Per-token 128-dim vectors matched via MaxSim. Higher accuracy than dense embedders across 11 languages."
    env:
      - "CUDA_VISIBLE_DEVICES="
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-ColBERT-350M-Q8_0.gguf
      --embeddings
      --pooling mean
      --ctx-size 512
      --cont-batching
      --cache-type-k f16
      --cache-type-v f16
      -ngl 0
      --metrics
    ttl: 300
    capabilities:
      in:
        - 'text'
      out: []
      tools: false
      reranker: true
      context: 512
    metadata:
      architecture: lfm2-bidir
      parameters: 353000000
      context_length: 512
      embedding_length: 128
      quantization: Q8_0
      size: "~378 MB (Q8_0)"
      vram_usage: "~0.1GB (CPU-only, -ngl 0, CUDA ctx overhead only)"
      source: "LiquidAI/LFM2.5-ColBERT-350M-GGUF (Q8_0)"
      kv_cache: "f16"
      features:
        completion: false
        tools: false
        thinking: false
        vision: false
