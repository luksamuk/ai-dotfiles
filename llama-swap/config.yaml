    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/LFM2.5-VL-450M-hand-tracking-Q8_0.gguf\n--mmproj ${models_dir}/mmproj-LFM2.5-VL-450M-hand-tracking-F16.gguf\n--media-path ${media_path}\n--jinja\n--fit on\n--fit-target ${vram_margin}\n--fit-ctx 4096\n--ctx-size 8192\n--parallel 1\n--cont-batching\n--temp 0.1\n--top-p 0.1\n--top-k 50\n--min-p 0.0\n--repeat-penalty 1.05\n--cache-type-k f16\n--cache-type-v f16\n--flash-attn on\n--spec-type ngram-mod\n  --spec-ngram-mod-n-match 24\n  --spec-ngram-mod-n-min 48\n  --spec-ngram-mod-n-max 64\n  --metrics\n"
