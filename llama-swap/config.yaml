# ============================================
# GRUPOS
# ============================================
groups:
  "default":
    swap: true        # Só um modelo por vez
    exclusive: true   # Descarrega outros grupos ao ativar
    members:
      # Modelos padrão (sem thinking)
      - "qwen3.5-4b"
      - "qwen3.5-9b"
      - "gemma4-e4b"
      - "gemma4-e2b"
      - "nemotron-3-nano-4b"
      # Variantes thinking
      - "qwen3.5-4b-think"
      - "qwen3.5-9b-think"
      - "gemma4-e4b-think"
      - "gemma4-e2b-think"
      - "nemotron-3-nano-4b-think"
      # Qwopus: tool-calling + reasoning (sempre pensa)
      - "qwopus-4b"
      - "qwopus-9b"
      # Carnice: Hermes Agent specialized (reasoning opcional)
      - "carnice-9b"
      - "carnice-9b-think"


# ============================================
# HOOKS
# ============================================
