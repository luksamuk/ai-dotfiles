# Q4_K_M ~1.8 GB — fits entirely in VRAM with room for KV cache
# Vocab: 166,144 (larger than Qwen3.5's 151K — slightly larger tokenizer, no perf impact)
# 256K context, Apache 2.0 license

# Tool calling: uses XML <func_call> tags with JSON {name, arguments}
#   llama.cpp + --jinja parses these correctly into OpenAI-compatible format
#   Tested: 4 parallel tool calls (2 weather + 2 time) — all succeeded
#   Agentic reasoning pattern: pre-tool planning → batch calls → post-tool analysis → response

# ⚠️ MULTI-TURN TOOL CALLING BUG (llama.cpp upstream, affects ALL backends):
#   First round of tool calls works perfectly. On SECOND round (assistant generates
#   reasoning + tool calls after receiving tool results), the model leaks XML <func_call>
#   tags as verbatim text in content instead of structured tool_calls.
#   Root cause: llama.cpp peg-native parser fails to extract tool calls from reasoning
#   blocks in multi-turn conversations. Same bug affects Qwen3.5/3.6 (llama.cpp #20837,
#   #22684 — both OPEN, no fix merged yet). BeeLlama.cpp and ik_llama.cpp share the
#   same parser — switching backends does NOT help.
#   WORKAROUND: use for single-turn tool calling or non-agentic tasks only.
#   Monitor: https://github.com/ggml-org/llama.cpp/issues/22684

# ⚠️ ALWAYS THINKING (like gpt-oss-20b):
#   The template has NO enable_thinking toggle. The model ALWAYS generates reasoning
#   with 十六条/第十七条 tags (same format as Qwen3). Use --reasoning on to extract.
#   No :think variant (it's always thinking). The only tag exposed is the base model ID.

# ⚠️ BENCHMARK CAVEATS:
#   - Self-reported benchmarks show Qwen3-32B-level performance, which is exceptional for 3B
#   - Benjamin Marie (Kaitchup) ran CoDeC contamination checks: GPQA at 40.9 (not contaminated)
#   - But: learning curves were validated on the same benchmarks (hyperparameter selection)
#   - Community confirms model is "genuinely very good" but benchmarks may be inflated
#   - Artificial Analysis Intelligence Index: 16 (above 3B median of 8, but below 30B+ models at 25-35)
#   - NO independent third-party agentic coding tests (Pacman, HTML game, etc.) exist yet

# Backend: upstream llama.cpp ONLY (dense model, no MoE/MTP tricks needed)
# No --no-mmproj needed (text-only model, no vision)
# --jinja REQUIRED (chat template is complex with tool calling + reasoning)
# -------------------------------------------
  "nanbeige4.1-3b":
    name: "Nanbeige 4.1 3B"
    description: "Compact generalist language model that simultaneously achieves strong agentic behavior, code generation, and general reasoning with only 3B parameters."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Nanbeige4.1-3B-Q4_K_M.gguf
      --jinja
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.6
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.05
      --reasoning on
      --n-predict 32768
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      size: "~1.8 GB (Q4_K_M)"
      context: "64K-128K (dynamic)"
      vram_usage: "~2.5GB (model + cache)"
      source: "DevQuasar/Nanbeige.Nanbeige4.1-3B-GGUF (Q4_K_M)"
      kv_cache: "q8_0 + attn_rot"
      features:
        completion: true
        tools: false
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: llama
      parameters: 3930000000
      context_length: 262144
      embedding_length: 2560
      quantization: Q4_K_M
      warning: "Always thinks (no toggle). Multi-turn tool calls broken — use single-turn only. Verbose reasoning."
# -------------------------------------------
# AFM-4.5B (Arcee Fusion Model) - UPSTREAM backend
# 4.5B dense, Llama-like arch (arcee), Q5_K_M ~3.11 GB
# Context: 64K (rope scaling factor=20, original 4096)
# Vocab: 128K, 36 layers, 2560 embed, 20 heads (GQA: 4 KV heads)
# Features: tool calling (Hermes 2 Pro format), NO native thinking/reasoning
# Backend: upstream llama.cpp (ik/Bee lack Arcee arch, no hadamard benefit at this size)
# CRITICAL: GGUF ships with NO tool calling in chat_template — must use
#   --chat-template-file pointing to the Hermes 2 Pro template for tool support.
# Without --chat-template-file, AFM operates in plain chat mode only.
# Recommended: temp=0.3, top_p=0.9, rep_penalty=1.05
# -------------------------------------------
  "afm-4.5b":
    name: "AFM-4.5B"
    unlisted: true
    description: "Arcee AFM-4.5B dense model with tool calling via Hermes 2 Pro template."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/AFM-4.5B-Q5_K_M.gguf
      --fit on --fit-target 768 --fit-ctx 65536
      --ctx-size 32768
      --parallel 1
      --chat-template-file /home/alchemist/git/ai-dotfiles/llama-swap/templates/afm-4.5b-tool_use.jinja
      --temp 0.3
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --cache-type-k q8_0
      --cache-type-v q4_0
      --flash-attn on
      --n-predict -1
      --jinja
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          temperature: 0.3
          min_p: 0.15
    ttl: 60
    metadata:
      size: "~3.11 GB (Q5_K_M)"
      context: "64K (rope scaling x20 from 4096)"
      vram_usage: "~4GB VRAM (3.11 GB model + KV)"
      source: "arcee-ai/AFM-4.5B-GGUF"
      kv_cache: "q8_0 (K) + q4_0 (V)"
      features:
        completion: true
        tools: true
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: llama
      parameters: 4500000000
      context_length: 262144
      embedding_length: 2560
      quantization: UD-Q3_K_XL
      note: "Dense 4.5B by Arcee AI. No native thinking. Tool calling requires Hermes 2 Pro template override via --chat-template-file. Uses upstream (ik/Bee lack arcee arch support)."
# -------------------------------------------
# GEMMA-4-E4B - Bee BACKEND (TurboQuant KV cache)
# Served by BeeLlama.cpp with turbo3_tcq KV cache (~5x compression, PPL ≈ fp16)
# head_dim=256 → attn_rot ✅ (Bee supports iSWA attn_rot for Gemma 4)
# --n-gpu-layers 99: model fits entirely in 6GB VRAM at Q3_XL (4.5GB model + cache)
# Original upstream config moved to _disabled/gemma4-e4b.yaml (q4_0 cache + --fit)
# -------------------------------------------
  "gemma4-e4b-bee":
    unlisted: true
    name: "Gemma 4 E4B"
    description: "Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding."
    cmd: |
      ${bee_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-UD-Q3_K_XL.gguf
      --no-mmproj
      --n-gpu-layers 99
      --ctx-size 131072
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k turbo3_tcq
      --cache-type-v turbo3_tcq
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~4.5 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (TurboQuant enables longer context)"
      vram_usage: "~5GB VRAM (model + turbo3_tcq cache, ~5x less KV memory)"
      source: "unsloth/gemma-4-E4B-it-GGUF (UD-Q3_K_XL)"
      kv_cache: "turbo3_tcq (BeeLlama.cpp — ~5x compression, PPL ≈ fp16)"
      features:
        completion: true
        tools: true
        thinking: true
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 7520000000
      context_length: 131072
      embedding_length: 2560
      quantization: UD-Q3_K_XL
      warning: "TurboQuant turbo3_tcq KV cache — ~5x compression at near-fp16 quality. BeeLlama.cpp backend (no --fit, uses --n-gpu-layers 99)."
# -------------------------------------------
# GLM-OCR - UPSTREAM BACKEND (mmproj required)
# GLM-4V-based OCR/Vision specialist — #1 on OmniDocBench V1.5 (94.62 score)
# Architecture: glm4 — supported in upstream llama.cpp b766+ and ik_llama.cpp v4547+
# mmproj required: CogViT vision encoder + cross-modal connector
# Complements LFM2.5-VL-450M (general VLM) — this is OCR/table/formula specialist
# Prompt must be "OCR", "OCR markdown", or "Table Recognition:" for best results
# NOT a general chat model — use for document extraction tasks only
# Temperature 0.1 for OCR precision, no reasoning (vision model)
# KV cache: f16 (vision models need precision, not compression)
# --jinja: required for chat template auto-detection (glm4 template)
# -------------------------------------------
  "glm-ocr":
    name: "GLM-OCR"
    description: "Multimodal OCR model for complex document understanding, built on the GLM-V encoder-decoder architecture integrating CogViT visual encoder with a GLM-0.5B language decoder."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/GLM-OCR-Q8_0.gguf
      --mmproj ${models_dir}/mmproj-GLM-OCR-Q8_0.gguf
      --jinja
      --media-path ${media_path}
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.1
      --top-p 0.9
      --top-k 40
      --repeat-penalty 1.0
      --reasoning off
      --cache-type-k f16
      --cache-type-v f16
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      architecture: glm4
      parameters: 940000000
      context_length: 131072
      embedding_length: 2048
      quantization: Q8_0
      size: "~0.95 GB (Q8_0) + ~0.48 GB mmproj (Q8_0)"
      vram_usage: "~2GB (model + mmproj + cache)"
      source: "ggml-org/GLM-OCR-GGUF (Q8_0 + mmproj Q8_0)"
      kv_cache: "f16"
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      note: "Specialized OCR model — use prompts like 'OCR', 'OCR markdown', 'Table Recognition:'. NOT a general VLM. Complements LFM2.5-VL-450M (general vision) for document extraction."
# -------------------------------------------
# GPT-OSS 20B — OpenAI MoE coding model
# MoE: 20.91B params, ~3.5B active per token (top-4/8 experts)
# Architecture: OPENAI_MOE (gpt_oss) — supported in llama.cpp v604+ and ik_llama.cpp v4524+
# Uses "Harmony" chat format with internal reasoning (always-on, not optional)
# Official guide: https://github.com/ggml-org/llama.cpp/discussions/15396
# Key ik_llama.cpp flags for limited VRAM (RTX 3050 6GB):
#   --defer-experts   — faster model loading, defers expert mmap on Linux
#   --k-cache-hadamard / --v-cache-hadamard — better KV cache quality at q4_0
#   --flash-attn auto — disables FA on short prompts (saves overhead on offloaded MoE)
#   --fit / --fit-margin 768 — partial GPU offload, MoE experts to RAM
#   --jinja — required for Harmony template
#   --reasoning on — extracts thinking from Harmony format
#   -ub 2048 -b 2048 — recommended batch sizes (official guide)
# -------------------------------------------
  "gpt-oss-20b":
    name: "GPT-OSS 20B"
    description: "GPT-OSS is OpenAI's open-weight model designed for powerful reasoning, agentic tasks, and versatile developer use cases. The 20B MoE variant uses 32 experts per layer."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/gpt-oss-20b-Q4_K_M.gguf
      --jinja
      --parallel-tool-calls
      --reasoning on
      --fit
      --fit-margin 768
      --ctx-size 131072
      --temp 0.6
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --ubatch-size 2048
      --batch-size 2048
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --defer-experts
      --metrics
    filters:
      stripParams: "temperature, top_p"
    ttl: 120
    metadata:
      size: "~10.8 GB (Q4_K_M)"
      context: "16K-128K (dynamic)"
      vram_usage: "~5GB VRAM + ~6GB RAM (heavy offload, MoE)"
      source: "unsloth/gpt-oss-20b-GGUF"
      kv_cache: "q4_0 + hadamard + attn_rot"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gpt-oss
      parameters: 20910000000
      context_length: 131072
      embedding_length: 2880
      quantization: Q4_K_M
      warning: "Always reasons internally (not optional). MoE offload to RAM — slower than pure GPU models."
