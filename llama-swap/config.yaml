      backend: sglang
      size: "~2.5 GB (BF16 safetensors, cached from HF)"
      context: "~32K default (mem-fraction 0.7)"
      vram_usage: "~3.2 GB (model + KV cache)"
      source: "LiquidAI/LFM2.5-1.2B-Instruct (HuggingFace safetensors)"
      note: "SGLang backend for Sprachspiel compat testing — RadixAttention cache, slower startup (~2 min JIT compile)."
      health_check_timeout: 300
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2moe
      parameters: 8470000000
      context_length: 128000
      embedding_length: 2048
      quantization: Q4_0
# -------------------------------------------
# QWEN3.5-4B - ik BACKEND (Hadamard KV cache)
# Dense 4B params, MoQ-3.75 ~1.92GB.
# Upgraded from i1-Q4_K_M (~2.52GB) → MoQ-3.75 (~1.92GB): 
# 51% faster (45.7 vs 30.2 tok/s), 24% smaller, same Snake quality (23/25).
# MoQ (Mixture of Quants) allocates more bits to critical tensors.
# ik with hadamard cache gives near-fp16 quality at smaller memory footprint.
# --flash-attn auto: disables FA on short contexts for savings
# --parallel-tool-calls: enables multiple tool calls in single response
# Dual mode: base (chat, no think) and :think (reasoning)
# -------------------------------------------
  "qwen3.5-4b":
    name: "Qwen3.5 4B"
    description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/MoQ-3.75.gguf
      --jinja
      --parallel-tool-calls
      --fit
      --fit-margin 512
      --ctx-size 131072
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k q8_0
      --cache-type-v q4_0
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~1.92 GB (MoQ-3.75)"
      context: "64K-128K (dynamic)"
      vram_usage: "~2.5GB VRAM (text-only, ik with hadamard cache)"
      source: "kaitchup/Qwen3.5-4B-GGUF-MoQ (MoQ-3.75)"
      kv_cache: "q8_0 + q4_0 hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 4210000000
      context_length: 262144
      embedding_length: 2560
      quantization: MoQ-3.75
      note: "MoQ-3.75 — 51% faster than i1-Q4_K_M (45.7 vs 30.2 tok/s), 24% smaller (1.92 vs 2.52 GB), same Snake quality (23/25)."
# -------------------------------------------
# QWEN3.5-4B - BACKUP (i1-Q4_K_M) — REMOVED
# Replaced by MoQ-3.75. i1-Q4_K_M file deleted from disk.
# Switched from Bee/TurboQuant to ik — i1 format caused Bee slash bug.
# hadamard cache gives near-fp16 quality at smaller memory footprint.
# -------------------------------------------
# -------------------------------------------
# QWEN3.5-9B - ik BACKEND (Hadamard KV cache)
# Dense 9B params, UD-Q4_K_XL ~5.55GB.
# Bee/TurboQuant segfaults with this model — use ik with hadamard instead.
# --flash-attn auto: disables FA on short contexts for MoE/offload savings
# KV cache: q8_0 (K) + q4_0 (V) + hadamard = quality near-fp16
# --fit on --fit-margin 512: dynamic GPU offload
# Dual mode: base (chat, no think) and :think (reasoning)
# Upgraded from UD-Q3_K_XL (3.5 bpw) → UD-Q4_K_XL (4.5 bpw): +0.85GB for ~3% PPL improvement
# Bee backup: _disabled/qwen3.5-9b-bee.yaml (seg fault with turbo3_tcq)
# -------------------------------------------
  "qwen3.5-9b":
    name: "Qwen3.5 9B"
    description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-MoQ-3.6.gguf
      # No --no-mmproj: ik doesn't support this flag (upstream-only)
      --fit
      --fit-margin 512
      --jinja
      --parallel-tool-calls
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k q8_0
      --cache-type-v q4_0
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~3.75 GB (MoQ-3.6)"
      context: "64K-128K (dynamic)"
      vram_usage: "~3.8GB VRAM (text-only, ik with hadamard cache)"
      source: "WaleedAhmed/Qwen3.5-9B-MoQ-GGUF (MoQ-3.6)"
      kv_cache: "q8_0 + q4_0 hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 8950000000
      context_length: 262144
      embedding_length: 4096
      quantization: MoQ-3.6
      note: "MoQ-3.6 (Mixture of Quants, ~3.6 bpw) — 32% smaller than UD-Q4_K_XL, same speed (12.2 tok/s), equal or better quality on Snake benchmark. Replaces UD-Q4_K_XL as default quant."
# -------------------------------------------
# QWEN3.5-9B-MTP - REMOVED
# MTP (Multi-Token Prediction) tested on RTX 3050 6GB — OOMs with --fit + --multi-token-prediction.
# Requires 493 MiB extra VRAM for speculative draft context that doesn't fit alongside --fit.
# Only works with n-gpu-layers=15 (heavy CPU offload), losing hadamard cache and 131K context (drops to 8K).
# Speed gain marginal (15.4 vs 15.1 tok/s), not worth the context/cache tradeoff. Stick with MoQ-3.6.
# -------------------------------------------
# GEMMA-4-E4B - ik BACKEND (Hadamard KV cache)
# Upstream config with q4_0 cache. Bee/TurboQuant was slower (36 vs 40 tok/s).
# Switched from upstream to ik for -khad/-vhad quality improvement.
# Upgraded from UD-Q3_K_XL (3.5 bpw) → Q4_K_M (4.5 bpw): +0.36GB for ~3% PPL improvement
# -------------------------------------------
  "gemma4-e4b":
    name: "Gemma 4 E4B"
    description: "Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-Q4_K_M.gguf
      # No --no-mmproj: ik doesn't support this flag (upstream-only)
      --fit
      --fit-margin 512
      --jinja
      --parallel-tool-calls
      --ctx-size ${small_model_max_ctx}
      --temp ${gemma_temp}
      --top-p ${gemma_top_p}
      --top-k ${gemma_top_k}
      --min-p 0.01
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k q8_0
      --cache-type-v q4_0
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 1.0
          top_p: 0.95
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.95
    ttl: 60
    metadata:
      size: "~4.63 GB (Q4_K_M)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5.3GB VRAM (fits with mmproj)"
      source: "unsloth/gemma-4-E4B-it-GGUF (Q4_K_M)"
      kv_cache: "q8_0 + q4_0 hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 7520000000
      context_length: 131072
      embedding_length: 2560
      quantization: Q4_K_M
      note: "Upgraded from UD-Q3_K_XL → Q4_K_M. ~3% PPL improvement at +0.36GB cost. Tightest VRAM model — monitor with mmproj."
# -------------------------------------------
# GEMMA-4-E2B - upstream BACKEND (q4_0 KV cache)
# Upgraded from UD-Q3_K_XL (3.5 bpw) → Q4_K_M (4.5 bpw): +0.17GB for ~3% PPL improvement
# --no-mmproj: text-only mode (mmproj unused, saves VRAM)
# --fit on: dynamic GPU offloading, fits in 6GB VRAM with Q4_K_M
# --flash-attn on: faster attention on GPU
# Note: upstream does NOT support --parallel-tool-calls, but Gemma 4 template
# handles multiple tool calls natively via Jinja chat template.
# -------------------------------------------
  "gemma4-e2b":
    name: "Gemma 4 E2B"
    description: "Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E2B-it-Q4_K_M.gguf
      --no-mmproj
      --fit on
      --fit-target 1024
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${gemma_temp}
      --top-p ${gemma_top_p}
      --top-k ${gemma_top_k}
      --min-p 0.01
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 1.0
          top_p: 0.95
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.95
    ttl: 60
    metadata:
      size: "~2.89 GB (Q4_K_M)"
      context: "32K-128K (dynamic)"
      vram_usage: "~3.2GB"
      source: "unsloth/gemma-4-E2B-it-GGUF (Q4_K_M)"
      kv_cache: "q4_0 + attn_rot"
      features:
        completion: true
        tools: true
        thinking: true
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 4650000000
      context_length: 131072
      embedding_length: 1536
      quantization: Q4_K_M
      note: "Upgraded from UD-Q3_K_XL → Q4_K_M. ~3% PPL improvement at +0.17GB cost."
# -------------------------------------------
# LFM2.5-1.2B-INSTRUCT - DENSE HYBRID (CONV + GQA)
# Liquid AI's 1.2B dense instruct model — best tool-calling / agentic
# Treinado em 28T tokens + RL. Melhor pra tool-calling (sem CoT forçado).
# Tool calling reliability: CONSISTENT — best LFM2 for agentic tasks
# Liquid AI recommends: temp=0.3, min_p=0.15, repeat_penalty=1.05
# head_dim=64 → attn_rot ✅ (64%64==0)
# Architecture: lfm2 (upstream llama.cpp b8145+)
# Q8_0 ~1.25GB — practically lossless, still fits entirely in VRAM
# -------------------------------------------
  "lfm2.5-1.2b":
    unlisted: true
    name: "LFM2.5 1.2B Instruct"
    description: "LFM2.5-1.2B-Instruct is a general-purpose text model that rivals much larger models while being small enough for pocket deployment."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-1.2B-Instruct-Q8_0.gguf
      --jinja
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.3
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      size: "~1.25 GB (Q8_0)"
      context: "32K-128K (dynamic)"
      vram_usage: "~2GB (model + cache)"
      source: "LiquidAI/LFM2.5-1.2B-Instruct-GGUF (Q8_0)"
      kv_cache: "q8_0 + attn_rot"
      features:
        completion: true
        tools: false
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2
      parameters: 1200000000
      context_length: 128000
      embedding_length: 1536
      quantization: Q4_K_M
