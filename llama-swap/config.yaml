# Hooks: ações na inicialização do llama-swap
# preload: carrega modelos síncronamente antes de aceitar requests
# Ideal para vLLM (startup lento = 30-90s sem warm-up)
# NOTA: preloads desabilitados temporariamente — ocupam GPU e bloqueiam swap pra SGLang
# Para reabilitar: descomente as linhas preload abaixo
hooks:
  on_startup:
    preload: []
      # - "qwen3.5-0.8b-vllm"
      # - "lfm2.5-1.2b-vllm"

# ============================================
# SWAP MATRIX (v202+)
# ============================================
# O solver determina automaticamente qual combinação de modelos
# pode rodar simultaneamente e quais descarregar quando necessário.
#
# ⚠️ REGRA CRÍTICA DE COEXISTÊNCIA:
# Embedding e reranker (nomic, lfmemb, lfmcol) são CPU-only (~0.5GB total)
# e NÃO consomem VRAM. Devem coexistir com QUALQUER LLM — leve ou pesado.
# Todos os sets que agrupam LLMs DEVEM incluir as vars de embedding/reranker
# no & (AND). Se uma var de embedding falta de um set, o solver trata
# o embedding e o LLM como mutuamente exclusivos, causando ping-pong
# de eviction (embedding evicta LLM cost 9+, LLM evicta embedding cost 1).
#
# Exemplo: heavy: "(qw36 | orn35) & (nomic | lfmemb | lfmcol)"
# Veja references/new-model-workflow.md §6 para detalhes completos.
# ============================================

matrix:
  vars:
    # Modelos pequenos
    q4: qwen3.5-4b
    lfm230: lfm2.5-230m
    m5a: minicpm5-1b-agentic
    lfm8: lfm2.5-8b-a1b
    # Vision
    vl: lfm2.5-vl-450m
    vl16: lfm2.5-vl-1.6b
    ocr: glm-ocr
    qwvl: qwen3-vl-4b
    # Modelos médios
    q9: qwen3.5-9b
    g4: gemma4-e4b
    # Pesados (offload)
    orn35: ornith-1.0-35b
    aw: agentworld-35b
    glm: glm-4.7-flash
    # Bonsai DESATIVADO — YAMLs movidos para _disabled/, GGUFs deletados
    # Aguardando próxima iteração com foco em agentic coding
    # bonsai: bonsai-27b-ternary
    # bonsai1: bonsai-27b-1bit
    # Tradução
    hmt: hy-mt2-1.8b
    # Audio
    asr: qwen3-asr-0.6b
    ttsext: qwen3-tts
    # Embedding
    nomic: nomic-embed-text-v2-moe
    lfmemb: lfm2.5-embed-350m
    # Reranker (late-interaction, CPU-only)
    lfmcol: lfm2.5-colbert-350m

  sets:
    # LLM pequeno + Vision + Embedding
    small_vision: "(q4 | lfm230 | lfm8) & vl & (nomic | lfmemb | lfmcol)"

    # LLM pequeno + Embedding (sem vision)
    small_embed: "(q4 | lfm230 | lfm8) & (nomic | lfmemb | lfmcol)"

    # LLM pequeno sozinho (sem vision, sem embedding obrigatório)
    small_only: "q4 | lfm230 | lfm8 | m5a"

    # Vision models (sozinhos ou com embedding/reranker)
    vision_only: "vl | vl16 | ocr | qwvl"
    vision_embed: "(vl | vl16 | ocr | qwvl) & (nomic | lfmemb | lfmcol)"

    # Modelos médios + Embedding/Reranker
    medium: "(q9 | g4) & (nomic | lfmemb | lfmcol)"

    # Modelos pesados (offload) + Embedding/Reranker
    heavy: "(orn35 | aw | glm) & (nomic | lfmemb | lfmcol)"

    # Tradução (leve, cabe com embedding/reranker)
    translate_embed: "hmt & (nomic | lfmemb | lfmcol)"
    translate_only: "hmt"

    # External TTS (separate process, same GPU)
    tts_external: "ttsext"

    # Embedding/Reranker sozinho (RAG indexing, semantic search, reranking)
    embed_only: "nomic | lfmemb | lfmcol"

    # Reranker sozinho (late-interaction reranking, CPU-only)
    rerank_only: "lfmcol"

    # Reranker + Embedding (two-stage retrieval: dense → rerank)
    rerank_embed: "lfmcol & (nomic | lfmemb)"

  # Custo de eviction (modelos mais caros pra recarregar = prioridade pra ficar)
  evict_costs:
    orn35: 9
    aw: 9
    glm: 9
    q9: 4
    g4: 4
    ttsext: 4
    vl: 3
    ocr: 3
    qwvl: 3
    vl16: 2
    q4: 2
    lfm8: 2
    asr: 2
    nomic: 1
    lfmemb: 1
    lfmcol: 1
    lfm230: 1
    m5a: 1
    hmt: 1
