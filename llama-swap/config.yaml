      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      size: "~1.0 GB (Q8_0 model 768MB + mmproj 205MB)"
      context: "32K-128K (dynamic)"
      vram_usage: "~1.5GB (model + mmproj + cache)"
      source: "ggml-org/Qwen3-ASR-0.6B-GGUF (Q8_0)"
      kv_cache: "q8_0 + attn_rot"
      features:
        completion: true
        tools: false
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: true
        image: false
      architecture: qwen3vl
      parameters: 600000000
      context_length: 131072
      embedding_length: 896
      quantization: Q8_0
      caveats:
        - "ASR-only model — no audio generation capability"
        - "Multilingual ASR support (better than English-only models)"
        - "Very lightweight, can run alongside other small models"
# -------------------------------------------
# QWEN3-TTS — TTS API server (Python FastAPI, not llama.cpp)
# Qwen3-TTS 0.6B-Base with voice cloning support (8 pt-BR voices)
# Runs as external process on port 8880 with OpenAI-compatible /v1/audio/speech endpoint
# NOT a GGUF model — uses torch-direct inference via qwen_tts library
# Serves /v1/audio/speech, /v1/audio/voices, and /v1/models endpoints
# Voice profiles: hermes, lucas, jessica, francisca, thalita, drácula, alucard, batman, bolso
# Source: ~/projects/ai/tts-api/tts_server.py
# -------------------------------------------
  "qwen3-tts":
    name: "Qwen3-TTS 0.6B"
    description: "Text-to-speech with voice cloning. 8 Portuguese voices. OpenAI-compatible /v1/audio/speech endpoint with voice profiles from voiceclone-tui."
    tags:
      - "tts"
    proxy: "http://127.0.0.1:8880"
    checkEndpoint: "/v1/audio/voices"
    cmd: |
      ${env.HOME}/projects/ai/tts-api/.venv/bin/python ${env.HOME}/projects/ai/tts-api/tts_server.py --port 8880 --host 127.0.0.1
    cmdStop: "pkill -f tts_server.py"
    ttl: 300
    metadata:
      size: "~600MB (Qwen3-TTS-12Hz-0.6B-Base, torch-direct)"
      context: "N/A (TTS generation, not LLM context)"
      vram_usage: "~2GB VRAM (torch-direct, separate GPU allocation)"
      source: "Qwen/Qwen3-TTS-12Hz-0.6B-Base (HuggingFace)"
      kv_cache: "N/A"
      features:
        completion: false
        tools: false
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: true
        image: false
      architecture: qwen3-tts
      parameters: 600000000
      context_length: 0
      embedding_length: 0
      quantization: "torch-direct (no GGUF)"
      caveats:
        - "External FastAPI server on port 8880 (not llama.cpp)"
        - "Must install qwen_tts and dependencies in ~/projects/ai/tts-api/.venv"
        - "Voice profiles loaded from ~/.config/voiceclone-tui/voices.json"
        - "Supports voice cloning with reference audio samples"
        - "Portuguese (pt-BR) voices with accent control"
# -------------------------------------------
# QWEN3.5-4B-ABLITERATED - ik BACKEND (Hadamard KV cache)
# Qwen3.5-4B with refusal behaviors removed via Abliterix (orthogonalized steering + Bayesian optimization)
# KL divergence 0.0065 — minimal capability degradation. For Sprachspiel adversarial testing ONLY.
# Same architecture as base Qwen3.5-4B (qwen35) — all llama-swap flags work identically
# Switched from Bee/TurboQuant to ik — i1 quant format causes Bee slash bug.
# ik with hadamard cache gives near-fp16 quality.
# --parallel-tool-calls: enables multiple tool calls in single response
# -------------------------------------------
  "qwen3.5-4b-abliterated":
    name: "Qwen3.5 4B Abliterated"
    description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance. Abliterated variant with refusal behaviors removed for adversarial testing."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-4B-abliterated.i1-Q4_K_M.gguf
      --jinja
      --parallel-tool-calls
      --fit
      --fit-margin 512
      --ctx-size 131072
      --timeout 0
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k q8_0
      --cache-type-v q4_0
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 120
    metadata:
      architecture: qwen35
      parameters: 4210000000
      context_length: 262144
      embedding_length: 2560
      quantization: i1-Q4_K_M
      size: "~2.71 GB (i1-Q4_K_M)"
      context: "64K-128K (dynamic)"
      vram_usage: "~3.5GB VRAM (model + hadamard cache)"
      source: "mradermacher/Qwen3.5-4B-abliterated-i1-GGUF (i1-Q4_K_M)"
      kv_cache: "q8_0 + q4_0 hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      note: "Abliterated variant for Sprachspiel adversarial testing — no refusal. Switched from Bee to ik — i1 format causes Bee slash bug."
# -------------------------------------------
# TRANSLATEGEMMA 4B — Google translation model
# Gemma 3-based, 55 languages, translation-focused
# Arch: gemma3 — supported in upstream llama.cpp
# Q4_K_M ~2.7GB (mradermacher/TranslateGemma-4B-GGUF)
# NOTE: Native Jinja template uses custom content types
#   (source_lang_code, target_lang_code) which crash
#   llama.cpp chat template parser. Use --no-jinja
#   with gemma template instead. Sprachspiel sends
#   plain text prompts, so this works fine.
# Recommended params from Ollama: temp=0.2, top_k=40, repeat_penalty=1.1
# -------------------------------------------
  "translategemma-4b":
    name: "TranslateGemma 4B"
    description: "Open translation models built on Gemma 3, helping people communicate across 55 languages. The 4B variant is optimized for mobile and edge devices."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/translategemma-4b-it.Q4_K_M.gguf
      --no-jinja
      --chat-template gemma
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --timeout 0
      --temp 0.2
      --top-p 0.9
      --top-k 40
      --repeat-penalty 1.1
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      size: "~2.4 GB (Q4_K_M)"
      context: "32K-128K (dynamic)"
      vram_usage: "~3.5GB (model + cache)"
      source: "mradermacher/translategemma-4b-it-GGUF (Q4_K_M, from google/translategemma-4b-it)"
      kv_cache: "q8_0 + attn_rot"
      features:
        completion: true
        tools: false
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma3
      parameters: 3880000000
      context_length: 131072
      embedding_length: 2560
      quantization: Q4_K_M
      caveats:
        - "Native Jinja template crashes llama.cpp — must use --no-jinja --chat-template gemma"
        - "Needs explicit translation prompt (Sprachspiel format works)"
      note: "Translation model. Sprachspiel translate mode default. 55 languages."
# Hooks: ações na inicialização do llama-swap
# preload: carrega modelos síncronamente antes de aceitar requests
# Ideal para vLLM (startup lento = 30-90s sem warm-up)
# NOTA: preloads desabilitados temporariamente — ocupam GPU e bloqueiam swap pra SGLang
# Para reabilitar: descomente as linhas preload abaixo
hooks:
  on_startup:
    preload: []
      # - "qwen3.5-0.8b-vllm"
      # - "lfm2.5-1.2b-vllm"

# ============================================
# SWAP MATRIX (v202+) - Substitui o antigo groups
# ============================================
# O solver determina automaticamente qual combinação de modelos
# pode rodar simultaneamente e quais descarregar quando necessário.
#
# Regras de concorrência para RTX 3050 6GB:
# - Modelos pequenos (~3GB VRAM) podem rodar SOZINHOS ou com LFM2.5-VL
# - Modelos grandes (~5GB VRAM) rodam SOZINHOS
# - Modelos pesados (14B+, offload) rodam SOZINHOS
# - LFM2.5-VL (0.5GB) pode acompanhar modelos pequenos
# - Gemma4-E2B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - Qwen3.5-4B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - WebWorld-8B (~5.9GB) roda SOZINHO (não cabe com vision)
# - Variantes "think" usam o mesmo modelo, só mudam --reasoning
#   (não rodam simultaneamente com a variante base)
# ============================================

matrix:
  # Variáveis de modelo para a matrix
  # Removemos aliases curtos desnecessários — usamos IDs completos ou vars mínimos
  # NOTA: todo ID usado em sets/evict_costs DEVE estar definido aqui
  vars:
    # Atalhos para IDs longos (usados em sets e evict_costs)
    gemma4m: gemma4-26b-a4b
    # DeepSeek R1 Distill — REMOVED (poor perf on RTX 3050, SSD pressure)
    # ds14: ds-r1-distill-14b
    # ds32: ds-r1-distill-32b
    # Modelos pequenos
    q08: qwen3.5-0.8b
    q4: qwen3.5-4b
    # [REMOVED] m3: ministral-3-3b
    # [REMOVED] ww: webworld-8b
    # [REMOVED] n4: nemotron-3-nano-4b
    g2: gemma4-e2b
    g2q: gemma4-e2b
    lfm2s: lfm2.5-1.2b
    lfm2t: lfm2.5-1.2b-think
    # Vision
    vl: lfm2.5-vl-450m
    # Modelos médios (agora cabem na VRAM!)
    q9: qwen3.5-9b
    # [REMOVED] q3x8: qwen3-8b
    # [REMOVED] ACE — no imatrix quants, worse perplexity than 9B regular
    g4: gemma4-e4b
    # Pesados
    qw36: qwen3.6-35b-a3b
    g12: gemma4-12b
    qc9: qwopus-coder-9b
    # qwopus: qwopus-35b         # DISABLED: model unlisted
    # gptoss: gpt-oss-20b        # DISABLED: model unlisted
    # lfm2l: lfm2-24b            # DISABLED: model unlisted
    # vLLM backends (separate process, same GPU)
    q08vllm: qwen3.5-0.8b-vllm
    lfm2vllm: lfm2.5-1.2b-vllm
    # [DISABLED] gr33vllm: granite-3.3-8b-vllm — 16GB BF16, OOM on 6GB VRAM
    # [DISABLED] gr40htv: granite-4.0-h-tiny-vllm — 14GB BF16, OOM on 6GB VRAM
    # [REMOVED] gr40h1v: granite-4.0-h-1b-vllm
    # [REMOVED] gr40h1: granite-4.0-h-1b
    sglang: lfm2.5-sgl
    # nb41: nanbeige4.1-3b   # REMOVED: multi-turn tool calling broken (#22684), GGUF deleted
    # Audio models (lightweight — can run alongside small LLM + vision)
    asr: qwen3-asr-0.6b
    # aud: lfm2-audio-1.5b  # DISABLED: mmproj conformer crash (upstream bug)
    asrg: granite-speech-4.1-2b
    # External TTS server (Python FastAPI, separate GPU allocation)
    ttsext: qwen3-tts
  # DSL: & = AND (rodar junto), | = OR (alternativa), () = agrupamento
  # +ref = expandir outro set inline
  #
  # Lógica:
  # - small_vision: modelo pequeno + vision (cabem juntos na VRAM)
  # - small_only: modelo pequeno sem vision
  # - medium: modelos ~5GB rodam sozinhos
  # - heavy: modelos 14B+ rodam sozinhos (toda VRAM)
  sets:
    # LLM pequeno + Vision: trocar entre modelos leves NÃO evicta o vision
    small_vision: "(q08 | q4 | g2 | g2q | lfm2s | lfm2t) & vl"

    # LLM pequeno sozinho (sem vision ativo)
    small_only: "q08 | q4 | g2 | g2q | lfm2s | lfm2t"

    # Audio models — rodam alongside modelos leves + vision
    # Qwen3-ASR (~1.5GB) e Granite Speech (~3GB) são ASR, NÃO TTS
    # LFM2-Audio DESABILITADO (mmproj conformer crash upstream)
    # Qwen3-TTS é TTS externo (FastAPI porta 8880)
    small_audio: "(q08) & asr"

    # ASR only set (leve, cabe com vision + small)
    asr_vision: "asr & vl & (q08 | lfm2s)"

    # External TTS (separate process, same GPU — compete with heavy models)
    tts_external: "ttsext"

    # vLLM backends (mutuamente exclusivos com llama.cpp — mesma GPU)
    vllm: "q08vllm | lfm2vllm"

    # Modelos médios (~5GB VRAM) - agora cabem na VRAM com UD-Q3!
    # Qwen3.5-9B, Gemma4-E4B cabem inteiramente
    medium: "q9 | g4"

    # [REMOVED] omni_vision set (Nemotron Omni not added — upstream-only, poor perf on 6GB VRAM)

    # Modelos pesados - toda VRAM + RAM offload
    # (qwopus, gptoss, lfm2l disabled — models unlisted)
    heavy: "qw36 | gemma4m | g12 | qc9"

    # Vision sozinho
    vision_only: "vl"

  # Custo de eviction (modelos mais caros pra recarregar = prioridade pra ficar)
  # Modelos pesados demoram mais pra carregar → custo alto
  evict_costs:
    gemma4m: 10  # 26B MoE APEX I-Compact ~15.5GB, heavy offload
    qw36: 10     # 35B MoE APEX I-Compact ~17.3GB, heavy offload
    # orn: 9    # DISABLED: Ornstein Q4_K_M too large, needs APEX I-Compact
    qc9: 6      # 9B dense Q4_K_M ~5.6GB, medium startup
    g12: 7      # 12B dense Q4_0 QAT ~6.5GB, upstream --fit on
    # qwopus: 10   # DISABLED: model unlisted
    # gptoss: 8    # DISABLED: model unlisted
    # lfm2l: 9    # DISABLED: model unlisted
    # ds14: 7   REMOVED — Dense 14B poor perf on RTX 3050
    # ds32: 10  REMOVED — Dense 32B very slow on limited VRAM
    q9: 4        # ~5GB, fits VRAM now
    # [REMOVED] q3x8: 4 — qwen3-8b removed
    # [REMOVED] ACE: 4 — superseded by Qwopus
    g4: 4        # ~4.5GB, fits VRAM now
    vl: 3        # vision, leve mas útil manter vivo
    asr: 2        # Qwen3-ASR, leve (~1.5GB), multilingual
    # aud: 3        # LFM2-Audio DISABLED (mmproj crash)
    asrg: 3       # Granite Speech, médio (~3GB), ASR+AST multilingual (PT!)
    ttsext: 4   # Qwen3-TTS, external FastAPI (~2GB VRAM), voice cloning
    q08: 1       # 0.8B, ultra-leve
    lfm2s: 1    # 1.2B Instruct, ultra-leve
    lfm2t: 1    # 1.2B Thinking, ultra-leve
    # [REMOVED] gr40h1: 1 — Granite 4.0 H 1B Nano removed
    # [REMOVED] m3: 2 — Ministral 3 3B removed
    q4: 2
    # [REMOVED] ww: 4 — webworld-8b removed
    # [REMOVED] n4: 1 — nemotron-3-nano-4b removed
    g2: 1
    g2q: 1
    # nb41: 2   # REMOVED: nanbeige4.1-3b, GGUF deleted
    # mel2: mellum2-12b-thinking  # DISABLED: tool calling broken
    # vLLM backends — high startup cost (30-90s), high eviction cost
    q08vllm: 5
    lfm2vllm: 5
    # [UNLISTED] gr33vllm: 6 — Granite 3.3 8B, OOM on 6GB VRAM
    # [UNLISTED] gr40htv: 6 — Granite 4.0 H-Tiny, OOM on 6GB VRAM
    # [REMOVED] gr40h1v: 5 — Granite 4.0 H 1B Nano vLLM removed
