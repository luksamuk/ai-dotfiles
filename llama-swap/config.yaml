# llama-swap configuration for RTX 3050 Laptop (6GB VRAM)
# Configuração otimizada para uso com --fit automático + attn_rot (KV cache quantizado)
#
# Repositório: ~/git/ai-dotfiles/llama-swap/
# Modelos: ~/.llama-models/
# Requer: llama-swap v209+ (reasoning UI, macro length, histogram split, SIGHUP reload)
# Requer: llama.cpp build b8991+ (reasoning budget sampler fix, fast i-quant matmul, CUDA refactor)

# Schema para validação (VS Code)

healthCheckTimeout: 300
logLevel: info
logTimeFormat: "rfc3339"
logToStdout: "proxy"
captureBuffer: 15
startPort: 10001
sendLoadingState: false
includeAliasesInList: true
globalTTL: 0

# Macros reutilizáveis
macros:
  "models_dir": "${env.HOME}/.llama-models"
  
  # Caminho para o llama-server compilado com CUDA (--fit disponível)
  # Build local em ~/git/llama.cpp/build/bin/llama-server
  "llama_server": "${env.HOME}/git/llama.cpp/build/bin/llama-server"
  
  # ===========================================
  # PARÂMETROS DE INFERÊNCIA (baseados no Unsloth)
  # ===========================================
  # Qwen3.5: temp 0.6-0.7, top_p 0.8-0.9, top_k 20-40
  # Nemotron: temp 0.6, top_p 0.9
  # Gemma: temp 0.7, top_p 0.9
  # Referência: https://unsloth.ai/docs/models/qwen3.5
  # ===========================================
  
  # Parâmetros padrão (uso geral)
  "default_temp": "0.7"
  "default_top_p": "0.9"
  "default_top_k": "20"
  "default_min_p": "0.01"
  "default_repeat_penalty": "1.05"
  
  # Parâmetros para código/tool-calling (mais determinístico)
  "code_temp": "0.6"
  "code_top_p": "0.85"
  "code_top_k": "40"
  "code_min_p": "0.02"
  "code_repeat_penalty": "1.05"
  
  # Parâmetros para thinking/reasoning
  "think_temp": "0.6"
  "think_top_p": "0.9"
  "think_top_k": "20"
  "think_min_p": "0.0"
  "think_repeat_penalty": "1.0"
  
  # Contexto para modelos pequenos (cabem inteiros na VRAM)
  # fit-ctx: mínimo garantido, ctx-size: máximo teto
  "small_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "small_model_max_ctx": "131072"  # 128K máximo
  
  # Contexto para modelos grandes (requerem offload)
  "large_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "large_model_max_ctx": "131072"  # 128K máximo
  
  # Margem de segurança para VRAM (MiB) - usada pelo --fit-target
  "vram_margin": "512"

  # ===========================================
  # KV CACHE QUANTIZADO + ATTN_ROT
  # ===========================================
  # attn_rot é ativado AUTOMATICAMENTE quando o cache é quantizado
  # (q4_0/q8_0) e n_embd_head % 64 == 0
  # Reduz degradação de velocidade em contextos longos (~37% → ~10%)
  # NOTA: Gemma4 iSWA attn_rot bug FIXED (commit 4eb19514d, b8815+). q4_0 cache works now!
  # ===========================================
  #
  # Compatibilidade attn_rot por modelo:
  #   Qwen3.5-4B/9B   ✅ head_k=256 (256%64==0)
  #   Qwen3-14B        ✅ head_k=128 (128%64==0)
  #   Qwen3.6-35B-A3B  ✅ head_k=128
  #   Nemotron-3-Nano  ✅ head_k=128
  #   Nemotron-Omni-30B ✅ head_k=128
  #   Gemma-4 E2B/E4B  ✅ head_k=256, iSWA attn_rot fixed (b8815+)
  #   Gemma-4 26B-MoE  ✅ head_k=256, iSWA attn_rot fixed (b8815+)
  #   LFM2.5-VL-450M   ❌ vision model, manter f16
  #
  # Tipos de cache:
  #   q8_0: ~47% economia vs f16, perda mínima
  #   q4_0: ~72% economia vs f16, mais compressão
  #
  # Escolha: modelos pequenos (fit VRAM) usam q8_0 (saldo perf/mem)
  #          modelos grandes (offload) usam q4_0 (maximizar contexto)
  "small_cache_k": "q8_0"
  "small_cache_v": "q8_0"
  "large_cache_k": "q4_0"
  "large_cache_v": "q4_0"
  "gemma_cache_k": "q4_0"
  "gemma_cache_v": "q4_0"

# ===========================================
# MODELOS (nomes estilo Ollama: modelo:tamanho)
# ===========================================
models:
  # -------------------------------------------
  # QWEN3.5-4B - MULTIMODAL (VISION + TEXT)
  # Cabe inteiro na VRAM com mmproj
  # mmproj ~400MB - --fit-target 512 para vision
  # KV cache: q8_0 + attn_rot (auto)
  # -------------------------------------------
  "qwen3.5-4b":
    name: "Qwen3.5 4B"
    description: "Multimodal reasoning and agentic chat with 201-language support"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-4B-Q4_K_M.gguf
      --no-mmproj
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "2.63 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/Qwen3.5-4B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        # vision: disabled — Gated Delta Net mmproj OOM on CUDA (issue #21323)
      warning: "Vision disabled — Gated Delta Net mmproj crashes/CUDA OOM (llama.cpp issues #21323, #21402)"

  "qwen3.5-9b":
    name: "Qwen3.5 9B"
    description: "Multimodal reasoning, coding, and agentic chat with 201-language support"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 512
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~5.05 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5GB VRAM (text-only, mmproj offload needs fix)"
      source: "unsloth/Qwen3.5-9B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        # vision: disabled temporarily — mmproj + fit doesn't handle offload yet
      warning: "Vision disabled temporarily — mmproj offload with --fit causes OOM"

  "gemma4-e4b":
    name: "Gemma 4 E4B"
    description: "On-device multimodal reasoning with text, image, and audio understanding"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 512
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~4.5 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5GB VRAM (fits with mmproj!)"
      source: "unsloth/gemma-4-E4B-it-GGUF"
      kv_cache: "q4_0 + attn_rot (iSWA fix b8815+)"
      features:
        thinking: true
        # vision: disabled — mmproj crashes on CUDA (issue #21402)
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA (llama.cpp issue #21402). Text-only mode."

  "gemma4-e2b":
    name: "Gemma 4 E2B"
    description: "Compact on-device multimodal reasoning with text, image, and audio"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E2B-it-Q4_K_M.gguf
      --no-mmproj
      --fit on
      --fit-target 1024
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "3.11 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/gemma-4-E2B-it-GGUF"
      kv_cache: "q4_0 + attn_rot (iSWA fix b8815+)"
      features:
        thinking: true
        # vision: disabled — mmproj crashes on CUDA (issue #21402)
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA (llama.cpp issue #21402). Text-only mode."

  "nemotron-3-nano-4b":
    name: "Nemotron 3 Nano 4B"
    description: "Compact edge-ready reasoning and agentic AI with tool use"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/NVIDIA-Nemotron-3-Nano-4B-Q4_K_M.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.6
      --top-p 0.9
      --top-k 40
      --min-p 0.00
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "2.90 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/NVIDIA-Nemotron-3-Nano-4B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        tools: true

  "lfm2.5-vl-450m":
    name: "LFM2.5-VL 450M"
    description: "Edge vision-language model for object detection and captioning"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-VL-450M-Q4_0.gguf
      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.1
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --reasoning off
      --cache-type-k f16
      --cache-type-v f16
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      size: "0.22 GB + mmproj"
      context: "32K-128K (dynamic)"
      vram_usage: "~0.5GB"
      source: "LiquidAI/LFM2.5-VL-450M-GGUF"
      kv_cache: "f16 (vision, precision priority)"
      features:
        vision: true

  # [REMOVED] Nemotron-3-Nano-Omni-30B — underperforming vs Qwen3.6 for code

  # -------------------------------------------
  # [REMOVED] GLM 4.7 Flash — ~4 t/s, Gated Delta Net needs f16 cache. Superseded by Qwen3.6 35B MoE at 27+ t/s.

  # [REMOVED] Devstral Small 2 — 4.2 t/s. Dense 24B superseded by Qwen3.6 35B MoE at 26+ t/s.

  # -------------------------------------------
  # GEMMA-4-26B-A4B - MoE REASONING + CODING
  # MoE 26B params, 4B ativo por token. 128 experts, top-8 routing.
  # Google recomenda: temp=1.0 para reasoning, temp=0.7 para coding
  # Variantes via setParamsByID: base (chat), :think (reasoning)
  # UD-Q3_K_XL ~12GB (Dynamic 2.0)
  # head_dim=256 → attn_rot ✅, iSWA fix (b8815+) → q4_0 cache works now
  # mmproj crashes on CUDA (bug #21402) → text-only
  # Architecture: gemma4 (Gemma4ForCausalLM)
  # -------------------------------------------
  "gemma4-26b-moe":
    name: "Gemma 4 26B MoE"
    description: "MoE reasoning + coding — 128 experts, 4B active/token"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-26B-A4B-it-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 256
      --fit-ctx 16384
      --ctx-size 131072
      --temp 1.0
      --top-p 0.95
      --reasoning on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.95
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 1.0
          top_p: 0.95
    ttl: 120
    metadata:
      size: "~12 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "16K-128K (dynamic)"
      vram_usage: "~5GB VRAM + ~7GB RAM (q4_0 cache, more layers GPU)"
      source: "unsloth/gemma-4-26B-A4B-it-GGUF"
      kv_cache: "q4_0 + attn_rot (iSWA fix b8815+)"
      features:
        thinking: true
        vision: false
        tools: false
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA (issue #21402). Text-only. q4_0 cache now works (iSWA attn_rot fix, commit 4eb19514d)."

  # -------------------------------------------
  # GPT-OSS-20B - DENSE CODING (always reasoning)
  # Dense 20B params. OpenAI open-source model for coding.
  # Harmony format: ALWAYS generates <channel|analysis> tokens.
  # --reasoning on ensures reasoning_content is properly extracted.
  # Low/medium/high reasoning_effort is Ollama-specific, NOT supported in llama.cpp.
  # No variant :think needed — model always thinks internally.
  # Q4_K_M ~11GB (dense, all 20B params active per token, slower than MoE but stronger).
  # head_dim=64 → attn_rot ✅, KV cache q4_0
  # No mmproj exists → text-only.
  # Architecture: gptoss (GptOssForCausalLM)
  # -------------------------------------------
  "gpt-oss-20b":
    name: "GPT-OSS 20B"
    description: "Dense 20B coding — GPT-OSS Harmony, always reasons internally"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gpt-oss-20b-Q4_K_M.gguf
      --no-mmproj
      --fit on
      --fit-target 256
      --fit-ctx 16384
      --ctx-size 201000
      --temp 0.6
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
    ttl: 120
    metadata:
      size: "~11 GB (Q4_K_M)"
      context: "16K-200K (dynamic)"
      vram_usage: "~5GB VRAM + ~6GB RAM"
      source: "unsloth/gpt-oss-20b-GGUF"
      kv_cache: "q4_0 + attn_rot"
      features:
        thinking: true
        vision: false
        tools: false
      warning: "Harmony format: ALWAYS reasons internally (not optional). --reasoning on extracts it properly. Text-only. Dense 20B."

  # [REMOVED] Qwen3.6-27B — 3.8 t/s on limited VRAM (dense = no partial expert offload).
  # MoE models are 5-7x faster. Linear_attention/SSM didn't help when most layers in RAM.

  # -------------------------------------------
  # QWEN3.6-35B-A3B - MoE CODING (text-only, no vision)
  # MoE 35B params, 3B ativo por token. Substitui o Qwen3-Coder-30B.
  # 33 experts, top-8 routing. UD-Q3_K_XL ~13.8GB (Dynamic 2.0)
  # --no-mmproj: mmproj ocupa 858MB VRAM e impede partial expert offload.
  #   Sem mmproj: ALL 41 layers sobem pra GPU (partial expert partition) → 20+ t/s!
  #   Com mmproj: só ~11 layers em GPU → ~5 t/s. Não vale a pena.
  # KV cache: q4_0 + attn_rot (head_k=128, 128%64==0 ✅)
  # Architecture: qwen35moe (Qwen3MoeForCausalLM)
  # -------------------------------------------
  "qwen3.6-35b-moe":
    name: "Qwen3.6 35B MoE"
    description: "Efficient MoE for agentic coding — 3B active/token, 26+ t/s text-only"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.6-35B-A3B-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 256
      --fit-ctx 16384
      --ctx-size 131072
      --temp ${code_temp}
      --top-p ${code_top_p}
      --top-k ${code_top_k}
      --min-p ${code_min_p}
      --repeat-penalty ${code_repeat_penalty}
      --reasoning on
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.85
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 120
    metadata:
      size: "~13.8 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "16K-128K (dynamic)"
      vram_usage: "~5GB VRAM + ~9GB RAM (all layers GPU with partial expert offload)"
      source: "unsloth/Qwen3.6-35B-A3B-GGUF"
      kv_cache: "q4_0 + attn_rot"
      features:
        thinking: true
        vision: false
        tools: true
      warning: "Vision disabled — mmproj blocks partial expert offload (11→41 layers GPU). Text-only = 26+ t/s vs 5 t/s with vision."

# ============================================
# SWAP MATRIX (v202+) - Substitui o antigo groups
# ============================================
# O solver determina automaticamente qual combinação de modelos
# pode rodar simultaneamente e quais descarregar quando necessário.
#
# Regras de concorrência para RTX 3050 6GB:
# - Modelos pequenos (~3GB VRAM) podem rodar SOZINHOS ou com LFM2.5-VL
# - Modelos grandes (~5GB VRAM) rodam SOZINHOS
# - Modelos pesados (14B+, offload) rodam SOZINHOS
# - LFM2.5-VL (0.5GB) pode acompanhar modelos pequenos
# - Gemma4-E2B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - Qwen3.5-4B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - Variantes "think" usam o mesmo modelo, só mudam --reasoning
#   (não rodam simultaneamente com a variante base)
# ============================================

matrix:
  # Variáveis de modelo para a matrix
  # Removemos aliases curtos desnecessários — usamos IDs completos ou vars mínimos
  # NOTA: todo ID usado em sets/evict_costs DEVE estar definido aqui
  vars:
    # Atalhos para IDs longos (usados em sets e evict_costs)
    gemma4m: gemma4-26b-moe
    # Modelos pequenos
    q4: qwen3.5-4b
    n4: nemotron-3-nano-4b
    g2: gemma4-e2b
    # Vision
    vl: lfm2.5-vl-450m
    # Modelos médios (agora cabem na VRAM!)
    q9: qwen3.5-9b
    g4: gemma4-e4b
    # Pesados
    qw36: qwen3.6-35b-moe
    gptoss: gpt-oss-20b
  # Sets: combinações válidas de modelos simultâneos
  # DSL: & = AND (rodar junto), | = OR (alternativa), () = agrupamento
  # +ref = expandir outro set inline
  #
  # Lógica:
  # - small_vision: modelo pequeno + vision (cabem juntos na VRAM)
  # - small_only: modelo pequeno sem vision
  # - medium: modelos ~5GB rodam sozinhos
  # - heavy: modelos 14B+ rodam sozinhos (toda VRAM)
  sets:
    # LLM pequeno + Vision: trocar entre modelos leves NÃO evicta o vision
    small_vision: "(q4 | n4 | g2) & vl"

    # LLM pequeno sozinho (sem vision ativo)
    small_only: "q4 | n4 | g2"

    # Modelos médios (~5GB VRAM) - agora cabem na VRAM com UD-Q3!
    # Qwen3.5-9B e Gemma4-E4B cabem inteiramente com mmproj
    medium: "q9 | g4"

    # Removed: omni_vision set (Nemotron removed)

    # Modelos pesados - toda VRAM + RAM offload
    heavy: "qw36 | gemma4m | gptoss"

    # Vision sozinho
    vision_only: "vl"

  # Custo de eviction (modelos mais caros pra recarregar = prioridade pra ficar)
  # Modelos pesados demoram mais pra carregar → custo alto
  evict_costs:
    gemma4m: 10  # 26B MoE UD-Q3, heavy offload
    qw36: 10     # 13.8GB MoE UD-Q3, heavy offload
    gptoss: 8    # 11GB dense Q4_K_M, heavy offload
    q9: 4        # ~5GB, fits VRAM now
    g4: 4        # ~4.5GB, fits VRAM now
    vl: 3        # vision, leve mas útil manter vivo
    q4: 2
    n4: 1
    g2: 1