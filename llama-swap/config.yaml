      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning off
      --flash-attn on
    ttl: 60
    aliases:
      - "gemma4-e2b"
      - "gemma-4-e2b"
    metadata:
      size: "3.11 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/gemma-4-E2B-it-GGUF"

  # -------------------------------------------
  # GEMMA-4-E2B THINKING - Com reasoning
  # Melhor para: raciocínio em modelo compacto
  # -------------------------------------------
  "gemma4-e2b-think":
    name: "Gemma 4 E2B Thinking"
    description: "Gemma-4 Efficient 2B Q4_K_M - Com reasoning"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E2B-it-Q4_K_M.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${think_temp}
      --top-p ${think_top_p}
      --top-k ${think_top_k}
      --min-p ${think_min_p}
      --repeat-penalty ${think_repeat_penalty}
      --reasoning auto
      --flash-attn on
    ttl: 60
    aliases:
      - "gemma4-e2b-think"
      - "gemma-4-e2b-think"
    metadata:
      size: "3.11 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/gemma-4-E2B-it-GGUF"
      features:
        thinking: true

  # -------------------------------------------
  # NEMOTRON-3-NANO-4B - CABE INTEIRO NA VRAM
