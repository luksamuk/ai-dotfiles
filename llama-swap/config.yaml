      kv_cache: q8_0 + attn_rot
      features:
        completion: true
        tools: false
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: true
        image: false
      architecture: qwen3vl
      parameters: 600000000
      context_length: 131072
      embedding_length: 896
      quantization: Q8_0
