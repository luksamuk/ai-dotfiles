      source: "LiquidAI/LFM2.5-1.2B-Instruct (HuggingFace safetensors)"
      note: "vLLM backend with native lfm2 tool parser — no --jinja workaround needed"
      features:
        completion: true
        tools: false
        thinking: true
        vision: false
        embedding: false
        insert: false
