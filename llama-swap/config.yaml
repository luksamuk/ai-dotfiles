# llama-swap configuration for RTX 3050 Laptop (6GB VRAM)
# Configuração otimizada para uso com --fit automático + attn_rot (KV cache quantizado)
# Dual binary: llama.cpp for dense models, ik_llama.cpp for MoE models (pinned memory, better expert offload)
#
# Repositório: ~/git/ai-dotfiles/llama-swap/
# Modelos: ~/.llama-models/
# Requer: llama-swap v209+ (reasoning UI, macro length, histogram split, SIGHUP reload)
# Requer: llama.cpp build b8991+ (reasoning budget sampler fix, fast i-quant matmul, CUDA refactor)

# Schema para validação (VS Code)

healthCheckTimeout: 300
logLevel: info
logTimeFormat: "rfc3339"
logToStdout: "proxy"
captureBuffer: 15
startPort: 10001
sendLoadingState: false
includeAliasesInList: true
globalTTL: 0

# Macros reutilizáveis
macros:
  "models_dir": "${env.HOME}/.llama-models"
  
  # Caminho para o llama-server compilado com CUDA (--fit disponível)
  # Build local em ~/git/llama.cpp/build/bin/llama-server
  "llama_server": "${env.HOME}/git/llama.cpp/build/bin/llama-server"
  
  # Caminho para ik_llama.cpp — fork otimizado para MoE (pinned memory, faster expert offload)
  # Build local em ~/git/ik_llama.cpp/build/bin/llama-server
  "ik_llama_server": "${env.HOME}/git/ik_llama.cpp/build/bin/llama-server"
  
  # Caminho para o vLLM (installed in ~/.vllm venv)
  "vllm_bin": "${env.HOME}/.vllm/bin/vllm"
  
  # ===========================================
  # PARÂMETROS DE INFERÊNCIA (baseados no Unsloth)
  # ===========================================
  # Qwen3.5: temp 0.6-0.7, top_p 0.8-0.9, top_k 20-40
  # Nemotron: temp 0.6, top_p 0.9
  # Gemma: temp 0.7, top_p 0.9
  # Referência: https://unsloth.ai/docs/models/qwen3.5
  # ===========================================
  
  # Parâmetros padrão (uso geral)
  "default_temp": "0.7"
  "default_top_p": "0.9"
  "default_top_k": "20"
  "default_min_p": "0.01"
  "default_repeat_penalty": "1.05"
  
  # Parâmetros para código/tool-calling (mais determinístico)
  "code_temp": "0.6"
  "code_top_p": "0.85"
  "code_top_k": "40"
  "code_min_p": "0.02"
  "code_repeat_penalty": "1.05"
  
  # Parâmetros para thinking/reasoning
  "think_temp": "0.6"
  "think_top_p": "0.9"
  "think_top_k": "20"
  "think_min_p": "0.0"
  "think_repeat_penalty": "1.0"
  
  # Contexto para modelos pequenos (cabem inteiros na VRAM)
  # fit-ctx: mínimo garantido, ctx-size: máximo teto
  "small_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "small_model_max_ctx": "131072"  # 128K máximo
  
  # Contexto para modelos grandes (requerem offload)
  "large_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "large_model_max_ctx": "131072"  # 128K máximo
  
  # Margem de segurança para VRAM (MiB) - usada pelo --fit-target
  "vram_margin": "512"

  # ===========================================
  # KV CACHE QUANTIZADO + ATTN_ROT
  # ===========================================
  # attn_rot é ativado AUTOMATICAMENTE quando o cache é quantizado
  # (q4_0/q8_0) e n_embd_head % 64 == 0
  # Reduz degradação de velocidade em contextos longos (~37% → ~10%)
  # NOTA: Gemma4 iSWA attn_rot bug FIXED (commit 4eb19514d, b8815+). q4_0 cache works now!
  # ===========================================
  #
  # Compatibilidade attn_rot por modelo:
  #   Qwen3.5-4B/9B   ✅ head_k=256 (256%64==0)
  #   Qwen3-14B        ✅ head_k=128 (128%64==0)
  #   Qwen3.6-35B-A3B  ✅ head_k=128
  #   Nemotron-3-Nano  ✅ head_k=128
  #   Nemotron-Omni-30B ✅ head_k=128
  #   Gemma-4 E2B/E4B  ✅ head_k=256, iSWA attn_rot fixed (b8815+)
  #   Gemma-4 26B-MoE  ✅ head_k=256, iSWA attn_rot fixed (b8815+)
  #   LFM2.5-VL-450M   ❌ vision model, manter f16
  #
  # Tipos de cache:
  #   q8_0: ~47% economia vs f16, perda mínima
  #   q4_0: ~72% economia vs f16, mais compressão
  #
  # Escolha: modelos pequenos (fit VRAM) usam q8_0 (saldo perf/mem)
  #          modelos grandes (offload) usam q4_0 (maximizar contexto)
  "small_cache_k": "q8_0"
  "small_cache_v": "q8_0"
  "large_cache_k": "q4_0"
  "large_cache_v": "q4_0"
  "gemma_cache_k": "q4_0"
  "gemma_cache_v": "q4_0"

# ===========================================
# MODELOS (nomes estilo Ollama: modelo:tamanho)
# ===========================================
models:
  # -------------------------------------------
  # QWEN3.5-0.8B - MULTIMODAL (VISION + TEXT)
  # Smallest Qwen3.5 variant with native vision (early fusion)
  # Cabe inteiro na VRAM: 0.55GB model + 0.20GB mmproj + ~1GB cache
  # mmproj ~196MB (F16) — lightweight enough to fit with model+cache
  # NOTE: Bug #21402 (Gemma 4 mmproj crash) does NOT affect Qwen3.5
  # NOTE: Bug #22785 (Qwen-VL accuracy degraded in llama-server) — monitor
  # KV cache: q8_0 + attn_rot (head_dim provavelmente 128, 128%64==0)
  # -------------------------------------------
  "qwen3.5-0.8b":
    name: "Qwen3.5 0.8B"
    description: "Compact multimodal reasoning model — text + vision (llama.cpp GGUF)"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-0.8B-Q4_K_M.gguf
      --mmproj ${models_dir}/mmproj-Qwen3.5-0.8B-F16.gguf
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~0.55 GB (Q4_K_M) + ~0.20 GB (mmproj F16)"
      context: "64K-128K (dynamic)"
      vram_usage: "~1.7GB (model + mmproj + cache)"
      source: "unsloth/Qwen3.5-0.8B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        vision: true
        tools: true

  # -------------------------------------------
  # QWEN3.5-0.8B - vLLM BACKEND (safetensors)
  # EXCLUSIVO PARA TESTES DE COMPATIBILIDADE DO SPRACHSPIEL
  # Nao usar como backend diario — startup lento (~30-90s), overhead alto
  # vLLM serve: OpenAI-compatible API (mesmo formato que Ollama e llama.cpp)
  # Requer: venv ~/.vllm com vllm instalado
  # Requer: modelo baixado via HF (auto-download no primeiro serve)
  # -------------------------------------------
  "qwen3.5-0.8b-vllm":
    name: "Qwen3.5 0.8B (vLLM)"
    description: "vLLM backend test — Sprachspiel compatibility (NOT for daily use)"
    cmd: |
      ${vllm_bin} serve Qwen/Qwen3.5-0.8B
      --port ${PORT}
      --served-model-name qwen3.5-0.8b-vllm
      --gpu-memory-utilization 0.70
      --max-model-len 8192
      --max-num-seqs 2
      --dtype half
      --trust-remote-code
      --default-chat-template-kwargs '{"enable_thinking": false}'
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --skip-mm-profiling
      --limit-mm-per-prompt '{"image": 0}'
    ttl: 900
    metadata:
      backend: vllm
      size: "~1.6 GB (BF16 safetensors, auto-download from HF)"
      context: "8K (vLLM optimized for 6GB VRAM)"
      vram_usage: "~2-2.5GB (vision disabled)"
      source: "Qwen/Qwen3.5-0.8B (HuggingFace safetensors)"
      note: "vLLM test backend for Sprachspiel — slow startup (~30-90s), use only for API compat testing"
      features:
        thinking: false
        vision: false
        tools: true

  # -------------------------------------------
  # QWEN3.5-2B - vLLM BACKEND (safetensors)
  # Requer: venv ~/.vllm com vllm instalado
  # Requer: modelo baixado via HF (auto-download no primeiro serve)
  # IMPORTANTE: skip-mm-profiling + limit-mm-per-prompt necessário
  #   para caber na VRAM (~4.6GB pesos + overhead vLLM)
  # Vision DESABILITADO — sem mmproj, texto apenas
  # -------------------------------------------
  "qwen3.5-2b-vllm":
    name: "Qwen3.5 2B (vLLM)"
    description: "vLLM backend — 2B text-only, no vision (~90 tok/s)"
    cmd: |
      ${vllm_bin} serve Qwen/Qwen3.5-2B
      --port ${PORT}
      --served-model-name qwen3.5-2b-vllm
      --gpu-memory-utilization 0.82
      --max-model-len 2048
      --max-num-seqs 1
      --dtype half
      --trust-remote-code
      --enforce-eager
      --skip-mm-profiling
      --limit-mm-per-prompt '{"image": 0}'
      --default-chat-template-kwargs '{"enable_thinking": false}'
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
    ttl: 900
    metadata:
      backend: vllm
      size: "~4 GB (BF16 safetensors, auto-download from HF)"
      context: "2K (vLLM tight fit on 6GB VRAM)"
      vram_usage: "~5GB"
      source: "Qwen/Qwen3.5-2B (HuggingFace safetensors)"
      note: "vLLM 2B on 6GB VRAM — enforce-eager, skip-mm-profiling, no vision. Slow startup (~60-120s)"
      features:
        thinking: false
        vision: false
        tools: true

  # -------------------------------------------
  # QWEN3.5-4B - MULTIMODAL (VISION + TEXT)
  # Cabe inteiro na VRAM com mmproj
  # mmproj ~400MB - --fit-target 512 para vision
  # KV cache: q8_0 + attn_rot (auto)
  # -------------------------------------------
  "qwen3.5-4b":
    name: "Qwen3.5 4B"
    description: "Multimodal reasoning and agentic chat with 201-language support"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-4B-Q4_K_M.gguf
      --no-mmproj
      --fit on
      --fit-target 768
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "2.63 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/Qwen3.5-4B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        tools: true
        # vision: disabled — Gated Delta Net mmproj OOM on CUDA (issue #21323)
      warning: "Vision disabled — Gated Delta Net mmproj crashes/CUDA OOM (llama.cpp issues #21323, #21402)"

  "qwen3.5-9b":
    name: "Qwen3.5 9B"
    description: "Multimodal reasoning, coding, and agentic chat with 201-language support"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 512
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~5.05 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5GB VRAM (text-only, mmproj offload needs fix)"
      source: "unsloth/Qwen3.5-9B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        tools: true
        # vision: disabled temporarily — mmproj + fit doesn't handle offload yet
      warning: "Vision disabled temporarily — mmproj offload with --fit causes OOM"

  "gemma4-e4b":
    name: "Gemma 4 E4B"
    description: "On-device multimodal reasoning with text, image, and audio understanding"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-UD-Q3_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 512
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "~4.5 GB (UD-Q3_K_XL Dynamic 2.0)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5GB VRAM (fits with mmproj!)"
      source: "unsloth/gemma-4-E4B-it-GGUF"
      kv_cache: "q4_0 + attn_rot (iSWA fix b8815+)"
      features:
        thinking: true
        tools: true
        # vision: disabled — mmproj crashes on CUDA (issue #21402)
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA (llama.cpp issue #21402). Text-only mode."

  "gemma4-e2b":
    name: "Gemma 4 E2B"
    description: "Compact on-device multimodal reasoning with text, image, and audio"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E2B-it-Q4_K_M.gguf
      --no-mmproj
      --fit on
      --fit-target 1024
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "3.11 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/gemma-4-E2B-it-GGUF"
      kv_cache: "q4_0 + attn_rot (iSWA fix b8815+)"
      features:
        thinking: true
        tools: true
        # vision: disabled — mmproj crashes on CUDA (issue #21402)
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA (llama.cpp issue #21402). Text-only mode."

  # [REMOVED] Qwen3.5-9B-ACE — superseded by Qwen3.6-35B-Qwopus for agentic tasks

  "nemotron-3-nano-4b":
    name: "Nemotron 3 Nano 4B"
    description: "Compact edge-ready reasoning and agentic AI with tool use"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/NVIDIA-Nemotron-3-Nano-4B-Q4_K_M.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.6
      --top-p 0.9
      --top-k 40
      --min-p 0.00
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${small_cache_k}
      --cache-type-v ${small_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    metadata:
      size: "2.90 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/NVIDIA-Nemotron-3-Nano-4B-GGUF"
      kv_cache: "q8_0 + attn_rot"
      features:
        thinking: true
        tools: true

  "lfm2.5-vl-450m":
    name: "LFM2.5-VL 450M"
    description: "Edge vision-language model for object detection and captioning"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-VL-450M-Q4_0.gguf
      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.1
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --reasoning off
      --cache-type-k f16
      --cache-type-v f16
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      size: "0.22 GB + mmproj"
      context: "32K-128K (dynamic)"
      vram_usage: "~0.5GB"
      source: "LiquidAI/LFM2.5-VL-450M-GGUF"
      kv_cache: "f16 (vision, precision priority)"
      features:
        vision: true

  # [REMOVED] Nemotron-3-Nano-Omni-30B — underperforming vs Qwen3.6 for code

  # -------------------------------------------
  # [REMOVED] GLM 4.7 Flash — ~4 t/s, Gated Delta Net needs f16 cache. Superseded by Qwen3.6 35B MoE at 27+ t/s.

  # [REMOVED] Devstral Small 2 — 4.2 t/s. Dense 24B superseded by Qwen3.6 35B MoE at 26+ t/s.

  # -------------------------------------------
  # GEMMA-4-26B-A4B - MoE REASONING + CODING (APEX I-Compact)
  # MoE 26B params, 4B ativo por token. 128 experts, top-8 routing.
  # Google recomenda: temp=1.0 para reasoning, temp=0.7 para coding
  # Variantes via setParamsByID: base (chat), :think (reasoning)
  # APEX I-Compact ~15.5GB — mixed-precision MoE quant com imatrix diversa
  #   (edges Q4_K, middle Q3_K, shared experts Q6_K, attention Q4_K)
  #   Perplexity comparable to Q8_0, real-world benchmarks better than UD-Q3_K_XL
  # head_dim=256 → attn_rot ✅, iSWA fix (b8815+) → q4_0 cache works now
  # mmproj crashes on CUDA (bug #21402) → text-only
  # Architecture: gemma4 (Gemma4ForCausalLM)
  # Using ik_llama.cpp: better MoE performance via pinned memory for expert offload
  # -------------------------------------------
  "gemma4-26b-moe":
    name: "Gemma 4 26B MoE"
    description: "MoE reasoning + coding — 128 experts, 4B active/token (APEX I-Compact)"
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-26B-A4B-APEX-I-Compact.gguf
      # No --no-mmproj: ik_llama.cpp doesn't support this flag (upstream-only)
      # No --fit-ctx: ik_llama.cpp doesn't support this flag; --ctx-size serves as ceiling
      --fit
      --fit-margin 512
      --ctx-size 131072
      --temp 1.0
      --top-p 0.95
      --reasoning on
      --jinja
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.95
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 1.0
          top_p: 0.95
    ttl: 120
    metadata:
      size: "~15.5 GB (APEX I-Compact)"
      context: "16K-128K (dynamic)"
      vram_usage: "~5GB VRAM + ~10GB RAM (q4_0 cache, APEX mixed-precision offload, ik_llama.cpp pinned memory)"
      source: "mudler/gemma-4-26B-A4B-it-APEX-GGUF"
      kv_cache: "q4_0 + attn_rot (iSWA fix b8815+)"
      features:
        thinking: true
        vision: false
        tools: true
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA (issue #21402). Text-only. APEX I-Compact: edges Q4_K, middle Q3_K, shared Q6_K, attn Q4_K."

  # -------------------------------------------
  # GPT-OSS-20B - DENSE CODING (always reasoning)
  # Dense 20B params. OpenAI open-source model for coding.
  # Harmony format: ALWAYS generates <channel|analysis> tokens.
  # --reasoning on ensures reasoning_content is properly extracted.
  # Low/medium/high reasoning_effort is Ollama-specific, NOT supported in llama.cpp.
  # No variant :think needed — model always thinks internally.
  # Q4_K_M ~11GB (dense, all 20B params active per token, slower than MoE but stronger).
  # head_dim=64 → attn_rot ✅, KV cache q4_0
  # No mmproj exists → text-only.
  # Architecture: gptoss (GptOssForCausalLM)
  # -------------------------------------------
  "gpt-oss-20b":
    name: "GPT-OSS 20B"
    description: "Dense 20B coding — GPT-OSS Harmony, always reasons internally"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gpt-oss-20b-Q4_K_M.gguf
      --no-mmproj
      --fit on
      --fit-target 256
      --fit-ctx 16384
      --ctx-size 201000
      --temp 0.6
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
    ttl: 120
    metadata:
      size: "~11 GB (Q4_K_M)"
      context: "16K-200K (dynamic)"
      vram_usage: "~5GB VRAM + ~6GB RAM"
      source: "unsloth/gpt-oss-20b-GGUF"
      kv_cache: "q4_0 + attn_rot"
      features:
        thinking: true
        vision: false
        tools: true
      warning: "Harmony format: ALWAYS reasons internally (not optional). --reasoning on extracts it properly. Text-only. Dense 20B."

