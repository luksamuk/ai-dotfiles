# llama-swap configuration for RTX 3050 Laptop (6GB VRAM)
# Configuração otimizada para uso com --fit automático + attn_rot (KV cache quantizado)
# Dual binary: llama.cpp for dense models, ik_llama.cpp for MoE models (pinned memory, better expert offload)
#
# Repositório: ~/git/ai-dotfiles/llama-swap/
# Modelos: ~/.llama-models/
# Requer: llama-swap v212+ (Prometheus metrics, SIGHUP reload, reasoning UI, race fix, zstd captures)
# Requer: llama.cpp build b9563+ (mtmd audio/TTS/video, 6 audio preprocessors: whisper/conformer/granite_speech/gemma4a/gemma4ua/qwen3a, LFM2.5 reasoning fix, Gemma4 MTP, Granite4 Vision, KV cache optimizations)
# Requer: ik_llama.cpp v4566+ (bf16 graph reduce fix, threads-mtmd, mtmd checkpoint save/restore)
# Requer: BeeLlama.cpp v0.3.1+ (DFlash speculative decoding, TurboQuant KV cache, Gemma4 audio fixes)
#
# OTIMIZAÇÕES ik_llama.cpp (modelos MoE e dense offloaded):
#   --k-cache-hadamard / --v-cache-hadamard (-khad/-vhad): Hadamard transform no K/V cache
#     antes da quantização → qualidade muito mais próxima do f16 com cache q4_0/q8_0.
#     Especialmente útil em 6GB VRAM onde q4_0 é necessário para contexto longo.
#   --flash-attn auto: desliga FA automaticamente em contextos curtos (economia em MoE offloaded)
#   --defer-experts: defere mmap de experts no Linux → carregamento mais rápido de modelos MoE

# Schema para validação (VS Code)

healthCheckTimeout: 300
logLevel: info
logTimeFormat: "rfc3339"
logToStdout: "proxy"
captureBuffer: 15
startPort: 10001
sendLoadingState: false
includeAliasesInList: true
globalTTL: 0

# Macros reutilizáveis
macros:
  "models_dir": "${env.HOME}/.llama-models"
  "media_path": "${env.HOME}/testfiles/vision"

  # Caminho para o llama-server compilado com CUDA (--fit disponível)
  # Build local em ~/git/llama.cpp/build/bin/llama-server
  "llama_server": "${env.HOME}/git/llama.cpp/build/bin/llama-server"

  # Caminho para ik_llama.cpp — fork otimizado para MoE (pinned memory, faster expert offload)
  # Build local em ~/git/ik_llama.cpp/build/bin/llama-server
  "ik_llama_server": "${env.HOME}/git/ik_llama.cpp/build/bin/llama-server"

  # Caminho para BeeLlama.cpp — fork com DFlash speculative decoding + TurboQuant KV cache
  # Build local em ~/git/beellama.cpp/build/bin/llama-server
  # NOTA: Bee não tem --fit/--fit-margin. Usar --n-gpu-layers 99 para modelos que cabem na VRAM.
  # Requer LD_LIBRARY_PATH apontando para ~/git/beellama.cpp/build/bin/ (libs .so do Bee) — MAS o RPATH já está setado no binário
  "bee_server": "${env.HOME}/git/beellama.cpp/build/bin/llama-server"

  # Caminho para o vLLM (installed in ~/.vllm venv)
  "vllm_bin": "${env.HOME}/.vllm/bin/vllm"

  # ===========================================
  # PARÂMETROS DE INFERÊNCIA (baseados no Unsloth)
  # ===========================================
  # Qwen3.5: temp 0.6-0.7, top_p 0.8-0.9, top_k 20-40

  # Gemma: temp 0.7, top_p 0.9
  # Referência: https://unsloth.ai/docs/models/qwen3.5
  # ===========================================
  # Parâmetros padrão (uso geral)
  "default_temp": "0.7"
  "default_top_p": "0.9"
  "default_top_k": "20"
  "default_min_p": "0.01"
  "default_repeat_penalty": "1.05"

  # Parâmetros para código/tool-calling (mais determinístico)
  "code_temp": "0.6"
  "code_top_p": "0.85"
  "code_top_k": "40"
  "code_min_p": "0.02"
  "code_repeat_penalty": "1.05"

  # Parâmetros para thinking/reasoning
  "think_temp": "0.6"
  "think_top_p": "0.9"
  "think_top_k": "20"
  "think_min_p": "0.0"
  "think_repeat_penalty": "1.0"

  # Contexto para modelos pequenos (cabem inteiros na VRAM)
  # fit-ctx: mínimo garantido, ctx-size: máximo teto
  "small_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "small_model_max_ctx": "131072"  # 128K máximo
  # Contexto para modelos grandes (requerem offload)
  "large_model_min_ctx": "65536"   # 64K mínimo (tool-calling/agentes)
  "large_model_max_ctx": "131072"  # 128K máximo
  # Margem de segurança para VRAM (MiB) - usada pelo --fit-target
  "vram_margin": "512"

  # ===========================================
  # KV CACHE QUANTIZADO + ATTN_ROT
  # ===========================================
  # attn_rot é ativado AUTOMATICAMENTE quando o cache é quantizado
  # (q4_0/q8_0) e n_embd_head % 64 == 0
  # Reduz degradação de velocidade em contextos longos (~37% → ~10%)
  # NOTA: Gemma4 iSWA attn_rot bug FIXED (commit 4eb19514d, b8815+). q4_0 cache works now!
  # ===========================================
  #
  # Compatibilidade attn_rot por modelo:
  #   Qwen3.5-4B/9B   ✅ head_k=256 (256%64==0)
  #   Qwen3-14B        ✅ head_k=128 (128%64==0)
  #   Qwen3.6-35B-A3B  ✅ head_k=128
    #   Nemotron-3-Nano  ✅ head_k=128 (REMOVED — poor quality)
    # Nemotron-Omni-30B ✅ head_k=128 (NOT added — upstream-only, ik doesn't support nemotron_h_moe)
  #   Gemma-4 E2B/E4B  ✅ head_k=256, iSWA attn_rot fixed (b8815+)
  #   Gemma-4 26B-MoE  ✅ head_k=256, iSWA attn_rot fixed (b8815+)
  #   LFM2.5-1.2B       ✅ head_k=64 (64%64==0) — dense hybrid
  #   LFM2-24B-A2B     ✅ head_k=128 (128%64==0) — MoE hybrid
  #   LFM2.5-VL-450M   ❌ vision model, manter f16
  #
  # Tipos de cache:
  #   q8_0: ~47% economia vs f16, perda mínima
  #   q4_0: ~72% economia vs f16, mais compressão
  #
  # Escolha: modelos pequenos (fit VRAM) usam q8_0 (saldo perf/mem)
  #          modelos grandes (offload) usam q4_0 (maximizar contexto)
  "small_cache_k": "q8_0"
  "small_cache_v": "q8_0"
  "large_cache_k": "q4_0"
  "large_cache_v": "q4_0"
  "gemma_cache_k": "q4_0"
  "gemma_cache_v": "q4_0"
models:
# -------------------------------------------
# QWEN3.5-4B - ik BACKEND (Hadamard KV cache)
# Dense 4B params, MoQ-3.75 ~1.92GB.
# MoQ-3.75: 51% faster than i1-Q4_K_M (45.7 vs 30.2 tok/s),
# same quality (23/25 Snake), 24% smaller (1.92 vs 2.52 GB).
# ik with hadamard cache gives near-fp16 quality at smaller memory footprint than q8_0.
# --flash-attn auto: disables FA on short contexts for savings
# --parallel-tool-calls: enables multiple tool calls in single response
# Dual mode: base (chat, no think) and :think (reasoning)
# -------------------------------------------
  "qwen3.5-4b":
    name: "Qwen3.5 4B"
    description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/MoQ-3.75.gguf
      --jinja
      --parallel-tool-calls
      --fit
      --fit-margin 512
      --ctx-size 131072
      --timeout 0
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k q8_0
      --cache-type-v q4_0
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 120
    metadata:
      size: "~1.92 GB (MoQ-3.75)"
      context: "64K-128K (dynamic)"
      vram_usage: "~2.8GB VRAM (model + hadamard cache)"
      source: "kaitchup/Qwen3.5-4B-GGUF-MoQ (MoQ-3.75)"
      kv_cache: "q8_0 + q4_0 hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 4210000000
      context_length: 262144
      embedding_length: 2560
      quantization: MoQ-3.75
      note: "MoQ-3.75 replaces i1-Q4_K_M: 51% faster, 24% smaller, same quality. Mixture of Quants by Waleed Ahmad."
# -------------------------------------------
# QWEN3.5-9B - ik BACKEND (Hadamard KV cache)
# Dense 9B params, MoQ-3.6 ~3.75GB.
# MoQ-3.6: replaced UD-Q4_K_XL (~5.55GB) — same speed (12.2 tok/s),
# equal+ quality (21/25 Snake vs 20/25), 32% smaller.
# ik with hadamard cache gives near-fp16 quality at smaller memory footprint.
# --flash-attn auto: disables FA on short contexts for MoE/offload savings
# --parallel-tool-calls: enables multiple tool calls in single response
# Dual mode: base (chat, no think) and :think (reasoning)
# MTP tested but OOM on RTX 3050 6GB with --multi-token-prediction
# Bee backup: _disabled/qwen3.5-9b-bee.yaml (seg fault with turbo3_tcq)
# -------------------------------------------
  "qwen3.5-9b":
    name: "Qwen3.5 9B"
    description: "Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-MoQ-3.6.gguf
      --fit
      --fit-margin 512
      --jinja
      --parallel-tool-calls
      --ctx-size ${small_model_max_ctx}
      --timeout 0
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k q8_0
      --cache-type-v q4_0
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 180
    metadata:
      size: "~3.75 GB (MoQ-3.6)"
      context: "64K-128K (dynamic)"
      vram_usage: "~4.8GB VRAM (text-only, ik with hadamard cache)"
      source: "w-ahmad/Qwen3.5-9B-GGUF-MoQ (MoQ-3.6)"
      kv_cache: "q8_0 + q4_0 hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 8950000000
      context_length: 262144
      embedding_length: 4096
      quantization: MoQ-3.6
      note: "MoQ-3.6 replaces UD-Q4_K_XL: same speed (12.2 tok/s), equal+ quality (21/25 vs 20/25 Snake), 32% smaller (3.75 vs 5.55 GB). MTP OOM on 6GB VRAM."
# -------------------------------------------
# GEMMA-4-E4B - ik BACKEND (Hadamard KV cache)
# Upstream config with q4_0 cache. Bee/TurboQuant was slower (36 vs 40 tok/s).
# Switched from upstream to ik for -khad/-vhad quality improvement.
# Upgraded from UD-Q3_K_XL (3.5 bpw) → Q4_K_M (4.5 bpw): +0.36GB for ~3% PPL improvement
# -------------------------------------------
  "gemma4-e4b":
    name: "Gemma 4 E4B"
    description: "Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-Q4_K_M.gguf
      # No --no-mmproj: ik doesn't support this flag (upstream-only)
      --fit
      --fit-margin 512
      --jinja
      --parallel-tool-calls
      --ctx-size ${small_model_max_ctx}
      --timeout 0
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k q8_0
      --cache-type-v q4_0
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 180
    metadata:
      size: "~4.63 GB (Q4_K_M)"
      context: "64K-128K (dynamic)"
      vram_usage: "~5.3GB VRAM (fits with mmproj)"
      source: "unsloth/gemma-4-E4B-it-GGUF (Q4_K_M)"
      kv_cache: "q8_0 + q4_0 hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 7520000000
      context_length: 131072
      embedding_length: 2560
      quantization: Q4_K_M
      note: "Upgraded from UD-Q3_K_XL → Q4_K_M. Text-only (no mmproj). Tightest VRAM model — adding mmproj reduces ctx."
# -------------------------------------------
# GEMMA-4-E2B - Unsloth UD-Q4_K_XL (Dynamic 2.0 QAT)
# Unsloth Dynamic 2.0 quantization of Google QAT weights.
# Better accuracy than naive Q4_0: Top-1 98.16% vs 89.29%, 22% smaller.
# Uses UD-Q4_K_XL format — upstream llama.cpp only (NOT ik_llama).
# Text-only — no mmproj (vision handled by dedicated VLMs in fleet).
# -------------------------------------------
  "gemma4-e2b":
    name: "Gemma 4 E2B"
    description: "Gemma 4 E2B QAT — Unsloth Dynamic 2.0 (UD-Q4_K_XL). Higher accuracy and smaller than Google Q4_0."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E2B-it-qat-UD-Q4_K_XL.gguf
      --no-mmproj
      --fit on
      --fit-target 1024
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --timeout 0
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning on
      --cache-type-k ${gemma_cache_k}
      --cache-type-v ${gemma_cache_v}
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 120
    metadata:
      size: "~2.5 GB (UD-Q4_K_XL)"
      context: "32K-128K (dynamic)"
      vram_usage: "~2.5GB"
      source: "unsloth/gemma-4-E2B-it-qat-GGUF"
      kv_cache: "q4_0 + attn_rot"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 4650000000
      context_length: 131072
      embedding_length: 1536
      quantization: UD-Q4_K_XL
      note: "Unsloth Dynamic 2.0 QAT. Better accuracy than Google Q4_0 (Top-1 98.16% vs 89.29%), 22% smaller. Upstream only — NOT compatible with ik_llama."
# Edge vision-language model — 0.22 GB + 0.18 GB mmproj, fits entirely in VRAM
  "lfm2.5-vl-450m":
    name: "LFM2.5-VL 450M"
    description: "Edge vision-language model for image understanding, object detection, and captioning using LFM backbones and custom visual encoders."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-VL-450M-Q8_0.gguf
      --jinja
      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf
      --media-path ${media_path}
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --timeout 0
      --temp 0.1
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --reasoning off
      --cache-type-k f16
      --cache-type-v f16
      --flash-attn on
      --metrics
    ttl: 60
    metadata:
      size: "0.36 GB (Q8_0) + 0.18 GB mmproj"
      context: "32K-128K (dynamic)"
      vram_usage: "~0.5GB"
      source: "LiquidAI/LFM2.5-VL-450M-GGUF"
      kv_cache: "f16"
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2
      parameters: 354480000
      context_length: 128000
      embedding_length: 1024
      quantization: Q8_0
# -------------------------------------------
# GEMMA-4-26B-A4B - MoE REASONING + CODING (QAT Q4_0, upstream backend)
# Google Q4_0 Quantization-Aware Training — MoE 26B params, 4B active per token.
# QAT won vs APEX on 26B: quality=TIE, speed=28 vs 27 tok/s, size=14.4 vs 15.5 GB.
# APEX I-Compact deleted — crashes on ik (mul_mat_q_id CUDA illegal memory access).
# Upstream backend: --fit on handles compute buffer, --flash-attn on stable.
# --no-mmproj: text-only (mmproj crashes on CUDA, #21402)
# --ctx-size 131072: native 262144 too large for 6GB, 131072 fits with --fit on
# --fit-target 96: leave 96 MiB headroom for system/other processes
# --fit-ctx 16384: minimum pre-allocated context at startup
# Dual mode: base (chat, temp 0.7) and :think (reasoning, temp 1.0)
# head_dim=256 → attn_rot ✅, iSWA fix (b8815+) → q4_0 cache works now
# Note: upstream doesn't support --parallel-tool-calls. Jinja template handles tool calling.
# -------------------------------------------
  "gemma4-26b-a4b":
    name: "Gemma 4 26B"
    description: "Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-26B_q4_0-it.gguf
      --no-mmproj
      --fit on
      --fit-target 96
      --fit-ctx 16384
      --ctx-size 131072
      --timeout 0
      --temp 1.0
      --top-p 0.95
      --reasoning on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      --jinja
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.95
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 1.0
          top_p: 0.95
    ttl: 300
    health_check_timeout: 180
    metadata:
      size: "~14.4 GB (Q4_0 QAT)"
      context: "16K-131K (dynamic)"
      vram_usage: "~5GB VRAM + ~9GB RAM (upstream --fit on auto-offload)"
      source: "google/gemma-4-26B-A4B-it-qat-q4_0-gguf"
      kv_cache: "q4_0 + attn_rot"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 25230000000
      context_length: 262144
      embedding_length: 2816
      quantization: Q4_0_QAT
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA. Text-only."
# -------------------------------------------
# QWEN3.6-35B-A3B - MoE CODING (text-only, no vision) (APEX I-Compact)
# MoE 35B params, 3B ativo por token. Substitui o Qwen3-Coder-30B.
# 33 experts, top-8 routing. APEX I-Compact ~17.3GB
#   Mixed-precision MoE quant com imatrix diversa (chat, code, reasoning, tool-calling)
#   Perplexity comparable to Q8_0 (6.669 vs 6.533), beats UD-Q3_K_XL on real benchmarks
# --no-mmproj: mmproj ocupa 858MB VRAM e impede partial expert offload.
#   Sem mmproj: ALL 41 layers sobem pra GPU (partial expert partition) → 20+ t/s!
#   Com mmproj: só ~11 layers em GPU → ~5 t/s. Não vale a pena.
# KV cache: q4_0 + attn_rot (head_k=128, 128%64==0 ✅)
# Architecture: qwen35moe (Qwen3MoeForCausalLM)
# Using ik_llama.cpp: better MoE performance via pinned memory for expert offload
# --spec-type mtp:n_max=1,p_min=0.0: MTP now supported for Qwen3.5-MoE. Replaces legacy --multi-token-prediction flag.
# --fit-margin 768: reserves ~0.75 GiB for desktop (Hyprland+browser+Kitty ~1.1GB idle)
#   Keeps model at ~80-83% VRAM, more GPU layers than 1536 for faster generation
#   Tested: densos aguentaram 85% sem issues, MoE should be fine at ~80%
# --k-cache-hadamard / --v-cache-hadamard: Hadamard transform before K/V cache quantization → much closer to f16 quality
# --defer-experts: defers expert mmap on Linux → faster model loading
# --flash-attn auto: disables FA on short prompts (saves overhead on MoE offloaded models)
# -------------------------------------------
  "qwen3.6-35b-a3b":
    name: "Qwen 3.6 35B"
    description: "Qwen3.6 delivers substantial upgrades in agentic coding and thinking preservation. Built on direct community feedback for a more intuitive, responsive, and productive coding experience."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.6-35B-A3B-APEX-I-Compact.gguf
      # No --no-mmproj: ik_llama.cpp doesn't support this flag (upstream-only)
      # No --fit-ctx: ik_llama.cpp doesn't support this flag; --ctx-size serves as ceiling
      --fit
      --fit-margin 768
      --ctx-size 131072
      --timeout 0
      --temp ${code_temp}
      --top-p ${code_top_p}
      --top-k ${code_top_k}
      --min-p ${code_min_p}
