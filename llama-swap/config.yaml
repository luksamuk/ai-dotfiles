        --model ${models_dir}/Ministral-3-3B-Instruct-2512-UD-Q5_K_XL.gguf
        --fit on
        --fit-ctx 8192
        --ctx-size 131072
        --parallel 4
        --cont-batching
        --temp ${default_temp}
        --top-p ${default_top_p}
        --top-k ${default_top_k}
        --min-p ${default_min_p}
        --repeat-penalty ${default_repeat_penalty}
