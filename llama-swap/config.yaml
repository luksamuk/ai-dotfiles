# -------------------------------------------
# MELLUM2-12B-A2.5B — JETBRAINS MoE CODING + REASONING
# MoE 12B params, 2.5B ativo por token. 64 experts, top-8 routing.
# GQA 32Q/4KV, sliding window 1024, vocab 98K
# Apache 2.0 license
# Variantes via setParamsByID: instruct (chat), :think (reasoning)
# ik_llama.cpp required — Mellum2 arch added in ik #1919, split mode in #1920
# Upstream llama.cpp also supports Mellum (added b9484 PR #23966)
# MoE offload much faster on ik — pin to ik_llama_server
# RTX 3050 6GB: --fit on with partial offload
# -------------------------------------------
  "mellum2-12b-a2.5b":
    name: "Mellum 2 12B"
    description: "JetBrains coding MoE — 12B total, 2.5B active. Excels at tool use, agentic workflows, code generation and reasoning."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Mellum2-12B-A2.5B-Thinking-Q4_K_M.gguf
      --jinja
      --parallel 2
      --fit
      --fit-margin 512
      --ctx-size 131072
      --timeout 0
      --temp 0.6
      --top-p 0.95
      --top-k 20
      --min-p 0.1
      --repeat-penalty 1.05
      --reasoning on
      --parallel-tool-calls
      --cache-type-k q8_0
      --cache-type-v q4_0
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p, top_k"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.95
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.95
    ttl: 300
    health_check_timeout: 300
    capabilities:
      in:
        - 'text'
      out:
        - 'text'
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: "~7.6 GB (Q4_K_M)"
      context: "16K-131K (dynamic)"
      vram_usage: "~4.5GB VRAM + ~3GB RAM (partial expert offload)"
      source: "RJ000/Mellum2-12B-A2.5B-Thinking-GGUF (Q4_K_M)"
      note: "Community quant (RJ000). ik-pinned since #1919 (Mellum2 arch + split mode). MoE offload optimized."
      caveat: "GGUF Thinking always produces reasoning. Base variant (enable_thinking: false) leaks inline text — use :think for clean separation (reasoning_content). Parallel tool calls work with --parallel-tool-calls. Occasional content leakage before tool calls on ambiguous prompts."
      kv_cache: "q8_0 + q4_0"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: mellum
      parameters: 12000000000
      context_length: 131072
      embedding_length: 2304
      quantization: Q4_K_M
# -------------------------------------------
# NOMIC-EMBED-TEXT-V2-MOE - UPSTREAM BACKEND (embedding model)
# 475M params (305M active, MoE top-2/8 experts), 768-dim embeddings with Matryoshka → 256
# Architecture: nomic-bert — supported in upstream llama.cpp
# Embedding model — use via /v1/embeddings endpoint for RAG, semantic search, similarity
# NOT a chat model — --embeddings flag required, --pooling mean for proper embeddings
# Input prefix required: "search_query: " for queries, "search_document: " for documents
# 512 max context — short but sufficient for most embedding tasks
# 100+ language support (multilingual)
# --cont-batching: safe for embedding (no generation, just encoding)
# KV cache: f16 — embedding models benefit from precision, not compression
# -------------------------------------------
  "nomic-embed-text-v2-moe":
    name: "Nomic Embed v2"
    description: "Multilingual MoE text embedding model that excels at multilingual retrieval, supporting ~100 languages with state-of-the-art performance at the 300M parameter scale."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/nomic-embed-text-v2-moe-Q4_K_M.gguf
      --embeddings
      --pooling mean
      --ctx-size 512
      --timeout 0
      --cont-batching
      --cache-type-k f16
      --cache-type-v f16
      --flash-attn on
      --metrics
    ttl: 300
    capabilities:
      in:
        - 'text'
      out: []
      tools: false
      reranker: false
      context: 512
    metadata:
      architecture: nomic-bert
      parameters: 475000000
      context_length: 512
      embedding_length: 768
      quantization: Q4_K_M
      size: "~0.33 GB (Q4_K_M)"
      vram_usage: "~0.5GB"
      source: "nomic-ai/nomic-embed-text-v2-moe-GGUF (Q4_K_M)"
      kv_cache: "f16"
      features:
        completion: false
        tools: false
        thinking: false
        vision: false
        embedding: true
        insert: false
        audio: false
        image: false
      note: "Embedding-only model. Use /v1/embeddings endpoint. Prefix inputs with 'search_query: ' or 'search_document: '. 100+ languages. Matryoshka → 256 dims."
