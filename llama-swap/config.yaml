# Chat template built into GGUF — ⚠️ NEVER use custom chat template
# -------------------------------------------
  "minicpm5-1b-agentic":
    name: "MiniCPM5 1B Agentic"
    description: "MiniCPM5-1B fine-tuned with Nemotron SFT+DPO traces for agentic tool use. Dense 1B Transformer for on-device assistants and tool-calling workflows."
