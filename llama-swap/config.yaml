        features:
            thinking: false
            vision: false
            tools: true
        warning: "Uses mistral3 arch — ONLY runs on llama.cpp upstream, NOT ik_llama.cpp. Vision disabled: mmproj crashes with CUDA OOM on mistral3. --n-gpu-layers 99 causes OOM with 131K ctx, use --fit on instead."

  # -------------------------------------------
  # WEBWORLD-8B — Web World Model (Qwen3-8B fine-tune)
  # Qwen/WebWorld-8B — predicts next web page state given current state + action
