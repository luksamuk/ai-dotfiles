    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/Qwen3-ASR-0.6B-Q8_0.gguf\n--mmproj ${models_dir}/mmproj-Qwen3-ASR-0.6B-Q8_0.gguf\n--jinja\n--fit on\n--fit-target 768\n--fit-ctx ${small_model_min_ctx}\n--ctx-size ${small_model_max_ctx}\n--parallel 1\n--cont-batching\n--temp ${default_temp}\n--top-p ${default_top_p}\n--top-k ${default_top_k}\n--min-p ${default_min_p}\n--repeat-penalty ${default_repeat_penalty}\n--cache-type-k ${small_cache_k}\n--cache-type-v ${small_cache_v}\n--flash-attn on\n--spec-type ngram-mod\n  --spec-ngram-mod-n-match 24\n  --spec-ngram-mod-n-min 48\n  --spec-ngram-mod-n-max 64\n  --metrics\n"
    health_check_timeout: 300
    ttl: 60
