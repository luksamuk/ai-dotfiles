# llama-swap configuration for RTX 3050 Laptop (6GB VRAM)
# Configuração otimizada para uso com --fit automático
#
# Repositório: ~/git/ai-dotfiles/llama-swap/
# Modelos: ~/.llama-models/

# Schema para validação (VS Code)
# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json

healthCheckTimeout: 300
logLevel: info
logTimeFormat: "rfc3339"
logToStdout: "proxy"
captureBuffer: 15
startPort: 10001
sendLoadingState: false
includeAliasesInList: false
globalTTL: 0

# Macros reutilizáveis
macros:
  "models_dir": "${env.HOME}/.llama-models"
  
  # Caminho para o llama-server compilado com CUDA (--fit disponível)
  # Build local em ~/git/llama.cpp/build/bin/llama-server
  "llama_server": "${env.HOME}/git/llama.cpp/build/bin/llama-server"
  
  # ===========================================
  # PARÂMETROS DE INFERÊNCIA (baseados no Unsloth)
  # ===========================================
  # Qwen3.5: temp 0.6-0.7, top_p 0.8-0.9, top_k 20-40
  # Nemotron: temp 0.6, top_p 0.9
  # Gemma: temp 0.7, top_p 0.9
  # Referência: https://unsloth.ai/docs/models/qwen3.5
  # ===========================================
  
  # Parâmetros padrão (uso geral)
  "default_temp": "0.7"
  "default_top_p": "0.9"
  "default_top_k": "20"
  "default_min_p": "0.01"
  "default_repeat_penalty": "1.05"
  
  # Parâmetros para código/tool-calling (mais determinístico)
  "code_temp": "0.6"
  "code_top_p": "0.85"
  "code_top_k": "40"
  "code_min_p": "0.02"
  "code_repeat_penalty": "1.05"
  
  # Parâmetros para thinking/reasoning
  "think_temp": "0.6"
  "think_top_p": "0.9"
  "think_top_k": "20"
  "think_min_p": "0.0"
  "think_repeat_penalty": "1.0"
  
  # Contexto para modelos pequenos (cabem inteiros na VRAM)
  # fit-ctx: mínimo garantido, ctx-size: máximo teto
  "small_model_min_ctx": "32768"   # 32K mínimo
  "small_model_max_ctx": "131072"  # 128K máximo
  
  # Contexto para modelos grandes (requerem offload)
  "large_model_min_ctx": "16384"   # 16K mínimo
  "large_model_max_ctx": "131072"  # 128K máximo
  
  # Margem de segurança para VRAM (MiB) - usada pelo --fit-target
  "vram_margin": "512"


# ===========================================
# MODELOS (nomes estilo Ollama: modelo:tamanho)
# ===========================================
models:
  # -------------------------------------------
  # QWEN3.5-4B - CABE INTEIRO NA VRAM
  # Melhor para: tarefas rápidas, código, suma
  # VRAM: ~3GB com contexto
  # -------------------------------------------
  "qwen3.5-4b":
    name: "Qwen3.5 4B"
    description: "Qwen3.5-4B Q4_K_M - Uso geral, rápido e leve"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-4B-Q4_K_M.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning off
      --flash-attn on
    ttl: 60
    aliases:
      - "qwen3.5-4b"
      - "qwen3.5-4b-q4"
    metadata:
      size: "2.63 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/Qwen3.5-4B-GGUF"

  # -------------------------------------------
  # QWEN3.5-4B THINKING - Com reasoning
  # Melhor para: raciocínio, problemas complexos
  # Usa --reasoning auto para suporte a thinking
  # -------------------------------------------
  "qwen3.5-4b-think":
    name: "Qwen3.5 4B Thinking"
    description: "Qwen3.5-4B Q4_K_M - Com reasoning/thinking"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-4B-Q4_K_M.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp ${think_temp}
      --top-p ${think_top_p}
      --top-k ${think_top_k}
      --min-p ${think_min_p}
      --repeat-penalty ${think_repeat_penalty}
      --reasoning auto
      --flash-attn on
    ttl: 60
    aliases:
      - "qwen3.5-4b-think"
      - "qwen3.5-4b-reasoning"
    metadata:
      size: "2.63 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/Qwen3.5-4B-GGUF"
      features:
        thinking: true

  # -------------------------------------------
  # QWEN3.5-9B - REQUER OFFLOAD PARCIAL
  # Melhor para: raciocínio complexo, respostas longas
  # VRAM: ~5GB + RAM para offload
  # -------------------------------------------
  "qwen3.5-9b":
    name: "Qwen3.5 9B"
    description: "Qwen3.5-9B Q4_K_M - Uso geral, maior capacidade"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-Q4_K_M.gguf
      --fit on
      --fit-target 256
      --fit-ctx ${large_model_min_ctx}
      --ctx-size ${large_model_max_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning off
      --flash-attn on
    ttl: 60
    aliases:
      - "qwen3.5-9b"
      - "qwen3.5-9b-q4"
    metadata:
      size: "5.68 GB"
      context: "16K-128K (dynamic)"
      vram_usage: "~5GB + RAM offload"
      source: "unsloth/Qwen3.5-9B-GGUF"

  # -------------------------------------------
  # QWEN3.5-9B THINKING - Com reasoning
  # Melhor para: raciocínio profundo, matemática, lógica
  # -------------------------------------------
  "qwen3.5-9b-think":
    name: "Qwen3.5 9B Thinking"
    description: "Qwen3.5-9B Q4_K_M - Com reasoning/thinking"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-Q4_K_M.gguf
      --fit on
      --fit-target 256
      --fit-ctx ${large_model_min_ctx}
      --ctx-size ${large_model_max_ctx}
      --temp ${think_temp}
      --top-p ${think_top_p}
      --top-k ${think_top_k}
      --min-p ${think_min_p}
      --repeat-penalty ${think_repeat_penalty}
      --reasoning auto
      --flash-attn on
    ttl: 60
    aliases:
      - "qwen3.5-9b-think"
      - "qwen3.5-9b-reasoning"
    metadata:
      size: "5.68 GB"
      context: "16K-128K (dynamic)"
      vram_usage: "~5GB + RAM offload"
      source: "unsloth/Qwen3.5-9B-GGUF"
      features:
        thinking: true

  # -------------------------------------------
  # GEMMA-4-E4B - REQUER OFFLOAD PARCIAL
  # Melhor para: uso geral, multilíngue
  # VRAM: ~4.5GB + RAM para offload
  # -------------------------------------------
  "gemma4-e4b":
    name: "Gemma 4 E4B"
    description: "Gemma-4 Efficient 4B Q4_K_M - Uso geral, multilíngue"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-Q4_K_M.gguf
      --fit on
      --fit-target 256
      --fit-ctx ${large_model_min_ctx}
      --ctx-size ${large_model_max_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --min-p 0.01
      --repeat-penalty 1.0
      --reasoning off
      --flash-attn on
    ttl: 60
    aliases:
      - "gemma4-e4b"
      - "gemma-4-e4b"
    metadata:
      size: "4.98 GB"
      context: "16K-128K (dynamic)"
      vram_usage: "~4.5GB + RAM offload"
      source: "unsloth/gemma-4-E4B-it-GGUF"

  # -------------------------------------------
  # GEMMA-4-E4B THINKING - Com reasoning
  # Melhor para: raciocínio, problemas complexos
  # -------------------------------------------
  "gemma4-e4b-think":
    name: "Gemma 4 E4B Thinking"
    description: "Gemma-4 Efficient 4B Q4_K_M - Com reasoning"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-Q4_K_M.gguf
      --fit on
      --fit-target 256
      --fit-ctx ${large_model_min_ctx}
      --ctx-size ${large_model_max_ctx}
      --temp ${think_temp}
      --top-p ${think_top_p}
      --top-k ${think_top_k}
      --min-p ${think_min_p}
      --repeat-penalty ${think_repeat_penalty}
      --reasoning auto
      --flash-attn on
    ttl: 60
    aliases:
      - "gemma4-e4b-think"
      - "gemma-4-e4b-think"
    metadata:
      size: "4.98 GB"
      context: "16K-128K (dynamic)"
      vram_usage: "~4.5GB + RAM offload"
      source: "unsloth/gemma-4-E4B-it-GGUF"
      features:
        thinking: true

  # -------------------------------------------
  # GEMMA-4-E2B - CABE INTEIRO NA VRAM
  # Melhor para: uso geral, mais rápido que E4B
  # VRAM: ~3GB com contexto
  # -------------------------------------------
  "gemma4-e2b":
    name: "Gemma 4 E2B"
    description: "Gemma-4 Efficient 2B Q4_K_M - Compacto e rápido"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E2B-it-Q4_K_M.gguf
