    lfmcol: lfm2.5-colbert-350m
  sets:
    small_vision: (q4 | lfm230 | lfm8) & vl & (nomic | lfmemb | lfmcol)
    small_embed: (q4 | lfm230 | lfm8) & (nomic | lfmemb | lfmcol)
    small_only: q4 | lfm230 | lfm8 | m5a
    vision_only: vl | vl16 | ocr | qwvl
    vision_embed: (vl | vl16 | ocr | qwvl) & (nomic | lfmemb | lfmcol)
    medium: (q9 | g4) & (nomic | lfmemb | lfmcol)
    heavy: (orn35 | aw | glm | bonsai1) & (nomic | lfmemb | lfmcol)
    translate_embed: hmt & (nomic | lfmemb | lfmcol)
    translate_only: hmt
    tts_external: ttsext
    embed_only: nomic | lfmemb | lfmcol
    rerank_only: lfmcol
    rerank_embed: lfmcol & (nomic | lfmemb)
  evict_costs:
    orn35: 9
    aw: 9
    glm: 9
    bonsai1: 7
    q9: 4
    g4: 4
    ttsext: 4
    vl: 3
    ocr: 3
    qwvl: 3
    vl16: 2
    q4: 2
    lfm8: 2
    asr: 2
    nomic: 1
    lfmemb: 1
    lfmcol: 1
    lfm230: 1
    m5a: 1
    hmt: 1
