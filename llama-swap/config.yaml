healthCheckTimeout: 300
logLevel: info
logTimeFormat: rfc3339
logToStdout: proxy
captureBuffer: 15
startPort: 10001
sendLoadingState: false
includeAliasesInList: true
globalTTL: 0
macros:
  models_dir: ${env.HOME}/.llama-models
  media_path: ${env.HOME}/testfiles/vision
  llama_server: ${env.HOME}/git/llama.cpp/build/bin/llama-server
  ik_llama_server: ${env.HOME}/git/ik_llama.cpp/build/bin/llama-server
  bee_server: ${env.HOME}/git/beellama.cpp/build/bin/llama-server
  vllm_bin: ${env.HOME}/.vllm/bin/vllm
  default_temp: '0.7'
  default_top_p: '0.9'
  default_top_k: '20'
  default_min_p: '0.01'
  default_repeat_penalty: '1.05'
  code_temp: '0.6'
  code_top_p: '0.85'
  code_top_k: '40'
  code_min_p: '0.02'
  code_repeat_penalty: '1.05'
  think_temp: '0.6'
  think_top_p: '0.9'
  think_top_k: '20'
  think_min_p: '0.0'
  think_repeat_penalty: '1.0'
  small_model_min_ctx: '65536'
  small_model_max_ctx: '131072'
  large_model_min_ctx: '65536'
  large_model_max_ctx: '131072'
  vram_margin: '512'
  small_cache_k: q8_0
  small_cache_v: q8_0
  large_cache_k: q4_0
  large_cache_v: q4_0
  gemma_cache_k: q4_0
  gemma_cache_v: q4_0
models:
  qwen3.5-4b:
    name: Qwen3.5 4B
    description: Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning.
    cmd: '${bee_server} --port ${PORT}

      --model ${models_dir}/Qwen3.5-4B-abliterated.i1-Q4_K_M.gguf

      --spec-draft-model ${models_dir}/qwen35-4b-dflash-Q4_K_M.gguf

      --spec-type dflash

      --spec-draft-ngl all

      --spec-dflash-cross-ctx 512

      --spec-draft-n-max 8

      --spec-branch-budget 0

      --jinja

      --parallel 1

      -ngl all

      --ctx-size 32768

      --temp ${default_temp}

      --top-p ${default_top_p}

      --top-k ${default_top_k}

      --min-p ${default_min_p}

      --repeat-penalty ${default_repeat_penalty}

      --reasoning on

      --cache-type-k q4_0

      --cache-type-v q4_0

      --flash-attn on

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 32768
    metadata:
      size: ~2.9 GB (Q4_K_M + DFlash drafter)
      context: '32K (DFlash max on 6GB: 4782 MiB. 98K needs 5678 MiB — doesn''t fit even alone)'
      vram_usage: ~4.8GB VRAM (model 2.6GB + drafter 313MB + DFlash ring + q4_0 cache 32K)
      source: Qwen3.5-4B-abliterated i1-Q4_K_M + Anbeeld/Qwen3.5-4B-DFlash-GGUF
      kv_cache: q4_0 (BeeLlama.cpp)
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 4210000000
      context_length: 32768
      embedding_length: 2560
      quantization: i1-Q4_K_M + DFlash Q4_K_M
      note: DFlash speculative decoding via BeeLlama. 1.64x faster than ik+MoQ (86 vs 53 tok/s). Flat DFlash (branch-budget=0), adaptive draft-max (profit controller). Tool calling + thinking tested OK.
  qwen3.5-9b:
    name: Qwen3.5 9B
    description: Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/Qwen3.5-9B-MoQ-3.6.gguf

      --fit

      --fit-margin 512

      --jinja

      --parallel 2

      --parallel-tool-calls

      --ctx-size ${small_model_max_ctx}

      --temp ${default_temp}

      --top-p ${default_top_p}

      --top-k ${default_top_k}

      --min-p ${default_min_p}

      --repeat-penalty ${default_repeat_penalty}

      --reasoning on

      --cache-type-k q8_0

      --cache-type-v q4_0

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~3.75 GB (MoQ-3.6)
      context: 64K-128K (dynamic)
      vram_usage: ~4.8GB VRAM (text-only, ik with hadamard cache)
      source: w-ahmad/Qwen3.5-9B-GGUF-MoQ (MoQ-3.6)
      kv_cache: q8_0 + q4_0 hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 8950000000
      context_length: 262144
      embedding_length: 4096
      quantization: MoQ-3.6
      note: 'MoQ-3.6 replaces UD-Q4_K_XL: same speed (12.2 tok/s), equal+ quality (21/25 vs 20/25 Snake), 32% smaller (3.75 vs 5.55 GB). MTP OOM on 6GB VRAM.'
  gemma4-e4b:
    name: Gemma 4 E4B
    description: Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/gemma-4-E4B-it-Q4_K_M.gguf

      # No --no-mmproj: ik doesn''t support this flag (upstream-only)

      --fit

      --fit-margin 512

      --jinja

      --parallel 2

      --parallel-tool-calls

      --ctx-size ${small_model_max_ctx}

      --temp 0.7

      --top-p 0.9

      --top-k 40

      --min-p 0.01

      --repeat-penalty 1.0

      --reasoning on

      --cache-type-k q8_0

      --cache-type-v q4_0

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~4.63 GB (Q4_K_M)
      context: 64K-128K (dynamic)
      vram_usage: ~5.3GB VRAM (fits with mmproj)
      source: unsloth/gemma-4-E4B-it-GGUF (Q4_K_M)
      kv_cache: q8_0 + q4_0 hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 7520000000
      context_length: 131072
      embedding_length: 2560
      quantization: Q4_K_M
      note: Upgraded from UD-Q3_K_XL → Q4_K_M. Text-only (no mmproj). Tightest VRAM model — adding mmproj reduces ctx.
  gemma4-e2b:
    name: Gemma 4 E2B
    description: Gemma 4 E2B QAT — Unsloth Dynamic 2.0 (UD-Q4_K_XL). Higher accuracy and smaller than Google Q4_0.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/gemma-4-E2B-it-qat-UD-Q4_K_XL.gguf

      --no-mmproj

      --fit on

      --fit-target 1024

      --fit-ctx ${small_model_min_ctx}

      --ctx-size ${small_model_max_ctx}

      --parallel 4

      --temp 0.7

      --top-p 0.9

      --top-k 40

      --min-p 0.01

      --repeat-penalty 1.0

      --reasoning on

      --cache-type-k ${gemma_cache_k}

      --cache-type-v ${gemma_cache_v}

      --flash-attn on

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~2.5 GB (UD-Q4_K_XL)
      context: 32K-128K (dynamic)
      vram_usage: ~2.5GB
      source: unsloth/gemma-4-E2B-it-qat-GGUF
      kv_cache: q4_0 + attn_rot
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 4650000000
      context_length: 131072
      embedding_length: 1536
      quantization: UD-Q4_K_XL
      note: Unsloth Dynamic 2.0 QAT. Better accuracy than Google Q4_0 (Top-1 98.16% vs 89.29%), 22% smaller. Upstream only — NOT compatible with ik_llama.
  lfm2.5-vl-450m:
    name: LFM2.5-VL 450M
    description: Edge vision-language model for image understanding, object detection, and captioning using LFM backbones and custom visual encoders.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/LFM2.5-VL-450M-Q8_0.gguf

      --jinja

      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf

      --media-path ${media_path}

      --fit on

      --fit-target ${vram_margin}

      --fit-ctx ${small_model_min_ctx}

      --ctx-size ${small_model_max_ctx}

      --temp 0.1

      --top-p 0.9

      --top-k 40

      --min-p 0.15

      --repeat-penalty 1.05

      --reasoning off

      --cache-type-k f16

      --cache-type-v f16

      --flash-attn on

      --metrics

      '
    health_check_timeout: 300
    ttl: 60
    capabilities:
      in:
      - text
      - image
      out:
      - text
      tools: false
      reranker: false
      context: 131072
    metadata:
      size: 0.36 GB (Q8_0) + 0.18 GB mmproj
      context: 32K-128K (dynamic)
      vram_usage: ~0.5GB
      source: LiquidAI/LFM2.5-VL-450M-GGUF
      kv_cache: f16
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2
      parameters: 354480000
      context_length: 128000
      embedding_length: 1024
      quantization: Q8_0
  qwen3.6-35b-a3b:
    name: Qwen 3.6 35B
    description: Qwen3.6 delivers substantial upgrades in agentic coding and thinking preservation. Built on direct community feedback for a more intuitive, responsive, and productive coding experience.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/Qwen3.6-35B-A3B-APEX-I-Compact.gguf

      # No --mmproj: vision crashes on 6GB RTX 3050 (CLIP compute graph OOM). Text-only = stable 33-34 t/s.

      # No --fit-ctx: ik_llama.cpp doesn''t support this flag; --ctx-size serves as ceiling

      --fit

      --fit-margin 768

      --ctx-size 131072

      --temp ${code_temp}

      --top-p ${code_top_p}

      --top-k ${code_top_k}

      --min-p ${code_min_p}

      --repeat-penalty ${code_repeat_penalty}

      --reasoning on

      --jinja

      --parallel 1

      --parallel-tool-calls

      --cache-type-k ${large_cache_k}

      --cache-type-v ${large_cache_v}

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --defer-experts

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.85
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 300
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~17.3 GB (APEX I-Compact)
      context: 1K-131K (safe max; 200K works but zero VRAM headroom)
      vram_usage: ~5.4GB VRAM + 13.8GB pinned RAM (ik pinned memory, stable 33-34 t/s up to 131K)
      source: mudler/Qwen3.5-35B-A3B-APEX-GGUF
      kv_cache: q4_0 + attn_rot + hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35moe
      parameters: 34660000000
      context_length: 262144
      embedding_length: 2048
      quantization: I-Compact
      note: Vision blocked — mmproj loads fine (858 MiB F16, ~28 t/s text) but CLIP compute graph OOMs on 6GB RTX 3050 at inference time. Reverted to text-only (33-34 t/s, stable).
  ornith-1.0-35b:
    name: Ornith 1.0 35B
    description: Ornith-1.0 is a family of open-source LLMs specialized for agentic coding, trained with a novel self-scaffolding reinforcement learning approach that jointly optimizes the scaffold and the solution.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/ornith-1.0-35b/ornith-1.0-35b-Q4_K_M.gguf

      --fit

      --fit-margin 512

      --ctx-size 131072

      --temp ${code_temp}

      --top-p ${code_top_p}

      --top-k ${code_top_k}

      --min-p ${code_min_p}

      --repeat-penalty ${code_repeat_penalty}

      --reasoning on

      --jinja

      --parallel 1

      --parallel-tool-calls

      --cache-type-k ${large_cache_k}

      --cache-type-v ${large_cache_v}

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --defer-experts

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.85
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 300
    health_check_timeout: 300
    capabilities:
      in:
      - text
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~21.2 GB (Q4_K_M)
      context: 1K-131K (safe max)
      vram_usage: ~5.4GB VRAM + ~16GB pinned RAM (ik pinned memory, estimated 25-30 t/s)
      source: deepreinforce-ai/Ornith-1.0-35B-GGUF
      kv_cache: q4_0 + attn_rot + hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35moe
      parameters: 35000000000
      context_length: 262144
      embedding_length: 2048
      quantization: Q4_K_M
      note: Post-trained Qwen 3.5 35B MoE. Self-scaffolding RL for agentic coding. 256 experts, 8+1 active, ~3B active/token. 3.9GB larger than Qwen 3.6 APEX — expect lower tok/s from extra offload.
  agentworld-35b:
    name: Qwen AgentWorld 35B
    description: Qwen's native language world model. 35B params, 3B active. Simulates 7 agent environments (MCP, Search, Terminal, SWE, Android, Web, OS) via long chain-of-thought reasoning. Trained from CPT onward for environment modeling.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/agentworld-35b/Qwen-AgentWorld-35B-A3B-Q4_K_M.gguf

      --fit

      --fit-margin 768

      --ctx-size 32768

      --temp ${think_temp}

      --top-p ${think_top_p}

      --top-k ${think_top_k}

      --min-p ${think_min_p}

      --repeat-penalty ${think_repeat_penalty}

      --reasoning on

      --jinja

      --parallel 1

      --cache-type-k ${large_cache_k}

      --cache-type-v ${large_cache_v}

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --defer-experts

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.95
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.95
    ttl: 600
    health_check_timeout: 600
    capabilities:
      in:
      - text
      out:
      - text
      tools: false
      reranker: false
      context: 32768
    metadata:
      size: ~20 GB (Q4_K_M)
      context: 4K-32K (fit dynamic, 256K native)
      vram_usage: ~5GB VRAM + ~15GB RAM (CPU offload, ik --fit)
      source: groxaxo/Qwen-AgentWorld-35B-A3B-GGUF
      kv_cache: q4_0 + hadamard (ik optimized)
      domains: MCP, Search, Terminal, SWE, Android, Web, OS
      features:
        completion: true
        tools: false
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35moe
      parameters: 35000000000
      context_length: 262144
      embedding_length: 2048
      quantization: Q4_K_M
      note: World model — simulates 7 agent environments. Use with worldsim CLI. Thinking mode recommended for simulation fidelity. 32K ctx for VRAM safety (256K native but needs 128K+ for multi-turn trajectories).
  minicpm-v-4.6:
    name: MiniCPM-V 4.6
    description: A series of multimodal LLMs designed for vision-language understanding, with strong OCR capability, multi-image understanding, and efficient visual token processing.
    tags:
    - vision
    cmd: "${llama_server} --port ${PORT}\n--model ${models_dir}/MiniCPM-V-4_6-Q5_K_M.gguf\n--mmproj ${models_dir}/mmproj-MiniCPM-V-4.6-F16.gguf\n--media-path ${media_path}\n--jinja\n--fit on\n--fit-ctx 8192\n--ctx-size 262144\n  --parallel 4\n--cont-batching\n--temp ${default_temp}\n--top-p 0.8\n--top-k 100\n--min-p ${default_min_p}\n--repeat-penalty 1.05\n--reasoning on\n--cache-type-k f16\n--cache-type-v f16\n--flash-attn on\n--metrics\n"
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    capabilities:
      in:
      - text
      - image
      out:
      - text
      tools: false
      reranker: false
      context: 262144
    metadata:
      size: 0.55 GB (Q5_K_M) + 1.1 GB mmproj
      context: 8K-256K (dynamic)
      vram_usage: ~2GB (model + mmproj + cache)
      source: openbmb/MiniCPM-V-4.6-gguf
      kv_cache: f16
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 752160000
      context_length: 262144
      embedding_length: 1024
      quantization: Q5_K_M
  gemma4-12b:
    name: Gemma 4 12B
    description: Gemma 4 12B QAT (Q4_0) — Unified multimodal (vision + audio). Won vs PTQ on ik (25 vs 24/25 Snake). Upstream --fit on for 128K ctx with mmproj.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/gemma-4-12b-it-qat-q4_0.gguf

      --mmproj ${models_dir}/mmproj-gemma-4-12b-it-qat-q4_0.gguf

      --fit on

      --fit-target 768

      --fit-ctx 8192

      --ctx-size 131072

      --jinja

      --parallel 2

      --reasoning on

      --cache-type-k q4_0

      --cache-type-v q4_0

      --flash-attn on

      --min-p 0.01

      --repeat-penalty 1.05

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 1.2
          top_p: 0.95
    ttl: 300
    health_check_timeout: 300
    capabilities:
      in:
      - text
      - image
      - audio
      out:
      - text
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: ~6.7 GB (Q4_0 QAT + 168 MB mmproj)
      context: 8K-128K (dynamic)
      vram_usage: ~5GB VRAM + ~354 MB mmproj (upstream --fit on)
      source: google/gemma-4-12B-it-qat-q4_0-gguf
      kv_cache: q4_0 + attn_rot
      features:
        completion: true
        tools: true
        thinking: true
        vision: true
        embedding: false
        insert: false
        audio: true
        image: false
      architecture: gemma4
      parameters: 12000000000
      context_length: 262144
      embedding_length: 3072
      quantization: Q4_0_QAT
  glm-ocr:
    name: GLM-OCR
    description: Multimodal OCR model for complex document understanding, built on the GLM-V encoder-decoder architecture integrating CogViT visual encoder with a GLM-0.5B language decoder.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/GLM-OCR-Q8_0.gguf

      --mmproj ${models_dir}/mmproj-GLM-OCR-Q8_0.gguf

      --jinja

      --media-path ${media_path}

