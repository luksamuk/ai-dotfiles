      kv_cache: f16
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: true
      architecture: lfm2
      parameters: 450000000
      context_length: 128000
      embedding_length: 1024
      quantization: Q8_0
  minicpm5-1b-agentic:
