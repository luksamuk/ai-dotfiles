# llama-swap configuration for RTX 3050 Laptop (6GB VRAM)
# Configuração otimizada para uso com --fit automático
#
# Repositório: ~/git/ai-dotfiles/llama-swap/
# Modelos: ~/.llama-models/

# Schema para validação (VS Code)
# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json

healthCheckTimeout: 300
logLevel: info
logTimeFormat: "rfc3339"
logToStdout: "proxy"
captureBuffer: 15
startPort: 10001
sendLoadingState: true
includeAliasesInList: false
globalTTL: 0

# Macros reutilizáveis
macros:
  "models_dir": "${env.HOME}/.llama-models"
  
  # Caminho para o llama-server compilado com CUDA (--fit disponível)
  # Build local em ~/git/llama.cpp/build/bin/llama-server
  "llama_server": "${env.HOME}/git/llama.cpp/build/bin/llama-server"
  
  # Parâmetros de inferência padrão
  "default_temp": "0.7"
  "default_top_p": "0.85"
  "default_top_k": "40"
  "default_repeat_penalty": "1.05"
  
  # Contexto adequado para 6GB VRAM
  "small_ctx": "8192"
  "medium_ctx": "16384"
  
  # Margem de segurança para VRAM (MiB) - usada pelo --fit-target
  "vram_margin": "512"


# ===========================================
# MODELOS (nomes estilo Ollama: modelo:tamanho)
# ===========================================
models:
  # -------------------------------------------
  # Qwen3.5-4B - CABE INTEIRO NA VRAM
  # Melhor para: tarefas rápidas, code completion
  # VRAM: ~3GB com contexto
  # -------------------------------------------
  "qwen3.5:4b":
    name: "Qwen3.5 4B"
    description: "Qwen3.5-4B Q4_K_M - Leve e rápido, cabe inteiro na VRAM"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-4B-Q4_K_M.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx 4096
      --ctx-size ${medium_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --repeat-penalty ${default_repeat_penalty}
      --flash-attn on
    ttl: 300
    aliases:
      - "qwen3.5-4b"
      - "qwen3.5-4b-q4"
    metadata:
      size: "2.63 GB"
      context: "16384"
      vram_usage: "~3GB"
      source: "unsloth/Qwen3.5-4B-GGUF"

  # -------------------------------------------
  # Qwen3.5-9B - REQUER OFFLOAD PARCIAL
  # Melhor para: raciocínio complexo, respostas longas
  # VRAM: ~5GB + RAM para offload
  # -------------------------------------------
  "qwen3.5:9b":
    name: "Qwen3.5 9B"
    description: "Qwen3.5-9B Q4_K_M - Maior capacidade, offload automático"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.5-9B-Q4_K_M.gguf
      --fit on
      --fit-target 256
      --fit-ctx 4096
      --ctx-size ${small_ctx}
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --repeat-penalty ${default_repeat_penalty}
      --flash-attn on
    ttl: 300
    aliases:
      - "qwen3.5-9b"
      - "qwen3.5-9b-q4"
    metadata:
      size: "5.68 GB"
      context: "8192"
      vram_usage: "~5GB + RAM offload"
      source: "unsloth/Qwen3.5-9B-GGUF"

  # -------------------------------------------
  # Gemma-4-E4B - REQUER OFFLOAD PARCIAL
  # Melhor para: uso geral, multilíngue
  # VRAM: ~4.5GB + RAM para offload
  # -------------------------------------------
  "gemma4:e4b":
    name: "Gemma 4 E4B"
    description: "Gemma-4 Efficient 4B Q4_K_M - Uso geral, multilíngue"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E4B-it-Q4_K_M.gguf
      --fit on
      --fit-target 256
      --fit-ctx 4096
      --ctx-size ${small_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --repeat-penalty 1.0
      --flash-attn on
    ttl: 300
    aliases:
      - "gemma4-e4b"
      - "gemma-4-e4b"
    metadata:
      size: "4.98 GB"
      context: "8192"
      vram_usage: "~4.5GB + RAM offload"
      source: "unsloth/gemma-4-E4B-it-GGUF"

  # -------------------------------------------
  # Gemma-4-E2B - CABE INTEIRO NA VRAM
  # Melhor para: uso geral, mais rápido que E4B
  # VRAM: ~3GB com contexto
  # -------------------------------------------
  "gemma4:e2b":
    name: "Gemma 4 E2B"
    description: "Gemma-4 Efficient 2B Q4_K_M - Compacto e rápido"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-E2B-it-Q4_K_M.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx 4096
      --ctx-size ${medium_ctx}
      --temp 0.7
      --top-p 0.9
      --top-k 40
      --repeat-penalty 1.0
      --flash-attn on
    ttl: 300
    aliases:
      - "gemma4-e2b"
      - "gemma-4-e2b"
    metadata:
      size: "3.11 GB"
      context: "16384"
      vram_usage: "~3GB"
      source: "unsloth/gemma-4-E2B-it-GGUF"

  # -------------------------------------------
  # Nemotron-3-Nano-4B - CABE INTEIRO NA VRAM
  # Melhor para: tool-calling, function calling
  # Excelente para aulas de IA/Guilda
  # VRAM: ~3GB com contexto
  # -------------------------------------------
  "nemotron-3-nano:4b":
    name: "Nemotron 3 Nano 4B"
    description: "NVIDIA Nemotron-3-Nano-4B Q4_K_M - Excelente para tool-calling"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/NVIDIA-Nemotron-3-Nano-4B-Q4_K_M.gguf
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx 4096
      --ctx-size ${medium_ctx}
      --temp 0.6
      --top-p 0.9
      --top-k 40
      --repeat-penalty 1.0
      --flash-attn on
    ttl: 300
    aliases:
      - "nemotron-4b"
      - "nemotron-3-nano-4b"
    metadata:
      size: "2.90 GB"
      context: "16384"
      vram_usage: "~3GB"
      source: "unsloth/NVIDIA-Nemotron-3-Nano-4B-GGUF"
      notes: "Excelente para tool-calling, ideal para aulas de IA"


# ============================================
# ALIASES (nomes alternativos para os modelos)
# ============================================
# Descomente se quiser aliases
# models:
#   "qwen3.5-4b":
#     aliases: ["qwen-4b", "qwen3.5-small"]
#   "qwen3.5-9b":
#     aliases: ["qwen-9b", "qwen3.5-medium"]
#   "gemma4-e4b":
#     aliases: ["gemma-4b", "gemma4-small"]


# ============================================
# GRUPOS
# ============================================
groups:
  "default":
    swap: true        # Só um modelo por vez
    exclusive: true   # Descarrega outros grupos ao ativar
    members:
      - "qwen3.5:4b"
      - "qwen3.5:9b"
      - "gemma4:e4b"
      - "gemma4:e2b"
      - "nemotron-3-nano:4b"


