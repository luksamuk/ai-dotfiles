# -------------------------------------------
# WEBWORLD-8B — Web World Model (Qwen3-8B fine-tune)
# Qwen/WebWorld-8B — predicts next web page state given current state + action
# Trained on 1M+ real web interaction trajectories
# Architecture: qwen3 — previously segfaulted in ik, FIXED in v4524+
# Supports: A11y Tree, HTML, XML, Markdown, NL state representations
# Action space: click(bid), fill(bid,text), goto(url), scroll(dx,dy), keyboard_press(key)
# NOT a chatbot — requires specialized prompt format (world model system prompt + state/action)
# Multi-turn trajectory simulation (30+ steps) must be implemented client-side
# Paper: arXiv 2602.14721
# i1-Q5_K_M ~5.9GB — fits in VRAM with --fit --fit-margin 768
# KV cache: q8_0 (K) + q4_0 (V) + hadamard = near-fp16 quality
# Migrated from upstream to ik for -khad/-vhad quality improvement
# No tool calling, no vision, no thinking — pure world model for web simulation
# Apache 2.0 license
# -------------------------------------------
  "webworld-8b":
    name: "WebWorld 8B"
    description: "World model predicting next page state from web browsing context — trained for web navigation and interaction understanding."
    tags:
      - "world-model"
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/WebWorld-8B.i1-Q5_K_M.gguf
      --fit
      --fit-margin 768
      --ctx-size 40960
      --parallel 2
      --cont-batching
      --temp 0.6
      --top-p 0.9
      --top-k 20
      --min-p 0.01
      --repeat-penalty 1.05
      --cache-type-k q8_0
      --cache-type-v q4_0
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --jinja
      --metrics
    ttl: 60
    metadata:
      size: "~5.9 GB (i1-Q5_K_M)"
      context: "4K-40K (dynamic, native max)"
      vram_usage: "~4GB model + KV q8_0+q4_0+hadoop ~80-83% VRAM"
      source: "mradermacher/WebWorld-8B-i1-GGUF (i1-Q5_K_M)"
      kv_cache: "q8_0 + q4_0 hadamard"
      features:
        completion: true
        tools: false
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen3
      parameters: 8190000000
      context_length: 40960
      embedding_length: 4096
      quantization: Q5_K_M
      warning: "Not a chatbot — requires specialized world model prompts."
# -------------------------------------------
# GEMMA-4-26B-A4B - MoE REASONING + CODING (APEX I-Compact)
# MoE 26B params, 4B ativo por token. 128 experts, top-8 routing.
# Google recomenda: temp=1.0 para reasoning, temp=0.7 para coding
# Variantes via setParamsByID: base (chat), :think (reasoning)
# APEX I-Compact ~15.5GB — mixed-precision MoE quant com imatrix diversa
#   (edges Q4_K, middle Q3_K, shared experts Q6_K, attention Q4_K)
#   Perplexity comparable to Q8_0, real-world benchmarks better than UD-Q3_K_XL
# head_dim=256 → attn_rot ✅, iSWA fix (b8815+) → q4_0 cache works now
# mmproj crashes on CUDA (bug #21402) → text-only
# Architecture: gemma4 (Gemma4ForCausalLM)
# Using ik_llama.cpp: better MoE performance via pinned memory for expert offload
# -------------------------------------------
  "gemma4-26b-a4b":
    name: "Gemma 4 26B MoE"
    description: "Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding."
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/gemma-4-26B-A4B-APEX-I-Compact.gguf
      --no-mmproj
      --fit on
      --fit-target 96
      --fit-ctx 16384
      --ctx-size 131072
      --jinja
      --temp ${gemma_temp}
      --top-p ${gemma_top_p}
      --top-k ${gemma_top_k}
      --min-p 0.01
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 1.0
          top_p: 0.95
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.95
    ttl: 300
    metadata:
      size: "~15.5 GB (APEX I-Compact)"
      context: "16K-128K (dynamic)"
      vram_usage: "~5GB VRAM + ~10GB RAM (q4_0 cache, APEX mixed-precision offload)"
      source: "mudler/gemma-4-26B-A4B-it-APEX-GGUF"
      kv_cache: "q4_0 + attn_rot"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 25230000000
      context_length: 262144
      embedding_length: 2816
      quantization: I-Compact
      warning: "Vision disabled — Gemma 4 mmproj crash on CUDA. Text-only."
# -------------------------------------------
# QWEN3.6-27B - ik BACKEND (Hadamard KV cache, mlock, heavy CPU offload)
# Dense 27B, state-of-the-art local LLM. Heavy offload on 6GB VRAM (~13/64 layers GPU).
# i1-Q3_K_M (importance matrix quant) ~12.4GB — smaller per layer = more GPU layers = better speed.
# i1 quants from mradermacher work with ik_llama.cpp (NOT Unsloth UD-XL which breaks).
# Qwen3.6 sampling: temp 0.6-0.7, top_p 0.8-0.9, top_k 20-40
# --mlock: pin model in RAM, prevent swap during heavy offload
# --k-cache-hadamard / --v-cache-hadamard: near-fp16 quality with q4_0 cache
# --flash-attn auto: disable FA on short contexts for savings
# Dual mode: base (chat, no think) and :think (reasoning)
# -------------------------------------------
  "qwen3.6-27b":
    name: "Qwen 3.6 27B"
    description: "Qwen3.6-27B is a dense 27B parameter model delivering frontier-level performance in reasoning, coding, and multilingual tasks."
    cmd: |-
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.6-27B.i1-Q3_K_M.gguf
      --mlock
      --fit
      --fit-margin 512
      --ctx-size ${large_model_max_ctx}
      --jinja
      --parallel-tool-calls
      --temp ${default_temp}
      --top-p ${default_top_p}
      --top-k ${default_top_k}
      --min-p ${default_min_p}
      --repeat-penalty ${default_repeat_penalty}
      --reasoning on
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 120
    metadata:
      size: "~12.4 GB (i1-Q3_K_M)"
      context: "64K-128K (dynamic, heavy offload)"
      vram_usage: "~5GB VRAM + ~7GB RAM (ik pinned memory, hadamard cache)"
      source: "mradermacher/Qwen3.6-27B-i1-GGUF (i1-Q3_K_M)"
      kv_cache: "q4_0 + hadamard (ik -khad/-vhad)"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 27000000000
      context_length: 262144
      embedding_length: 4608
      quantization: i1-Q3_K_M
      note: "Encoder-free unified model — no mmproj needed. Vision and audio projected directly into LLM backbone via lightweight linear layers. Q5_K_L imatrix + Q8_0 embeddings (bartowski) — significant quality gain vs Q4_K_M for 262K vocab. Bee backend for reasoning-loop-guard. --fit-target 1024 reserves ~1GB VRAM for desktop. ik crashes with FA on gemma4 unified."
# -------------------------------------------
# QWEN3.6-35B-A3B - MoE CODING (text-only, no vision) (APEX I-Compact)
# MoE 35B params, 3B ativo por token. Substitui o Qwen3-Coder-30B.
# 33 experts, top-8 routing. APEX I-Compact ~17.3GB
#   Mixed-precision MoE quant com imatrix diversa (chat, code, reasoning, tool-calling)
#   Perplexity comparable to Q8_0 (6.669 vs 6.533), beats UD-Q3_K_XL on real benchmarks
# --no-mmproj: mmproj ocupa 858MB VRAM e impede partial expert offload.
#   Sem mmproj: ALL 41 layers sobem pra GPU (partial expert partition) → 20+ t/s!
#   Com mmproj: só ~11 layers em GPU → ~5 t/s. Não vale a pena.
# KV cache: q4_0 + attn_rot (head_k=128, 128%64==0 ✅)
# Architecture: qwen35moe (Qwen3MoeForCausalLM)
# Using ik_llama.cpp: better MoE performance via pinned memory for expert offload
# --multi-token-prediction: MTP now supported for Qwen3.5-MoE (#1745, v4496+). Use long form (not --mtp).
# --fit-margin 768: reserves ~0.75 GiB for desktop (Hyprland+browser+Kitty ~1.1GB idle)
#   Keeps model at ~80-83% VRAM, more GPU layers than 1536 for faster generation
#   Tested: densos aguentaram 85% sem issues, MoE should be fine at ~80%
# --k-cache-hadamard / --v-cache-hadamard: Hadamard transform before K/V cache quantization → much closer to f16 quality
# --defer-experts: defers expert mmap on Linux → faster model loading
# --flash-attn auto: disables FA on short prompts (saves overhead on MoE offloaded models)
# -------------------------------------------
  "qwen3.6-35b-a3b":
    name: "Qwen3.6 35B MoE"
    description: "Qwen3.6 delivers substantial upgrades in agentic coding and thinking preservation. Built on direct community feedback for a more intuitive, responsive, and productive coding experience."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.6-35B-A3B-APEX-I-Compact.gguf
      # No --no-mmproj: ik_llama.cpp doesn't support this flag (upstream-only)
      # No --fit-ctx: ik_llama.cpp doesn't support this flag; --ctx-size serves as ceiling
      --fit
      --fit-margin 768
      --ctx-size 131072
      --temp ${code_temp}
      --top-p ${code_top_p}
      --top-k ${code_top_k}
      --min-p ${code_min_p}
      --repeat-penalty ${code_repeat_penalty}
      --reasoning on
      --jinja
      --parallel-tool-calls
      --multi-token-prediction
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --defer-experts
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.85
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 300
    metadata:
      size: "~17.3 GB (APEX I-Compact)"
      context: "1K-131K (safe max; 200K works but zero VRAM headroom)"
      vram_usage: "~5.4GB VRAM + 13.8GB pinned RAM (ik pinned memory, constant 33-34 t/s up to 131K)"
      source: "mudler/Qwen3.5-35B-A3B-APEX-GGUF"
      kv_cache: "q4_0 + attn_rot + hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35moe
      parameters: 34660000000
      context_length: 262144
      embedding_length: 2048
      quantization: I-Compact
      warning: "Vision disabled — mmproj blocks partial expert offload. Text-only = 33–34 t/s vs 5 t/s with vision."
