  # Melhor para: OCR, descrição de imagens, visual QA, bounding box
  # Requer: --mmproj para processamento de imagens
  # Parâmetros de inferência do LiquidAI: temp=0.1, min_p=0.15, rep_penalty=1.05
  # VRAM: ~0.5GB com contexto + mmproj
  # -------------------------------------------
  "lfm2.5-vl-450m":
    name: "LFM2.5-VL 450M"
    description: "LiquidAI LFM2.5-VL-450M Q4_0 - Vision (OCR, descrição, bounding box)"
    cmd: |
      ${llama_server} --port ${PORT}
      --model ${models_dir}/LFM2.5-VL-450M-Q4_0.gguf
      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf
