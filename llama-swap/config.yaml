      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.6
      --top-p 0.9
      --top-k 40
      --min-p 0.00
      --repeat-penalty 1.0
      --reasoning off
      --flash-attn on
    ttl: 60
    aliases:
      - "nemotron-4b"
      - "nemotron-3-nano-4b"
      - "nemotron"
    metadata:
      size: "2.90 GB"
      context: "32K-128K (dynamic)"
      vram_usage: "~3GB"
      source: "unsloth/NVIDIA-Nemotron-3-Nano-4B-GGUF"
      features:
