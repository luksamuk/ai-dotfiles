      --model ${models_dir}/gemma-4-26B-A4B-APEX-I-Compact.gguf
      --no-mmproj
      --fit on
      --fit-target 256
      --fit-ctx 16384
      --ctx-size 131072
      --temp 1.0
      --top-p 0.95
      --reasoning on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
