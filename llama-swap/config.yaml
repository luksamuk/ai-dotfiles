healthCheckTimeout: 300
logLevel: info
logTimeFormat: rfc3339
logToStdout: proxy
captureBuffer: 15
startPort: 10001
sendLoadingState: false
includeAliasesInList: true
globalTTL: 0
macros:
  models_dir: ${env.HOME}/.llama-models
  media_path: ${env.HOME}/testfiles/vision
  llama_server: ${env.HOME}/git/llama.cpp/build/bin/llama-server
  ik_llama_server: ${env.HOME}/git/ik_llama.cpp/build/bin/llama-server
  bee_server: ${env.HOME}/git/beellama.cpp/build/bin/llama-server
  vllm_bin: ${env.HOME}/.vllm/bin/vllm
  default_temp: '0.7'
  default_top_p: '0.9'
  default_top_k: '20'
  default_min_p: '0.01'
  default_repeat_penalty: '1.05'
  code_temp: '0.6'
  code_top_p: '0.85'
  code_top_k: '40'
  code_min_p: '0.02'
  code_repeat_penalty: '1.05'
  think_temp: '0.6'
  think_top_p: '0.9'
  think_top_k: '20'
  think_min_p: '0.0'
  think_repeat_penalty: '1.0'
  small_model_min_ctx: '65536'
  small_model_max_ctx: '131072'
  large_model_min_ctx: '65536'
  large_model_max_ctx: '131072'
  vram_margin: '512'
  small_cache_k: q8_0
  small_cache_v: q8_0
  large_cache_k: q4_0
  large_cache_v: q4_0
  gemma_cache_k: q4_0
  gemma_cache_v: q4_0
models:
  qwen3.5-4b:
    name: Qwen3.5 4B
    description: Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/MoQ-3.75.gguf

      --jinja

      --parallel 2

      --parallel-tool-calls

      --fit

      --fit-margin 512

      --ctx-size 131072

      --timeout 0

      --temp ${default_temp}

      --top-p ${default_top_p}

      --top-k ${default_top_k}

      --min-p ${default_min_p}

      --repeat-penalty ${default_repeat_penalty}

      --reasoning on

      --cache-type-k q8_0

      --cache-type-v q4_0

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    metadata:
      size: ~1.92 GB (MoQ-3.75)
      context: 64K-128K (dynamic)
      vram_usage: ~2.8GB VRAM (model + hadamard cache)
      source: kaitchup/Qwen3.5-4B-GGUF-MoQ (MoQ-3.75)
      kv_cache: q8_0 + q4_0 hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 4210000000
      context_length: 262144
      embedding_length: 2560
      quantization: MoQ-3.75
      note: 'MoQ-3.75 replaces i1-Q4_K_M: 51% faster, 24% smaller, same quality. Mixture of Quants by Waleed Ahmad.'
  qwen3.5-9b:
    name: Qwen3.5 9B
    description: Qwen 3.5 is a family of open-source multimodal models that delivers exceptional utility and performance, integrating breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/Qwen3.5-9B-MoQ-3.6.gguf

      --fit

      --fit-margin 512

      --jinja

      --parallel 2

      --parallel-tool-calls

      --ctx-size ${small_model_max_ctx}

      --timeout 0

      --temp ${default_temp}

      --top-p ${default_top_p}

      --top-k ${default_top_k}

      --min-p ${default_min_p}

      --repeat-penalty ${default_repeat_penalty}

      --reasoning on

      --cache-type-k q8_0

      --cache-type-v q4_0

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    metadata:
      size: ~3.75 GB (MoQ-3.6)
      context: 64K-128K (dynamic)
      vram_usage: ~4.8GB VRAM (text-only, ik with hadamard cache)
      source: w-ahmad/Qwen3.5-9B-GGUF-MoQ (MoQ-3.6)
      kv_cache: q8_0 + q4_0 hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 8950000000
      context_length: 262144
      embedding_length: 4096
      quantization: MoQ-3.6
      note: 'MoQ-3.6 replaces UD-Q4_K_XL: same speed (12.2 tok/s), equal+ quality (21/25 vs 20/25 Snake), 32% smaller (3.75 vs 5.55 GB). MTP OOM on 6GB VRAM.'
  gemma4-e4b:
    name: Gemma 4 E4B
    description: Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/gemma-4-E4B-it-Q4_K_M.gguf

      # No --no-mmproj: ik doesn''t support this flag (upstream-only)

      --fit

      --fit-margin 512

      --jinja

      --parallel 2

      --parallel-tool-calls

      --ctx-size ${small_model_max_ctx}

      --timeout 0

      --temp 0.7

      --top-p 0.9

      --top-k 40

      --min-p 0.01

      --repeat-penalty 1.0

      --reasoning on

      --cache-type-k q8_0

      --cache-type-v q4_0

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    metadata:
      size: ~4.63 GB (Q4_K_M)
      context: 64K-128K (dynamic)
      vram_usage: ~5.3GB VRAM (fits with mmproj)
      source: unsloth/gemma-4-E4B-it-GGUF (Q4_K_M)
      kv_cache: q8_0 + q4_0 hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 7520000000
      context_length: 131072
      embedding_length: 2560
      quantization: Q4_K_M
      note: Upgraded from UD-Q3_K_XL → Q4_K_M. Text-only (no mmproj). Tightest VRAM model — adding mmproj reduces ctx.
  gemma4-e2b:
    name: Gemma 4 E2B
    description: Gemma 4 E2B QAT — Unsloth Dynamic 2.0 (UD-Q4_K_XL). Higher accuracy and smaller than Google Q4_0.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/gemma-4-E2B-it-qat-UD-Q4_K_XL.gguf

      --no-mmproj

      --fit on

      --fit-target 1024

      --fit-ctx ${small_model_min_ctx}

      --ctx-size ${small_model_max_ctx}

      --timeout 0

      --parallel 4

      --temp 0.7

      --top-p 0.9

      --top-k 40

      --min-p 0.01

      --repeat-penalty 1.0

      --reasoning on

      --cache-type-k ${gemma_cache_k}

      --cache-type-v ${gemma_cache_v}

      --flash-attn on

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    metadata:
      size: ~2.5 GB (UD-Q4_K_XL)
      context: 32K-128K (dynamic)
      vram_usage: ~2.5GB
      source: unsloth/gemma-4-E2B-it-qat-GGUF
      kv_cache: q4_0 + attn_rot
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 4650000000
      context_length: 131072
      embedding_length: 1536
      quantization: UD-Q4_K_XL
      note: Unsloth Dynamic 2.0 QAT. Better accuracy than Google Q4_0 (Top-1 98.16% vs 89.29%), 22% smaller. Upstream only — NOT compatible with ik_llama.
  lfm2.5-vl-450m:
    name: LFM2.5-VL 450M
    description: Edge vision-language model for image understanding, object detection, and captioning using LFM backbones and custom visual encoders.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/LFM2.5-VL-450M-Q8_0.gguf

      --jinja

      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf

      --media-path ${media_path}

      --fit on

      --fit-target ${vram_margin}

      --fit-ctx ${small_model_min_ctx}

      --ctx-size ${small_model_max_ctx}

      --timeout 0

      --temp 0.1

      --top-p 0.9

      --top-k 40

      --min-p 0.15

      --repeat-penalty 1.05

      --reasoning off

      --cache-type-k f16

      --cache-type-v f16

      --flash-attn on

      --metrics

      '
    health_check_timeout: 300
    ttl: 60
    metadata:
      size: 0.36 GB (Q8_0) + 0.18 GB mmproj
      context: 32K-128K (dynamic)
      vram_usage: ~0.5GB
      source: LiquidAI/LFM2.5-VL-450M-GGUF
      kv_cache: f16
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2
      parameters: 354480000
      context_length: 128000
      embedding_length: 1024
      quantization: Q8_0
  gemma4-26b-a4b:
    name: Gemma 4 26B
    description: Gemma 4 models are designed to deliver frontier-level performance at each size. They are well-suited for reasoning, agentic workflows, coding, and multimodal understanding.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/gemma-4-26B_q4_0-it.gguf

      --no-mmproj

      --fit on

      --fit-target 96

      --fit-ctx 16384

      --ctx-size 131072

      --timeout 0

      --temp 1.0

      --top-p 0.95

      --reasoning on

      --cache-type-k q4_0

      --cache-type-v q4_0

      --flash-attn on

      --jinja

      --parallel 2

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.95
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 1.0
          top_p: 0.95
    ttl: 300
    health_check_timeout: 300
    metadata:
      size: ~14.4 GB (Q4_0 QAT)
      context: 16K-131K (dynamic)
      vram_usage: ~5GB VRAM + ~9GB RAM (upstream --fit on auto-offload)
      source: google/gemma-4-26B-A4B-it-qat-q4_0-gguf
      kv_cache: q4_0 + attn_rot
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: gemma4
      parameters: 25230000000
      context_length: 262144
      embedding_length: 2816
      quantization: Q4_0_QAT
      warning: Vision disabled — Gemma 4 mmproj crash on CUDA. Text-only.
  qwen3.6-35b-a3b:
    name: Qwen 3.6 35B
    description: Qwen3.6 delivers substantial upgrades in agentic coding and thinking preservation. Built on direct community feedback for a more intuitive, responsive, and productive coding experience.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/Qwen3.6-35B-A3B-APEX-I-Compact.gguf

      # No --mmproj: vision crashes on 6GB RTX 3050 (CLIP compute graph OOM). Text-only = stable 33-34 t/s.

      # No --fit-ctx: ik_llama.cpp doesn''t support this flag; --ctx-size serves as ceiling

      --fit

      --fit-margin 768

      --ctx-size 131072

      --timeout 0

      --temp ${code_temp}

      --top-p ${code_top_p}

      --top-k ${code_top_k}

      --min-p ${code_min_p}

      --repeat-penalty ${code_repeat_penalty}

      --reasoning on

      --jinja

      --parallel 2

      --parallel-tool-calls

      --spec-type mtp:n_max=1,p_min=0.0

      --cache-type-k ${large_cache_k}

      --cache-type-v ${large_cache_v}

      --k-cache-hadamard

      --v-cache-hadamard

      --flash-attn auto

      --defer-experts

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.85
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 300
    health_check_timeout: 300
    metadata:
      size: ~17.3 GB (APEX I-Compact)
      context: 1K-131K (safe max; 200K works but zero VRAM headroom)
      vram_usage: ~5.4GB VRAM + 13.8GB pinned RAM (ik pinned memory, stable 33-34 t/s up to 131K)
      source: mudler/Qwen3.5-35B-A3B-APEX-GGUF
      kv_cache: q4_0 + attn_rot + hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35moe
      parameters: 34660000000
      context_length: 262144
      embedding_length: 2048
      quantization: I-Compact
      note: Vision blocked — mmproj loads fine (858 MiB F16, ~28 t/s text) but CLIP compute graph OOMs on 6GB RTX 3050 at inference time. Reverted to text-only (33-34 t/s, stable).
  littlelamb-0.3b-tc:
    name: LittleLamb 0.3B TC
    description: Compact 0.3B-parameter model specialized for function and tool calling tasks in resource-constrained environments.
    tags:
    - tools
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/LittleLamb-ToolCalling.Q8_0.gguf

      --jinja

      --fit on

      --fit-target 768

      --fit-ctx ${small_model_min_ctx}

      --ctx-size 40960

      --timeout 0

      --parallel 4

      --cont-batching

      --temp ${code_temp}

      --top-p ${code_top_p}

      --top-k ${code_top_k}

      --min-p ${code_min_p}

      --repeat-penalty ${code_repeat_penalty}

      --reasoning on

      --cache-type-k ${small_cache_k}

      --cache-type-v ${small_cache_v}

      --flash-attn on

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    health_check_timeout: 300
    ttl: 60
    metadata:
      size: ~303 MB (Q8_0)
      context: 8K-40K (dynamic)
      vram_usage: ~0.5GB (model + cache)
      source: mradermacher/LittleLamb-ToolCalling-GGUF (Q8_0)
      kv_cache: q8_0 + attn_rot
      features:
        completion: true
        tools: true
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen3
      parameters: 293260000
      context_length: 40960
      embedding_length: 544
      quantization: Q8_0
      warning: ik_llama.cpp incompatible — use llama.cpp upstream
  minicpm-v-4.6:
    name: MiniCPM-V 4.6
    description: A series of multimodal LLMs designed for vision-language understanding, with strong OCR capability, multi-image understanding, and efficient visual token processing.
    tags:
    - vision
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/MiniCPM-V-4_6-Q5_K_M.gguf

      --mmproj ${models_dir}/mmproj-MiniCPM-V-4.6-F16.gguf

      --media-path ${media_path}

      --jinja

      --fit on

      --fit-ctx 8192

      --ctx-size 262144

      --timeout 0

      --parallel 4

      --cont-batching

      --temp ${default_temp}

      --top-p 0.8

      --top-k 100

      --min-p ${default_min_p}

      --repeat-penalty 1.05

      --reasoning on

      --cache-type-k f16

      --cache-type-v f16

      --flash-attn on

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 60
    health_check_timeout: 300
    metadata:
      size: 0.55 GB (Q5_K_M) + 1.1 GB mmproj
      context: 8K-256K (dynamic)
      vram_usage: ~2GB (model + mmproj + cache)
      source: openbmb/MiniCPM-V-4.6-gguf
      kv_cache: f16
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35
      parameters: 752160000
      context_length: 262144
      embedding_length: 1024
      quantization: Q5_K_M
  gemma4-12b:
    name: Gemma 4 12B
    description: Gemma 4 12B QAT (Q4_0) — Unified multimodal (vision + audio). Won vs PTQ on ik (25 vs 24/25 Snake). Upstream --fit on for 128K ctx with mmproj.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/gemma-4-12b-it-qat-q4_0.gguf

      --mmproj ${models_dir}/mmproj-gemma-4-12b-it-qat-q4_0.gguf

      --fit on

      --fit-target 768

      --fit-ctx 8192

      --ctx-size 131072

      --timeout 0

      --jinja

      --parallel 2

      --reasoning on

      --cache-type-k q4_0

      --cache-type-v q4_0

      --flash-attn on

      --min-p 0.01

      --repeat-penalty 1.05

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.7
          top_p: 0.9
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 1.2
          top_p: 0.95
    ttl: 300
    health_check_timeout: 300
    metadata:
      size: ~6.7 GB (Q4_0 QAT + 168 MB mmproj)
      context: 8K-128K (dynamic)
      vram_usage: ~5GB VRAM + ~354 MB mmproj (upstream --fit on)
      source: google/gemma-4-12B-it-qat-q4_0-gguf
      kv_cache: q4_0 + attn_rot
      features:
        completion: true
        tools: true
        thinking: true
        vision: true
        embedding: false
        insert: false
        audio: true
        image: false
      architecture: gemma4
      parameters: 12000000000
      context_length: 262144
      embedding_length: 3072
      quantization: Q4_0_QAT
  hy-mt2-1.8b:
    name: Hy-MT2 1.8B
    description: Fast-thinking multilingual translation model from Tencent Hunyuan, supporting translation across 33 languages for complex real-world scenarios.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/Hy-MT2-1.8B-Q4_K_M.gguf

      --jinja

      --fit on

      --fit-target 768

      --fit-ctx ${small_model_min_ctx}

      --ctx-size ${small_model_max_ctx}

      --timeout 0

      --parallel 4

      --temp 0.7

      --top-p 0.6

      --top-k 20

      --repeat-penalty 1.05

      --cache-type-k ${small_cache_k}

      --cache-type-v ${small_cache_v}

      --flash-attn on

      --metrics

      '
    health_check_timeout: 300
    ttl: 60
    metadata:
      size: ~1.1 GB (Q4_K_M)
      context: 32K-128K (dynamic)
      vram_usage: ~2GB (model + cache)
      source: tencent/Hy-MT2-1.8B-GGUF (Q4_K_M)
      kv_cache: q8_0 + attn_rot
      features:
        completion: true
        tools: false
        thinking: false
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: hunyuan-dense
      parameters: 1790000000
      context_length: 262144
      embedding_length: 2048
      quantization: Q4_K_M
      note: 'Translation-only model. No system prompt needed (per Hy-MT2 docs). Official prompt: ''Translate the following text into {target_lang}. Note that you should only output the translated result without any additional explanation:


        {source_text}''. Supports terminology, style, personalization, delimiter preservation, and structured data translation. See https://github.com/Tencent-Hunyuan/Hy-MT2 for all prompt formats.'
  laguna-xs2:
    name: Laguna XS.2
    description: Poolside's 33B/3B MoE coding model with mixed SWA+global attention, native interleaved reasoning, and 131K context. Designed for agentic coding.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/laguna-xs2-Q3_K_M.gguf

      --fit

      --fit-margin 256

      --ctx-size 32768

      --timeout 0

      --batch-size 8

      --temp 0.3

      --top-p 0.85

      --top-k 40

      --min-p 0.02

      --repeat-penalty 1.12

      --parallel-tool-calls

      --jinja

      --parallel 2

      --chat-template-file ${models_dir}/laguna-xs2-chat-template.jinja

      --cache-type-k q8_0

      --cache-type-v q8_0

      --flash-attn auto

      --defer-experts

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParams:
        stop:
        - </assistant>
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.3
          top_p: 0.85
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.7
          top_p: 0.9
    ttl: 300
    health_check_timeout: 300
    metadata:
      size: ~15.5 GB (Q3_K_M — requantized from Q4_K_M)
      context: 8K-131K (dynamic with --fit)
      vram_usage: ~5.5GB VRAM (model offload + attention on GPU, experts on CPU)
      source: Lucebox/Laguna-XS.2-GGUF → local Q3_K_M requant
      kv_cache: q8_0
      features:
        completion: true
        tools: true
        thinking: partial
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: laguna
      parameters: 33443000000
      context_length: 131072
      embedding_length: 2048
      quantization: Q3_K_M
  lfm2.5-8b-a1b:
    name: LFM 2.5 8B
    description: Liquid AI MoE hybrid — 8.3B total, 1.5B active per token. Built for fast, reliable tool calling on consumer hardware.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/LFM2.5-8B-A1B-Q4_0.gguf

      --fit on

      --fit-ctx 16384

      --ctx-size 131072

      --timeout 0

      --parallel 2

      --no-cont-batching

      --reasoning-format deepseek-legacy

      --reasoning on

      --chat-template-file /home/alchemist/git/ai-dotfiles/llama-swap/templates/lfm2.5-chat-template.jinja

      --temp 0.2

      --top-p 0.8

      --top-k 40

      --min-p 0.15

      --repeat-penalty 1.05

      --cache-type-k q8_0

      --cache-type-v q4_0

      --flash-attn on

      --n-predict -1

      --jinja

      --metrics

      '
    filters:
      stripParams: temperature, top_p
      setParamsByID:
        ${MODEL_ID}:
          temperature: 0.2
          min_p: 0.15
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.3
    ttl: 60
    health_check_timeout: 300
    metadata:
      size: ~4.84 GB (Q4_0)
      context: 128K
      vram_usage: ~5.5GB VRAM (4.84 GB model + KV)
      source: LiquidAI/LFM2.5-8B-A1B-GGUF
      kv_cache: q8_0 + q4_0 hadamard
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2moe
      parameters: 8470000000
      context_length: 128000
      embedding_length: 2048
      quantization: Q4_0
      note: Pet project — MoE 1.5B active, hybrid conv+GQA. Reasoning + tool calling. Uses upstream (BeeLlama segfaults on LFM2.5). GGUF has empty chat_template — requires --chat-template-file + --reasoning-format deepseek.
  lfm2.5-vl-1.6b-extract:
    name: LFM2.5-VL 1.6B Extract
    description: Vision-language model specialized in structured extraction. Pass an image and a list of fields, get back a JSON object. No parsing layer needed.
    cmd: '${llama_server} --port ${PORT}

      --model ${models_dir}/LFM2.5-VL-1.6B-Extract-Q4_K_M.gguf

      --jinja

      --mmproj ${models_dir}/mmproj-LFM2.5-VL-1.6B-Extract-F16.gguf

      --media-path ${media_path}

      --fit on

      --fit-target ${vram_margin}

      --fit-ctx ${small_model_min_ctx}

      --ctx-size ${small_model_max_ctx}

      --timeout 0

      --temp 0.1

      --top-p 0.9

      --top-k 40

      --min-p 0.15

      --repeat-penalty 1.05

      --reasoning off

      --cache-type-k f16

      --cache-type-v f16

      --flash-attn on

      --metrics

      '
    health_check_timeout: 300
    ttl: 60
    metadata:
      size: 0.70 GB (Q4_K_M) + 0.82 GB mmproj
      context: 32K (dynamic)
      vram_usage: ~2.7GB
      source: LiquidAI/LFM2.5-VL-1.6B-Extract-GGUF
      kv_cache: f16
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: lfm2
      parameters: 1600000000
      context_length: 128000
      embedding_length: 2048
      quantization: Q4_K_M
      note: Structured extraction VLM — returns JSON instead of free-form text. lfm2 arch requires upstream llama.cpp (not ik).
  mellum2-12b-a2.5b:
    name: Mellum 2 12B
    description: JetBrains coding MoE — 12B total, 2.5B active. Excels at tool use, agentic workflows, code generation and reasoning.
    cmd: '${ik_llama_server} --port ${PORT}

      --model ${models_dir}/Mellum2-12B-A2.5B-Thinking-Q4_K_M.gguf

      --jinja

      --parallel 2

      --fit

      --fit-margin 512

      --ctx-size 131072

      --timeout 0

      --temp 0.6

      --top-p 0.95

      --top-k 20

      --min-p 0.1

      --repeat-penalty 1.05

      --reasoning on

      --parallel-tool-calls

      --cache-type-k q8_0

      --cache-type-v q4_0

      --flash-attn on

      --metrics

      '
    filters:
      stripParams: temperature, top_p, top_k
      setParamsByID:
        ${MODEL_ID}:
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.95
        ${MODEL_ID}:think:
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.95
    ttl: 300
    health_check_timeout: 300
    metadata:
      size: ~7.6 GB (Q4_K_M)
      context: 16K-131K (dynamic)
      vram_usage: ~4.5GB VRAM + ~3GB RAM (partial expert offload)
      source: RJ000/Mellum2-12B-A2.5B-Thinking-GGUF (Q4_K_M)
      note: 'Community quant (RJ000). ik-pinned since #1919 (Mellum2 arch + split mode). MoE offload optimized.'
      caveat: 'GGUF Thinking always produces reasoning. Base variant (enable_thinking: false) leaks inline text — use :think for clean separation (reasoning_content). Parallel tool calls work with --parallel-tool-calls. Occasional content leakage before tool calls on ambiguous prompts.'
      kv_cache: q8_0 + q4_0
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: mellum
      parameters: 12000000000
      context_length: 131072
      embedding_length: 2304
      quantization: Q4_K_M
