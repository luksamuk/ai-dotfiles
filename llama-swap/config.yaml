      --mmproj ${models_dir}/mmproj-LFM2.5-VL-450m-F16.gguf
      --media-path ${media_path}
      --fit on
      --fit-target ${vram_margin}
      --fit-ctx ${small_model_min_ctx}
      --ctx-size ${small_model_max_ctx}
      --temp 0.1
      --top-p 0.9
      --top-k 40
      --min-p 0.15
      --repeat-penalty 1.05
      --reasoning off
      --cache-type-k f16
      --cache-type-v f16
      --flash-attn on
      --metrics
    health_check_timeout: 300
    ttl: 60
    capabilities:
      in:
        - 'text'
        - 'image'
      out:
        - 'text'
      tools: false
      reranker: false
      context: 131072
    metadata:
      size: "0.36 GB (Q8_0) + 0.18 GB mmproj"
      context: "32K-128K (dynamic)"
      vram_usage: "~0.5GB"
      source: "LiquidAI/LFM2.5-VL-450M-GGUF"
      kv_cache: "f16"
      features:
        completion: true
        tools: false
        thinking: false
        vision: true
        embedding: false
