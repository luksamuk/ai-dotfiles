# GRUPOS
# ============================================
groups:
  "default":
    swap: true        # Só um modelo por vez
    exclusive: true   # Descarrega outros grupos ao ativar
    members:
      # Modelos padrão (sem thinking)
      - "qwen3.5-4b"
      - "qwen3.5-9b"
      - "qwen3-14b"        # OFFLINE-DEEP
      - "qwopus3.5-4b"    # Reasoning + tools, fits VRAM
      - "qwopus3.5-9b"    # OFFLINE-FAST
      - "carnice-9b"      # Hermes Agent specialized
      - "gemma4-e4b"
      - "gemma4-e2b"
      - "nemotron-3-nano-4b"
      # Variantes thinking
      - "qwen3.5-4b-think"
      - "qwen3.5-9b-think"
      - "qwen3-14b-think"
      - "carnice-9b-think"
      - "gemma4-e4b-think"
      - "gemma4-e2b-think"
      - "nemotron-3-nano-4b-think"
      # Vision
      - "lfm2.5-vl-450m"


