    lfm8: lfm2.5-8b-a1b
    vl: lfm2.5-vl-450m
    vl16: lfm2.5-vl-1.6b
    ocr: glm-ocr
    qwvl: qwen3-vl-4b
    q9: qwen3.5-9b
    g4: gemma4-e4b
    orn35: ornith-1.0-35b
    aw: agentworld-35b
    glm: glm-4.7-flash
    bonsai1: bonsai-27b-1bit
