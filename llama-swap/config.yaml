  # -------------------------------------------
  # GEMMA-4-26B-A4B - MoE REASONING + CODING (APEX I-Compact)
  # MoE 26B params, 4B ativo por token. 128 experts, top-8 routing.
  # Google recomenda: temp=1.0 para reasoning, temp=0.7 para coding
  # Variantes via setParamsByID: base (chat), :think (reasoning)
  # APEX I-Compact ~15.5GB — mixed-precision MoE quant com imatrix diversa
  #   (edges Q4_K, middle Q3_K, shared experts Q6_K, attention Q4_K)
  #   Perplexity comparable to Q8_0, real-world benchmarks better than UD-Q3_K_XL
  # head_dim=256 → attn_rot ✅, iSWA fix (b8815+) → q4_0 cache works now
  # mmproj crashes on CUDA (bug #21402) → text-only
  # Architecture: gemma4 (Gemma4ForCausalLM)
  # Using ik_llama.cpp: better MoE performance via pinned memory for expert offload
  # -------------------------------------------
