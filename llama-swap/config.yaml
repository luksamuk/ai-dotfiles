      parameters: 354480000
      context_length: 128000
      embedding_length: 1024
      quantization: Q8_0
# -------------------------------------------
# QWEN3.6-35B-A3B - MoE CODING (text-only, no vision) (APEX I-Compact)
# MoE 35B params, 3B ativo por token. Substitui o Qwen3-Coder-30B.
# 33 experts, top-8 routing. APEX I-Compact ~17.3GB
#   Mixed-precision MoE quant com imatrix diversa (chat, code, reasoning, tool-calling)
#   Perplexity comparable to Q8_0 (6.669 vs 6.533), beats UD-Q3_K_XL on real benchmarks
# NO MMPROJ: mmproj (858 MiB F16) loads fine with --fit-margin 1536 (41/41 layers, ~28 t/s text).
#   BUT vision inference crashes — CLIP compute graph exceeds VRAM at runtime (ggml_abort on alloc).
#   Text-only with --fit-margin 768 is stable and faster. Vision blocked on 6GB RTX 3050.
# KV cache: q4_0 + attn_rot (head_k=128, 128%64==0 ✅)
# Architecture: qwen35moe (Qwen3MoeForCausalLM)
# Using ik_llama.cpp: better MoE performance via pinned memory for expert offload
# --fit-margin 768: reserves ~0.75 GiB for desktop (Hyprland+browser+Kitty ~1.1GB idle)
#   Keeps model at ~80-83% VRAM. 41/41 layers on GPU, ~13.8 GiB pinned RAM. Stable 33-34 t/s.
# --k-cache-hadamard / --v-cache-hadamard: Hadamard transform before K/V cache quantization → much closer to f16 quality
# --defer-experts: defers expert mmap on Linux → faster model loading
# --flash-attn auto: disables FA on short prompts (saves overhead on MoE offloaded models)
# -------------------------------------------
  "qwen3.6-35b-a3b":
    name: "Qwen 3.6 35B"
    description: "Qwen3.6 delivers substantial upgrades in agentic coding and thinking preservation. Built on direct community feedback for a more intuitive, responsive, and productive coding experience."
    cmd: |
      ${ik_llama_server} --port ${PORT}
      --model ${models_dir}/Qwen3.6-35B-A3B-APEX-I-Compact.gguf
      # No --mmproj: vision crashes on 6GB RTX 3050 (CLIP compute graph OOM). Text-only = stable 33-34 t/s.
      # No --fit-ctx: ik_llama.cpp doesn't support this flag; --ctx-size serves as ceiling
      --fit
      --fit-margin 768
      --ctx-size 131072
      --temp ${code_temp}
      --top-p ${code_top_p}
      --top-k ${code_top_k}
      --min-p ${code_min_p}
      --repeat-penalty ${code_repeat_penalty}
      --reasoning on
      --jinja
      --parallel 1
      --parallel-tool-calls
      --cache-type-k ${large_cache_k}
      --cache-type-v ${large_cache_v}
      --k-cache-hadamard
      --v-cache-hadamard
      --flash-attn auto
      --defer-experts
      --metrics
    filters:
      stripParams: "temperature, top_p"
      setParamsByID:
        "${MODEL_ID}":
          chat_template_kwargs:
            enable_thinking: false
          temperature: 0.6
          top_p: 0.85
        "${MODEL_ID}:think":
          chat_template_kwargs:
            enable_thinking: true
          temperature: 0.6
          top_p: 0.9
    ttl: 300
    health_check_timeout: 300
    capabilities:
      in:
        - 'text'
      out:
        - 'text'
      tools: true
      reranker: false
      context: 131072
    metadata:
      size: "~17.3 GB (APEX I-Compact)"
      context: "1K-131K (safe max; 200K works but zero VRAM headroom)"
      vram_usage: "~5.4GB VRAM + 13.8GB pinned RAM (ik pinned memory, stable 33-34 t/s up to 131K)"
      source: "mudler/Qwen3.5-35B-A3B-APEX-GGUF"
      kv_cache: "q4_0 + attn_rot + hadamard"
      features:
        completion: true
        tools: true
        thinking: true
        vision: false
        embedding: false
        insert: false
        audio: false
        image: false
      architecture: qwen35moe
      parameters: 34660000000
      context_length: 262144
      embedding_length: 2048
      quantization: I-Compact
