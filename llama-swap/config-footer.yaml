# Hooks: ações na inicialização do llama-swap
# preload: carrega modelos síncronamente antes de aceitar requests
# Ideal para vLLM (startup lento = 30-90s sem warm-up)
# NOTA: preloads desabilitados temporariamente — ocupam GPU e bloqueiam swap pra SGLang
# Para reabilitar: descomente as linhas preload abaixo
hooks:
  on_startup:
    preload: []
      # - "qwen3.5-0.8b-vllm"
      # - "lfm2.5-1.2b-vllm"

# ============================================
# SWAP MATRIX (v202+) - Substitui o antigo groups
# ============================================
# O solver determina automaticamente qual combinação de modelos
# pode rodar simultaneamente e quais descarregar quando necessário.
#
# Regras de concorrência para RTX 3050 6GB:
# - Modelos pequenos (~3GB VRAM) podem rodar SOZINHOS ou com LFM2.5-VL
# - Modelos grandes (~5GB VRAM) rodam SOZINHOS
# - Modelos pesados (14B+, offload) rodam SOZINHOS
# - LFM2.5-VL (0.5GB) pode acompanhar modelos pequenos
# - Gemma4-E2B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - Qwen3.5-4B (~3GB) + LFM2.5-VL (~0.5GB) = ~3.5GB total (CABE)
# - Variantes "think" usam o mesmo modelo, só mudam --reasoning
#   (não rodam simultaneamente com a variante base)
# ============================================

matrix:
  # Variáveis de modelo para a matrix
  # Removemos aliases curtos desnecessários — usamos IDs completos ou vars mínimos
  # NOTA: todo ID usado em sets/evict_costs DEVE estar definido aqui
  vars:
    # Atalhos para IDs longos (usados em sets e evict_costs)
    gemma4m: gemma4-26b-moe
    # DeepSeek R1 Distill — REMOVED (poor perf on RTX 3050, SSD pressure)
    # ds14: ds-r1-distill-14b
    # ds32: ds-r1-distill-32b
    # Modelos pequenos
    q08: qwen3.5-0.8b
    q4: qwen3.5-4b
    # [REMOVED] n4: nemotron-3-nano-4b
    g2: gemma4-e2b
    lfm2s: lfm2.5-1.2b
    lfm2t: lfm2.5-1.2b-think
    # Vision
    vl: lfm2.5-vl-450m
    # Modelos médios (agora cabem na VRAM!)
    q9: qwen3.5-9b
    # [REMOVED] ACE — no imatrix quants, worse perplexity than 9B regular
    g4: gemma4-e4b
    # Pesados
    qw36: qwen3.6-35b-moe
    qwopus: qwopus-35b
    gptoss: gpt-oss-20b
    lfm2l: lfm2-24b
    # vLLM backends (separate process, same GPU)
    q08vllm: qwen3.5-0.8b-vllm
    lfm2vllm: lfm2.5-1.2b-vllm
    sglang: lfm2.5-sgl
  # DSL: & = AND (rodar junto), | = OR (alternativa), () = agrupamento
  # +ref = expandir outro set inline
  #
  # Lógica:
  # - small_vision: modelo pequeno + vision (cabem juntos na VRAM)
  # - small_only: modelo pequeno sem vision
  # - medium: modelos ~5GB rodam sozinhos
  # - heavy: modelos 14B+ rodam sozinhos (toda VRAM)
  sets:
    # LLM pequeno + Vision: trocar entre modelos leves NÃO evicta o vision
    small_vision: "(q08 | q4 | g2 | lfm2s | lfm2t) & vl"

    # LLM pequeno sozinho (sem vision ativo)
    small_only: "q08 | q4 | g2 | lfm2s | lfm2t"

    # vLLM backends (mutuamente exclusivos com llama.cpp — mesma GPU)
    vllm: "q08vllm | lfm2vllm"

    # Modelos médios (~5GB VRAM) - agora cabem na VRAM com UD-Q3!
    # Qwen3.5-9B e Gemma4-E4B cabem inteiramente
    medium: "q9 | g4"

    # [REMOVED] omni_vision set (Nemotron Omni not added — upstream-only, poor perf on 6GB VRAM)

    # Modelos pesados - toda VRAM + RAM offload
    heavy: "qw36 | qwopus | gemma4m | gptoss | lfm2l"

    # Vision sozinho
    vision_only: "vl"

  # Custo de eviction (modelos mais caros pra recarregar = prioridade pra ficar)
  # Modelos pesados demoram mais pra carregar → custo alto
  evict_costs:
    gemma4m: 10  # 26B MoE APEX I-Compact ~15.5GB, heavy offload
    qw36: 10     # 35B MoE APEX I-Compact ~17.3GB, heavy offload
    qwopus: 10   # 35B MoE Qwopus APEX I-Compact ~16.5GB, heavy offload
    gptoss: 8    # 11GB dense Q4_K_M, heavy offload
    lfm2l: 9    # 14.4GB MoE Q4_K_M, upstream llama.cpp (no pinned memory)
    # ds14: 7   REMOVED — Dense 14B poor perf on RTX 3050
    # ds32: 10  REMOVED — Dense 32B very slow on limited VRAM
    q9: 4        # ~5GB, fits VRAM now
    # [REMOVED] ace: 4 — superseded by Qwopus
    g4: 4        # ~4.5GB, fits VRAM now
    vl: 3        # vision, leve mas útil manter vivo
    q08: 1       # 0.8B, ultra-leve
    lfm2s: 1    # 1.2B Instruct, ultra-leve
    lfm2t: 1    # 1.2B Thinking, ultra-leve
    q4: 2
    # [REMOVED] n4: 1 — nemotron-3-nano-4b removed
    g2: 1
    # vLLM backends — high startup cost (30-90s), high eviction cost
    q08vllm: 5
    lfm2vllm: 5
