# Hooks: ações na inicialização do llama-swap
# preload: carrega modelos síncronamente antes de aceitar requests
# Ideal para vLLM (startup lento = 30-90s sem warm-up)
# NOTA: preloads desabilitados temporariamente — ocupam GPU e bloqueiam swap pra SGLang
# Para reabilitar: descomente as linhas preload abaixo
hooks:
  on_startup:
    preload: []
      # - "qwen3.5-0.8b-vllm"
      # - "lfm2.5-1.2b-vllm"

# ============================================
# SWAP MATRIX (v202+)
# ============================================
# O solver determina automaticamente qual combinação de modelos
# pode rodar simultaneamente e quais descarregar quando necessário.
#
# Nomic Embed + LFM2.5 Embed/ColBERT (~0.5GB total, CPU-only) estão em sets de
# embedding/reranking — sempre coexistem com qualquer LLM (não usam VRAM).
# evict_cost 1 = primeiro a sair se VRAM realmente apertar.
# ============================================

matrix:
  vars:
    # Modelos pequenos
    q4: qwen3.5-4b
    q4a: qwen3.5-4b-abliterated
    g2: gemma4-e2b
    g2q: gemma4-e2b
    lfm230: lfm2.5-230m
    lfm8: lfm2.5-8b-a1b
    # Vision
    vl: lfm2.5-vl-450m
    vlx: lfm2.5-vl-1.6b-extract
    vle: lfm2.5-vl-450m-extract
    vl16: lfm2.5-vl-1.6b
    ocr: glm-ocr
    cpv: minicpm-v-4.6
    qwvl: qwen3-vl-4b
    smv: smolvlm2-500m-video
    # Modelos médios
    q9: qwen3.5-9b
    g4: gemma4-e4b
    # Pesados (offload)
    qw36: qwen3.6-35b-a3b
    orn35: ornith-1.0-35b
    a1: agents-a1-35b
    aw: agentworld-35b
    glm: glm-4.7-flash
    # Tradução
    hmt: hy-mt2-1.8b
    # Audio
    asr: qwen3-asr-0.6b
    ttsext: qwen3-tts
    # Embedding
    nomic: nomic-embed-text-v2-moe
    lfmemb: lfm2.5-embed-350m
    # Reranker (late-interaction, CPU-only)
    lfmcol: lfm2.5-colbert-350m

  sets:
    # LLM pequeno + Vision + Embedding
    # q4/q4a (DFlash) com ctx 32K + nomic ~700MiB headroom
    small_vision: "(q4 | q4a | g2 | g2q | lfm230 | lfm8) & vl & nomic"

    # LLM pequeno + Embedding (sem vision)
    small_embed: "(q4 | q4a | g2 | g2q | lfm230 | lfm8) & nomic"

    # LLM pequeno sozinho (sem vision, sem embedding)
    small_only: "q4 | q4a | g2 | g2q | lfm230 | lfm8"

    # Vision models (sozinhos ou com nomic)
    vision_only: "vl | vlx | vle | vl16 | ocr | cpv | qwvl | smv"
    vision_embed: "(vl | vlx | vle | vl16 | ocr | cpv | qwvl | smv) & nomic"

    # Modelos médios + Embedding
    medium: "(q9 | g4) & nomic"

    # Modelos pesados (offload) + Embedding
    # nomic (~0.5GB) cabe ao lado mesmo dos pesados — usa RAM pro offload
    heavy: "(qw36 | orn35 | a1 | aw | glm) & nomic"

    # Tradução (leve, cabe com nomic)
    translate_embed: "hmt & nomic"
    translate_only: "hmt"

    # External TTS (separate process, same GPU)
    tts_external: "ttsext"

    # Embedding sozinho (RAG indexing, semantic search)
    embed_only: "nomic | lfmemb"

    # Reranker sozinho (late-interaction reranking, CPU-only)
    rerank_only: "lfmcol"

    # Reranker + Embedding (two-stage retrieval: dense → rerank)
    rerank_embed: "lfmcol & (nomic | lfmemb)"

  # Custo de eviction (modelos mais caros pra recarregar = prioridade pra ficar)
  evict_costs:
    qw36: 10
    orn35: 9
    a1: 9
    aw: 9
    glm: 9
    q9: 4
    g4: 4
    ttsext: 4
    vl: 3
    vlx: 3
    vle: 1
    ocr: 3
    cpv: 3
    qwvl: 3
    vl16: 2
    smv: 1
    q4: 2
    q4a: 2
    lfm8: 2
    asr: 2
    nomic: 1
    lfmemb: 1
    lfmcol: 1
    g2: 1
    g2q: 1
    lfm230: 1
    hmt: 1